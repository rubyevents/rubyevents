# Day 1 - Thursday, April 30th

- id: "john-athayde-blue-ridge-ruby-2026"
  title: "Learning from Permaculture: Sustainable Software Development"
  date: "2026-04-30"
  video_provider: "scheduled"
  video_id: "john-athayde-blue-ridge-ruby-2026"
  description: |-
    I've farmed with permaculture since 2013 and designed & built software for 20+ years. Turns out the same principles apply: observe before acting, produce no waste, value the margins. Let's explore what the garden can teach us about building software that lasts.
  speakers:
    - John Athayde

- id: "joel-quenneville-blue-ridge-ruby-2026"
  title: "State is the First Decision You Never Made"
  date: "2026-04-30"
  slides_url: "https://speakerdeck.com/joelq/state-is-the-first-decision-you-never-made"
  video_provider: "scheduled"
  video_id: "joel-quenneville-blue-ridge-ruby-2026"
  description: |-
    Web apps are built on a paradox: stateful experiences over a stateless web. State decisions permeate the stack, yet are often made implicitly while teams debate frameworks, APIs, or architecture. This talk shows how those decisions shape real features and how to build *with* the web platform instead of fighting it.
  speakers:
    - Joël Quenneville

- id: "ifat-ribon-blue-ridge-ruby-2026"
  title: "Yes, &…: Ruby's Secret Talent for Improvisation"
  date: "2026-04-30"
  video_provider: "scheduled"
  video_id: "ifat-ribon-blue-ridge-ruby-2026"
  description: |-
    Did you know Ruby is an improviser? With its ability to take blocks at will, Ruby lets methods pass the conversation to blocks that happily accept what's given and add to it. This talk explores blocks, procs, and lambdas as Ruby's way of saying "Yes, and…", with playful examples, surprising behavior, and joyful chaos along the way.
  speakers:
    - Ifat Ribon

- id: "annie-kiley-blue-ridge-ruby-2026"
  title: "How To Finish What You Start: Lessons From Actually Shipping a Big Refactor"
  date: "2026-04-30"
  video_provider: "scheduled"
  video_id: "annie-kiley-blue-ridge-ruby-2026"
  description: |-
    Every developer has at least one major refactor they would love to make happen. Somehow, these projects are tough to start and even tougher to finish. My team recently completed a major overhaul of our permissions and access system, and it felt great to actually get one of these big refactors done. In this talk, I'll share the practical lessons that helped us ship it without breaking things or losing momentum, so you can finish your next big change too.
  speakers:
    - Annie Kiley

- id: "kevin-murphy-blue-ridge-ruby-2026"
  title: "InstiLLMent of Successful Practices in an Agentic World"
  date: "2026-04-30"
  video_provider: "scheduled"
  video_id: "kevin-murphy-blue-ridge-ruby-2026"
  description: |-
    Congrats on joining Hours Unlimited. The Math and Numbers team is excited to have you join us on our journey to redefine the importance of numerals. This introductory session will provide tips and tricks for best interacting with powerfuLLMachine, the next-level platform we use to unlock productivity and effectiveness.
  speakers:
    - Kevin Murphy

# Day 2 - Friday, May 1st

- id: "brooke-kuhlmann-blue-ridge-ruby-2026"
  title: "Terminus: A Hanami + htmx web application for e-ink devices"
  date: "2026-05-01"
  video_provider: "scheduled"
  video_id: "brooke-kuhlmann-blue-ridge-ruby-2026"
  description: |-
    Terminus is an open source web app built on Ruby, Hanami and htmx for displaying screens on e-ink devices. You'll learn about the design, architecture, and patterns used. Even better, the entire presentation is for e-ink displays (passed to the audience) so you can experience this in real-time!
  speakers:
    - Brooke Kuhlmann

- id: "rachael-wright-munn-blue-ridge-ruby-2026"
  title: "Your First Open-Source Contribution"
  date: "2026-05-01"
  video_provider: "scheduled"
  video_id: "rachael-wright-munn-blue-ridge-ruby-2026"
  description: |-
    Is open-source intimidating? Are you nervous about your code being rejected by the maintainers? Or maybe you just don't know where to start. Let's talk about it. Let's talk about the feelings. Let's talk about the practices. Let's get you that first open-source PR.
  speakers:
    - Rachael Wright-Munn

- id: "david-paluy-blue-ridge-ruby-2026"
  title: "LLM Telemetry as a First-Class Rails Concern"
  date: "2026-05-01"
  video_provider: "scheduled"
  video_id: "david-paluy-blue-ridge-ruby-2026"
  description: |-
    Your LLM calls deserve the same observability as your database queries. This talk shows how to architect telemetry as a domain concern—not scattered logger calls—so you can review prompts, track costs, and debug production AI features like a proper Rails developer.
  speakers:
    - David Paluy

