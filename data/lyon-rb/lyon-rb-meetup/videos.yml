  description: |-
    We are back!

    Quel plaisir de pouvoir préparer un événement Lyon.rb à nouveau ! Après 2 ans d'absence à cause du Covid, on revient plus motivé que jamais.

    Durant cet évènement vous aurez l'occasion d'assister à des présentations et rencontrer les membres de la communauté Ruby lyonnaise.

    "Performance Web, de quoi parle-t-on ?", par Guillaume Briday (environ 20 minutes). On compare souvent les langages et frameworks entre eux. Mais de quoi parle-t-on quand on parle de performance Web ? Quel impact réel pour les utilisateurs ?
    "Threads et Ractors : concurrence et parallélisme en Ruby" par Gabriel Terrien (environ 20 minutes). Ruby 3 a diversifié la façon de lancer des tâches en parallèle. Cette première présentation abordera de manière simple et basique, en pure Ruby, ces abstractions désormais à notre disposition.
    "Postgres FDW FTW" par Mehdi Lahmam (environ 20 minutes). Aviez-vous déjà eu envie de croiser des données de plusieurs bases de données PG différentes, voire une base de données et une feuille Excel de l'équipe marketing ou finance ? Découvrez les Foreign Data Wrapper de Postgres et comment vous pourriez fabriquer un data warehouse assez facilement sans sortir l'artillerie lourde.
    Le déroulé de la soirée :

    18h30 : Début du meetup, faisons connaissance
    19h00 : Présentations par les membres de la communauté Lyon.rb
    20h00 : Débats et échanges entre participants avec à boire et à manger
    21h30 : Fin du meetup

    L'évènement sera généreusement accueilli par Per Angusta dans leurs nouveaux locaux à Lyon/Villeurbanne, à côté du parc de la tête d'Or. Il sera sponsorisé par Per Angusta et Stimulus Components.

    Dernière chose : L'évènement sera retransmis en direct sur les Internet, vous n'avez donc aucune excuse de ne pas y participer 🤣 Les informations vous seront transmises quelques jours avant.

    Vous souhaitez présenter ou proposer un sujet à la communauté ? Contactez Jean-Michel ou Guillaume.

