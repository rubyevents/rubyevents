  description: |-
    SpendHQ (anciennement Per Angusta) et Studio HB ont le plaisir de vous inviter à un nouveau meetup Lyon.RB !

    Nous allons reprendre le format utilisé la dernière fois avec des lightning talks, c’est-à-dire 2 ou 3 présentations de 20 à 25 minutes, puisque cela semblait vous avoir bien plu !

    📢 Durant cet évènement vous aurez l’occasion d’assister à des présentations et rencontrer les membres de la communauté Ruby lyonnaise.

    "Beyond Code: Becoming a Product Engineer" Par Medhi Lahman. Et si le rôle du développeur ne se limitait pas à livrer des tickets ?
    Ce talk invite les devs à adopter la posture de Product Engineer : un·e dev qui s’implique dans les décisions produit, challenge les specs, et maximise l’impact utilisateur. À travers des exemples concrets et des bonnes pratiques d’équipe, on verra comment contribuer à la discovery aussi bien qu’à la delivery, sans changer de métier, juste d'état d'esprit.

    "From Local to Global: Making Rails apps resilient", Par Guillaume Briday. Aller en production, c’est simple. Y rester, c’est une autre histoire. À travers des exemples concrets, on verra ce qui fait une application résiliente et performante, où que vous soyez dans le monde.

    "Understanding Puma : The Low-Level Side of concurrency in Rails", Par Geoffroy Dubruel. Plongeons dans les coulisses de Rails et de son serveur web Puma tout en suivant le parcours d’une requête et découvrons ensemble ce que sont les threads, processus et la concurrence. Un talk accessible, pensé pour démystifier les processus internes que l'on croise tous les jours dans nos applications.

    🗓️ Le déroulé de la soirée :

    18h30 : Début du meetup, faisons connaissance
    19h00 : Présentations par les membres de la communauté Lyon.rb
    20h00 : Débats et échanges entre participants avec à boire et à manger
    21h30 : Fin du meetup
    📍 L’évènement sera généreusement accueilli par le Wagon Lyon, juste derrière l'hôtel de ville.

    🥗 🍕 Il sera accompagné d'un buffet et de boissons pour profiter au mieux de la soirée !

    🎥 Retrouvez nos replays des précédentes éditions sur notre chaine YouTube:
    https://www.youtube.com/playlist?list=PLWO0_50XhBj9zScZBHL_Dn13OrSJQ2lKt

