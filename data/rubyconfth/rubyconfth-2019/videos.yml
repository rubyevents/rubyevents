- id: "giovanni-sakti-rubyconf-th-2019"
  title: "Guide to Discourage your Boss from Migrating into Kubernetes"
  raw_title: "RubyConf TH 2019 - Guide to Discourage your Boss from Migrating into Kubernetes by Giovanni Sakti"
  event_name: "RubyConf TH 2019"
  date: "2019-09-06"
  published_at: "2019-10-15"
  video_provider: "youtube"
  video_id: "ZrF4mb5Hgt0"
  description: |-
    Practical Guide to Discourage your Boss from Migrating into Kubernetes by Giovanni Sakti.

    Kubernetes and all the ‘cloud-native’ baggage that it brings are some of the most-talked about stuff recently. More and more companies are adopting Kubernetes to deploy and manage their services. There are also lots of other companies that are starting to provide Kubernetes-as-a-service, not to mention dozens of open source projects that are published almost every week related to it.

    For those who are still using more ‘traditional’ approach, such as VM-based deployment, Kubernetes can be very daunting because there are tons of new concepts being introduced. And because of the buzz around it, sometimes we feel the urge to use it even though it might not be appropriate for our use case.

    Therefore in this talk, I want to convince you that it is not necessary to use Kubernetes, unless proven otherwise :)
  speakers:
    - Giovanni Sakti

- id: "gabriel-fortuna-rubyconf-th-2019"
  title: "How We Use Service Objects to Make Our Apps Clean, Composable, Maintainable, and Testable"
  event_name: "RubyConf TH 2019"
  date: "2019-09-06"
  published_at: "2019-10-15"
  video_provider: "youtube"
  video_id: "omCsnwAzDy4"
  description: |-
    How we use service objects to make our apps clean, composable, maintainable, and testable by Gabriel Fortuna.

    Wouldn't it be great if you could keep the maintainability of your app high even as it grew in complexity? Wouldn't it feel wonderful to know that all your app functionality is fully tested, and that those tests are fast? How amazing would it be to start finally treating your app like a set of lego bricks?

    Using service objects can get you a very long way there. They're not a silver bullet by any stretch of the imagination, but in my experience, they have been the number one thing alongside TDD that has really elevated my skill level.

    Not all service object toolchains are created equal, and there are downsides, trade-offs, benefits, and useful shortcuts to be gained depending on the kind you reach for. I've battle tested a bunch of them, and this talk will include pointers for helping you decide what's right for you, for when you start using these tools in your own software projects.

    Join me as I walk through the learnings to be had from using this software development technique, and how I've matured my thinking on this topic to make me an extremely effective developer that ships robust working code.
  speakers:
    - Gabriel Fortuna

