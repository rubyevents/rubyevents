  talks:
    - id: "nathan-hessler-austinrb-meetup-june-2025"
      title: "Rewriting Localhost: A Modern Approach to Dev Environments"
      event_name: "Austin.rb Meetup June 2025"
      date: "2025-06-10"
      video_provider: "not_recorded"
      video_id: "nathan-hessler-austinrb-meetup-june-2025"
      description: |-
        Tired of juggling ports and localhost? Whether you're building monoliths or microservices, a clean local domain setup can simplify your dev workflow, mirror production more accurately, and make multi-app environments a breeze. In this talk, we’ll explore a few modern options. walking through how to set them up, when to use them, and how they play nicely (or not) with Docker/Ruby/Etc... You'll leave with flexible, practical strategies to level up your local environment — and maybe even impress your teammates.
      speakers:
      - Nathan Hessler

