    Like Nick Wolf told us back in https://www.youtube.com/watch?v=PkZTlvLmpvw

    but breaking the build for a missing comma costs companies millions 💵
    why not be the developer who builds tools for other developers and prevents this from 📣 "ever happening again! like ever!"

    In this 5-minute lightning talk, I will show you how to safeguard your team from ever wasting time on broken builds due to a rubocop linting failure - almost ever. I will also include some real examples of how cool rubocop is as well as how to get started in a legacy codebase adding rubocop for the first time. Finishing it off with another "classic fixup commit" you can fix for your team!
