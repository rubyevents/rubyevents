  video_provider: "youtube"
  video_id: "66-encontro-do-guru-sp-na-le-wagon-sp"
  description: |-
    No dia 2 de dezembro de 2023 fizemos o nosso primeiro encontro na escola de Le Wagon São Paulo e o último encontro do ano. 
    O coffe-break deste encontro foi patrocinado pela plataforma de contabilidade Adaflow. Nesse encontro tivemos a honra de receber 
    o Rafael França e contamos com certa de 60 partipantes.

    Agradecimentos:
      - Ao Eduardo Piccin da Le Wagon e a Amanda Ortega da
        Adaflow que viabilizaram a realização desse encontro com o o local e coffe-break;
      - Ao Celso Crivelaro e Rafael França que enviaram palestras pelo CFP do Guru-SP;
      - A Debora Fernandes e o Cidão que ajudaram na divulgação do 
        encontro, palestraram e estão organizando a Tropical.rb 2024;
      - Roanalde Monezzi e Vitória Vital que aceitaram o 
        convite para palestrar no encontro;
      - Ao Mateus Braga que mais uma vez palestrou e ajudou no dia do evento;
      - A todas pessoas que participaram do encontro e contribuíram com 
        as dicussões dos assuntos abordados, inclusive com perguntas 
        e comentários realizados por quem acompanhou o encontro online pelo Youtube.
  published_at: "2023-12-12"
