- id: "keith-pitty-rubyconf-au-2019"
  title: '"What were they thinking?"'
  raw_title: '"What were they thinking?"'
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "KiGbAbjYAjI"
  description: |-
    This is a sentiment many Rails developers have experienced whilst reading a legacy codebase, trying to glean the motivations behind the code or simply understand what it is
    meant to do. This talk turns that perspective on its head and asks, “what can I do to prevent this scenario?"

    Keith Pitty has been developing software professionally for more than three decades. Since 2000 he has maintained a keen interest in Agile approaches and for the last ten years
    has made many contributions to the Australian Ruby community. He has been fascinated by how developers consider other people when developing software since his early days of
    programming on mainframes. Away from computers he enjoys golf, is a cricket tragic and a passionate Collingwood supporter.
  speakers:
    - Keith Pitty

# Morning Tea

- id: "tim-riley-rubyconf-au-2019"
  title: "Views, From The Top"
  raw_title: "Views, from the top"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "VGWt1OLFzdU"
  description: |-
    /Veni, vidi, view-ci/ – I came, I saw, I left the views in a mess.

    With server-rendered HTML still delivering most of the web, our views deserve more than a grab bag of helpers.

    Come along and learn the tools and techniques to conquer the design challenges that a complex view layer presents.

    Tim Riley is a partner at Australian design agency Icelab, and a core developer of dry-rb and rom-rb. He’s excited by small libraries, first-class functions, and pushing
    forward web app development with Ruby.
  speakers:
    - Tim Riley

- id: "mila-dymnikova-rubyconf-au-2019"
  title: "Learn to make the point: data visualisation strategy"
  raw_title: "Learn to make the point: data visualisation strategy"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "4OkoJxR3jdM"
  description: |-
    Let me guess, your code is awesome but no one else gets it? You need a data visualisation! Complex concepts can easily be explained through visual information. There are four
    types to choose from storytelling, status, analytical and exploratory. I’ll help you find the perfect one.

    Mila is a data geek that loves data visualisations. Especially if the data visualisation is related to cats. Ruby is still her favourite language because of the community and
    how expressive it is. When she's not coding, you’ll find Mila cruising on an electric skateboard.
  speakers:
    - Mila Dymnikova

- id: "john-sawers-rubyconf-au-2019"
  title: "Hacking Your Emotional API"
  raw_title: "Hacking Your Emotional API"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "OGDRUI8biTc"
  description: |-
    Being a good developer isn’t just about slinging code; we’re part of a community. Interacting with others in a community means feelings are involved.

    In this talk you’ll learn how emotions are affecting you by modeling them as an API and looking at the code.

    John the co-founder and CTO of Data Simply and a Senior Developer at Privia Health. He’s been programming professionally for two decades, in Perl, Java, PHP and Ruby. In recent
    years he has also been supervising workshops called “Purpose, Passion, Peace” which helps people get deeply in touch with themselves and liberated from past traumas. He has
    fused his expertise from these disparate areas into a new way of thinking about them both.
  speakers:
    - John Sawers

# Lunch

- id: "elle-meredith-rubyconf-au-2019"
  title: "Algorithms to live by and why should we care"
  raw_title: "Algorithms to live by and why should we care"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "kxYL0EyYOKw"
  description: |-
    In this talk we will discuss algorithmic thinking in everyday life in language we can all understand. We will explore widely applicable algorithms, and how they reveal
    themselves in our everyday lives, so that we better understand what when and how we can use them in our programs.

    Elle is a full stack web developer with more than ten years experience writing Ruby and Rails. Currently at Blackmill, previously she was Development Director at thoughtbot New
    York. Elle believes in writing clean code, driven by automatic tests, with agile practices, an even work/life balance, and a respectful and inclusive team culture. Recently,
    she developed and ran the apprenticeship program for Hooroo, up-skilling less experienced developers. When she is not immersed in the Ruby community, she is probably immersed
    in water, or lately, in bread flour.
  speakers:
    - Elle Meredith

- id: "tom-ridge-rubyconf-au-2019"
  title: "Building APIs You Want To Hug With GraphQL"
  raw_title: "Building APIs you want to hug with GraphQL"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "lyJebJuG_sk"
  description: |-
    REST-ful, more like stress-ful am I right? What if I told you you could build amazing APIs your cat would be proud of with GraphQL instead.

    Let’s take a look at how to go about implementing a GraphQL API that’s evolvable and empowers your team.

    Tom Ridge is a developer currently residing in Brisbane, Australia. A father of twins, he’s recently organised a Rails Camp, was Vice President of Ruby Australia and has
    co-organised his local meetup. Somehow, he’s still not sure why he has so little free time.
  speakers:
    - Tom Ridge

# Coffee Break

- id: "tom-gamon-rubyconf-au-2019"
  title: "What The Hell is a JRuby?"
  raw_title: "What the hell is a JRuby?"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "qJqC6xm-2PI"
  description: |-
    If you are like me and you don’t know your MRI from your RBX, you think a Truffle Ruby sounds delicious and panic when someone mentions JRuby, then this talk is for you. We
    will delve into JRuby and figure out what it is, why it is and how it is different from 'normal' ruby and other alternative Ruby implementations.

    I am a Ruby developer working out of Melbourne. I am awful at writing bios, I like tinkering with electronics and I know my chiffonade from my chicory.
  speakers:
