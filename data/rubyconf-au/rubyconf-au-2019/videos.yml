- id: "tom-stuart-rubyconf-au-2019"
  title: "Representations Count"
  raw_title: "Representations Count"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "ej-W956YQN0"
  description: |-
    In your grandparents’ attic you discover a mysterious old computer. You boot it up and discover it runs Ruby, but doesn’t support negative numbers! How can you implement
    negative numbers in an elegant way? We’ll explore two solutions and discover how important it is to pick the right representation.

    [Tom](https://twitter.com/tomstuart) is a [computer scientist](http://computationbook.com/) and programmer. He has lectured on optimising compilers at the University of
    Cambridge, co-organises the Ruby Manor conference, and is a member of the London Ruby User Group. He is currently the CTO of [FutureLearn](https://www.futurelearn.com/), an
    online learning platform.
  speakers:
    - Tom Stuart

# Lunch

- id: "daniel-fone-rubyconf-au-2019"
  title: "What Could Go Wrong? The Subtle Science Of Coding for Failure"
  raw_title: "What Could Go Wrong? The Subtle Science Of Coding for Failure"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "R7BSwkvGoH0"
  description: |-
    Software development is the anticipation of a thousand dangers: regressions, edge-cases, exceptions, attacks, downtime, the list is endless. Drawing from a wide range of
    disciplines, we’ll build a simple model for quantifying danger, explore why the human brain is so bad at it, and examine some practical applications for our development
    processes. There will be at least one science.

    [Daniel](http://daniel.fone.net.nz/) has been writing Ruby/Rails for about 10 years. In recent years he has been helping to organise the Christchurch Ruby meetups and serving
    as secretary on the Ruby New Zealand committee. He lives in 🇳🇿 with 👨‍👩‍👧‍👦👶, and enjoys 🏃, 🍺, and 🔎 📖 ἡ κοινὴ. Much like Ruby, he tries to be optimised for
    happiness — both his own and other people's.
  speakers:
    - Daniel Fone

- id: "laura-mosher-rubyconf-au-2019"
  title: "Harry the Hedgehog Learns You A Communication"
  raw_title: "Harry the Hedgehog Learns You A Communication"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "1R_2MZC81Aw"
  description: |-
    Communication is one of the most difficult skills to master in software development. There are many shortfalls in communication — both written and spoken — that have an impact
    on how you are perceived. Harry the Hedgehog will uncover some of those shortfalls and how he overcame them.

    Laura is a software engineer with a passion for clean code and oxford commas. She’s passionate about creating a better world through code, kindness, and understanding. When she
    isn’t coding, she enjoys rescuing hedgehogs, making things, and playing games.
  speakers:
    - Laura Mosher

# Coffee Break

- id: "kelly-sutton-rubyconf-au-2019"
  title: "Taming Monoliths Without Microservices"
  raw_title: "Taming Monoliths Without Microservices"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "-ovkkvvTiRM"
  description: |-
    In the recent years, microservices have been an investment among many engineering teams as they scale. They are often the default of many new companies.

    But how has that gone wrong? This talk will dive into how one company of ~100 engineers refined their thinking and their Rails app for the better.

    Kelly Sutton is an engineering manager at Gusto. In the past, he helped create LayerVault, Designer News, and a blog for college students. He is currently based in San
    Francisco, CA. He regularly writes blog posts about software engineering at https://kellysutton.com
  speakers:
    - Kelly Sutton

- id: "betsy-haibel-rubyconf-au-2019"
  title: "Pairing with People Who Don't Look Like You"
  raw_title: "Pairing with People Who Don't Look Like You"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "A_9v5L01fcs"
  description: |-
    Pair programming can be hazardous if you’re from an underrepresented group. Bad pairs will keyboard-hog, ignore your ideas, and talk down to you. In this talk, you’ll learn how
    to rescue pairing sessions from bad power dynamics – whether you’re a well-intentioned jerk or their long-suffering pair.

    Betsy Haibel is the founding CTO of Cohere. She writes fiction and nonfiction in English, Ruby, and Javascript – among other languages – and co-organizes Learn Ruby in DC. Her
    lifelong ambitions? To meet a red panda, and to break down barriers between “developers” and “users.”
  speakers:
    - Betsy Haibel

# Afternoon Tea

- id: "tekin-sleyman-rubyconf-au-2019"
  title: "A Branch in Time (a story about revision histories)"
  raw_title: "A Branch in Time (a story about revision histories)"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "1NoNTqank_U"
  description: |-
    In one timeline a quick path to clarity. In the other a painful journey trying to uncover the obscure intent of a line of code. The only difference between these two realities?
    The revision history…

    This is a story about revision histories and their impact on software maintainability. Think Sliding Doors, but with more Git!

    Tekin is a senior freelance consultant who’s been shipping Ruby code for over a decade. He’s worked with teams, large and small: from Government agencies (GDS) to listed
    startups (FreeAgent), and the world’s oldest and largest Co-operative (Co-op Digital). He also runs the North West Ruby User Group in Manchester, UK.
  speakers:
    - Tekin Süleyman

- id: "merrin-macleod-rubyconf-au-2019"
  title: "Environment Variables"
  raw_title: "Environment Variables"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "N4hiqGwTRBU"
  description: |-
    How can we minimise our software’s contribution to climate change? How do we make software that can withstand climate change-related disasters? How do we deal with the
    knowledge that we’re careening towards catastrophe?

    I don’t have all the answers, but let’s do some maths about it.

    Merrin is a Ruby developer with a background in design, social enterprise, and the electricity industry.
