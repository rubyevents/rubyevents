# Welcome and Opening Remarks

- id: "nadia-odunayo-rubyconf-au-2019"
  title: "The Case Of The Missing Method - A Ruby Mystery Story"
  raw_title: "The Case Of The Missing Method - A Ruby Mystery Story"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
  video_provider: "youtube"
  video_id: "aRkHqYDi_wQ"
  description: |-
    Business is slow for Ruby Private Investigator, Deirdre Bug. She’s on the verge of switching industry when she gets a call from an anxious young man. "Some class methods have
    gone missing," he tells her breathlessly. "I need your help."

    Deirdre takes the case and begins exploring Ruby objects behind the scenes. Though she thinks she's on familiar ground — Ruby's object model, method lookup — she's about to
    discover that she really has no clue.

    [Nadia](http://www.nadiaodunayo.com/) is CEO at [The StoryGraph](https://thestorygraph.com). Before that, she co-directed Ignition Works, a company that did a mix of in-house
    product development and software consultancy, helping large firms to manage their cloud platforms. She previously worked at Pivotal and originally learnt to code at Makers
    Academy in London. She maintains [speakerline.io](https://speakerline.io/) in her spare time.
  speakers:
    - Nadia Odunayo

