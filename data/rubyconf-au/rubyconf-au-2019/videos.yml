  description: |-
    Does your network only let through HTTP connections? No problem! Let’s hijack some sockets from incoming HTTP connections and use it to smuggle any kind of traffic through an
    HTTP session! Concurrently! In Ruby!

    Warning: your infosec team already does not like me, but I have some cute stickers.

