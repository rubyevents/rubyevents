- id: "kelsey-pedersen-rubyconf-au-2019"
  title: "It's Down! Simulating Incidents in Production"
  raw_title: "It's Down! Simulating Incidents in Production"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "NYZdambrG_I"
  description: |-
    Who loves getting paged at 3am? No one.

    In responding to incidents – either at 3am or the middle of the day – we want to feel prepared and practiced in resolving production issues. In this talk, you’ll learn how to
    practice incident response by simulating outages in your application.

    Kelsey Pedersen is a software engineer at Stitch Fix on the styling engineering team. She builds internal software their stylists use to curate clothes for their clients. She
    works cross-functionally with their styling community and data science team to build new features to better assist their stylists. She had a former career in sales and as a
    Division I rower at UC Berkeley.
  speakers:
    - Kelsey Pedersen

# Afternoon Tea

- id: "adam-cuppy-rubyconf-au-2019"
  title: "Mechanically Confident"
  raw_title: "Mechanically Confident"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "Btsx9YzhJVM"
  description: |-
    There’s a thread amongst all skilled practitioners: specific habits, routines, and processes that wrap uncertainty and create confidence. Oscar-winning actors rehearse,
    pro-drivers do laps, chefs prep. This talk will help you recognize and design habits and routines that embed confidence in the body."

    Adam is _not_ a Fortune 500 CEO, award-winning book author, or Nobel Prize recipient. But, he’s an actor turned software engineer who co-founded [ZEAL](https://codingzeal.com),
    a people-centric process-focused consulting company located around the United States.
  speakers:
    - Adam Cuppy

- id: "beth-haubert-rubyconf-au-2019"
  title: "Cats, The Musical! Algorithmic Song Meow-ification"
  raw_title: "Cats, The Musical! Algorithmic Song Meow-ification"
  event_name: "RubyConf AU 2019"
  date: "2019-02-08"
  published_at: "2019-02-08"
  video_provider: "youtube"
  video_id: "JTNPLwqJIDg"
  description: |-
    How are you supposed to sing along with your favorite TV theme song every week if it doesn't have lyrics? At my house, we "meow" along (loudly). We also code, so I built
    'Meowifier' to convert any song into a cat's meows. Join me in this exploration of melody analysis APIs and gratuitous cat gifs.

    I built an application that takes a song's audio and outputs a new audio file with that song's melody **sung by cats**. It's a technical feat. It's hilarious. It's beautiful.
    It's a new way to waste time on the internet.

    [Beth](https://www.bethanyhaubert.com/) is a software engineer who loves Ruby, little-known APIs, handcrafting SQL queries, and as many monitors on her desk as possible. She’s
    also a former airborne cryptologic linguist for the US Air Force, fluent in Mandarin. Things you can ask her about include cats, board games, karaoke, and building applications
    that convert songs into auto-tuned cat meows. Things she'll have to kill you if you ask her about: the airborne linguist part. Also, she likes to make emojis look like they're
    farting. 🐈💨"
  speakers:
    - Beth Haubert

