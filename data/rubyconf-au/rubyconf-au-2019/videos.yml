- id: "dvid-halsz-rubyconf-au-2019"
  title: "How to hijack, proxy and smuggle sockets with Rack/Ruby"
  raw_title: "How to hijack, proxy and smuggle sockets with Rack/Ruby"
  event_name: "RubyConf AU 2019"
  date: "2019-02-07"
  published_at: "2019-02-07"
