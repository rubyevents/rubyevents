  talks:
    - id: "jp-camara-bostonrb-meetup-october-2024"
      title: "In-Depth Ruby Concurrency: Navigating the Ruby concurrency landscape"
      event_name: "Boston Ruby Group Meetup October 2024"
      date: "2024-10-15"
      video_provider: "not_recorded"
      video_id: "jp-camara-bostonrb-meetup-october-2024"
      description: |-
        When do I use a Process, or a Thread, or a Fiber? And Why? Can I use Ractors yet? What is the FiberScheduler? The M:N Thread scheduler? In this talk, we'll build an understanding of the Ruby concurrency landscape, and map that understanding onto concurrent gems like Sidekiq, Puma, Falcon, Pitchfork, SolidQueue and Mooro. My goal is for you to better understand how they work, what concurrency options they offer, and how you can best utilize them for scaling your applications.
      speakers:
        - JP Camara

