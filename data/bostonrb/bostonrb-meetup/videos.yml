  video_id: "bostonrb-meetup-september-2024"
  description: |-
    https://luma.com/sbesulha
  talks:
    - id: "shardly-romelus-bostonrb-meetup-september-2024"
      title: "Demystifying .html.erb - Behind the Scenes of Rails View Rendering"
      event_name: "Boston Ruby Group Meetup September 2024"
      date: "2024-09-17"
      video_provider: "not_recorded"
      video_id: "shardly-romelus-bostonrb-meetup-september-2024"
      description: |-
        I have always wondered how Rails processes .html.erb files and specifically the content inside ERB tags. In this talk, I will walk through what happens behind the scenes in ActionView module to generate the body of a response when a controller action is invoked. We'll explore how Rails locates the appropriate view, how ActionView processes the ERB file, and how Ruby code is evaluated to dynamically render the final HTML content.
      speakers:
        - Shardly Romelus

    - id: "freedom-dumlao-bostonrb-meetup-september-2024"
      title: "When one is greater than 70: How the Rails Monolith saved our company"
      event_name: "Boston Ruby Group Meetup September 2024"
      date: "2024-09-17"
      video_provider: "not_recorded"
      video_id: "freedom-dumlao-bostonrb-meetup-september-2024"
      description: |-
        The history of Rails is full of stories of companies that decided they'd outgrown it, and replatformed away. This is the story of how we did the opposite, and how it saved our company. Follow along, and I'll share some insights that can hopefully help you do the same thing at your company, or at least have the tools to avoid falling into the traps we found ourselves in.
      speakers:
        - Freedom Dumlao

