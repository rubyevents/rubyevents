  talks:
    - id: "jason-swett-bostonrb-meetup-june-2024"
      title: "Writing Understandable Tests"
      event_name: "Boston Ruby Group Meetup June 2024"
      date: "2024-06-11"
      video_provider: "not_recorded"
      video_id: "jason-swett-bostonrb-meetup-june-2024"
      description: |-
        Automated tests can be helpful for catching regressions, but if the tests are hard to understand, they're going to be hard to work with and their value will be greatly diminished. In this talk, Jason Swett, host of the Code with Jason Podcast and author of The Complete Guide to Rails Testing, will share some of the most common understandability mistakes organizations make and how to correct them so that you get maximum benefit out of your test suite.
      speakers:
