  talks:
    - id: "cody-norman-bostonrb-meetup-august-2024"
      title: "Attraction Mailbox - Why I Love Action Mailbox"
      event_name: "Boston Ruby Group Meetup August 2024"
      date: "2024-08-13"
      video_provider: "not_recorded"
      video_id: "cody-norman-bostonrb-meetup-august-2024"
      description: |-
        Email is a powerful and flexible way to extend the capabilities of your Rails application. It's a familiar and low friction way for users to interact with your app. As much as you may want your users to access your app, they may not need to. Email is a great example of focusing on the problem at hand instead of an over-complicated solution. We'll take a deeper look at Action Mailbox and how to route and process your inbound emails.
      speakers:
        - Cody Norman

    - id: "freedom-dumlao-bostonrb-meetup-august-2024"
      title: "Panel Discussion: Misconceptions in Hiring"
      event_name: "Boston Ruby Group Meetup August 2024"
      date: "2024-08-13"
      video_provider: "not_recorded"
      video_id: "freedom-dumlao-bostonrb-meetup-august-2024"
      description: |-
        What happens after you apply? Hear from experienced hiring managers on how to navigate a challenging market for job seekers, focused on common myths and misconceptions. Learn how engineering leaders think about Ruby expertise and how to prepare yourself for the modern interview process.
      speakers:
        - Freedom Dumlao

