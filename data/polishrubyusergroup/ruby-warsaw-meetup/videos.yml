    🎤 Chris Hasiński - Next token! (Or how to work with LLMs)
    🎤 Sergy Sergyenko - How to integrate on premise LLM model with your application
    🎤 W. Landon Gray - The Missing Piece: Effective Tooling for Building Robust AI and Data Science Applications in Ruby

    IMPORTANT CHANGE
    Unfortunately this time we will not have the pleasure of hosting Katarzyna Hewelt with the topic "AI Agents: A Guide to Building Custom Chatbots" but we hope we can make up for it in the future!

    Please make sure to save the date in your calendar and confirm your attendance. The number of spots is limited, and we are counting on your presence!

    We hope to see you at the afterparty at Browary Warszawskie after the event! 🍻

