  talks:
    - id: "murray-steele-nwrug-june-2024"
      title: "Re-interpreting Data"
      event_name: "North West Ruby User Group June 2024"
      date: "2024-06-20"
      video_provider: "not_recorded"
      video_id: "murray-steele-nwrug-june-2024"
      description: |-
        A talk about turning data into other data. What if you could listen to a jpeg, or see what an executable file looked like, or turn a zip file into an orchestral score? We'll explore how it works for WAV files, BMP files and MIDI files, and along the way learn about using Ruby to manipulate raw bytes and bits of data.
      speakers:
        - Murray Steele

