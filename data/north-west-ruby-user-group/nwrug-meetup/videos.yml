      date: "2024-05-16"
      video_provider: "not_recorded"
      video_id: "tornado-nwrug-may-2024"
      description: |-
        Over the 2023 Christmas period, a tornado hit my home. As I started to work towards fixing my home and returning to normality, I realised that all I was doing was solving a problem, not unlike any other scary problem we face as developers. Through sharing my story I hope to convey a perspective that we can all use when we're faced with stressful and seemingly complex software problems.
