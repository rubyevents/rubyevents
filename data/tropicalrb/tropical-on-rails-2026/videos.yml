  description: |-
    OWASP released an updated Top 10 list of web vulnerabilities at the end of last year. Greg goes through each one, explaining how it affects Rails applications and how to mitigate it.

    Security matters more now that LLM-assisted development is becoming common. Developers are getting detached from the code and need to put more focus on reviewing for security issues, while using all the tooling available to prevent vulnerabilities. Rails ships with great security defaults, but there are entire classes of vulnerabilities that defaults can't catch. This talk covers those, with tips you can apply tomorrow.

