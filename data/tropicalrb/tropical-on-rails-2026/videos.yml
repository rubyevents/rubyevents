- id: "marco-roth-tropical-on-rails-2026"
  title: "Keynote: Your Views Deserve a Grammar"
  raw_title: "Marco Roth: Why Rails Needs a View Layer Toolchain — Tropical on Rails 2026"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:17Z"
  announced_at: "2025-10-27 13:30 UTC"
  slides_url: "https://speakerdeck.com/marcoroth/your-views-deserve-a-grammar-at-tropical-on-rails-2026-sao-paulo-brazil"
  video_provider: "youtube"
  video_id: "LRtbNgNCzp4"
  description: |-
    Rails has always been the "batteries included" framework, but the view layer never got the same treatment. HTML+ERB has been loosely defined for 20 years. What happens when you give it a proper grammar? You get a parser, a toolchain, and eventually, reactivity.

    From a parser written in C, to a linter with 60+ rules, a language server, a rendering engine, and browser dev tools, all powered by the same syntax tree. We'll trace the evolution from Turbolinks to Hotwire, show where the current approach hits a ceiling, and introduce Herb and ReActionView: a path to reactive, server-rendered Rails views without leaving ERB behind.
  speakers:
    - Marco Roth

- id: "rachael-wright-munn-tropical-on-rails-2026"
  title: "Unboxing Devcontainers and Docker for Rubyists"
  raw_title: "Rachael Wright-Munn: Unboxing Devcontainers and Docker for Rubyists"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:19Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "hx3erxi-kOY"
  description: |-
    Rails 7.2 added devcontainers, which combine a local developer experience with Docker's portability. But adoption is slow because Docker, Docker Compose, and devcontainers are all confusing. In this talk, Rachael unboxes these concepts and explains best practices using real examples from open source Rails projects, Rails itself, RubyEvents, and Lobsters, which use these tools to onboard contributors.

    By the end, you'll have the tools and knowledge to build devcontainers that just work, with consistent environments across any OS, any setup, even in the cloud.
  speakers:
    - Rachael Wright-Munn

- id: "miguel-marcondes-filho-tropical-on-rails-2026"
  title: "What Works (and What Doesn't) with ActiveRecord::Tenanted and SQLite"
  raw_title: "Miguel Marcondes Filho: What Works (and What Doesn't) with ActiveRecord::Tenanted"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:39Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "RULQNHUryTc"
  description: |-
    Basecamp's new ActiveRecord::Tenanted gem brings database-per-tenant architecture to Rails with SQLite, perfect for healthcare, finance, and legal applications where data leakage carries serious consequences. Miguel shares lessons from being an early adopter implementing this brand-new gem in a Healthcare Management System.

    The talk covers how Tenanted differs from acts_as_tenant and apartment, its automatic tenant context via middleware, the NoTenantError safety mechanism, and deep Rails integration (Action Job, Cable, Storage, caching). Miguel reveals current limitations (SQLite-only, connection pool constraints), shares workarounds from GitHub discussions with maintainers, and shows what's already mapped on the roadmap.
  speakers:
    - Miguel Marcondes Filho

- id: "nicolas-erlichman-tropical-on-rails-2026"
  title: "Modeling Class Hierarchies in Active Record"
  raw_title: "Nicolas Erlichman: Modeling Class Hierarchies in Active Record"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:25Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "Fx-qjtO3WF8"
  description: |-
    Single-table inheritance and purely abstract classes work, until they don't. So where do you turn when modeling starts to get messy?

    Nicolas breaks down single-table inheritance, purely abstract classes, and delegated types in Active Record. He discusses when each makes sense, where they fall short, and how to choose the right tool for the job. The focus is on understanding trade-offs and making better architectural choices, not on which approach is "better".

    This isn't a new framework topic, but delegated types in particular are underused. Nicolas shares lessons from real-world modeling decisions where balancing simplicity, performance, and maintainability matters more than picking a favorite.
  speakers:
    - Nicolas Erlichman

- id: "igor-aleksandrov-tropical-on-rails-2026"
  title: "Overreacting – from React to Hotwire"
  raw_title: "Igor Aleksandrov: Overreacting — from React to Hotwire"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:29Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "VxLOc-4wkO0"
  description: |-
    Igor's team migrated from React to Rails without rewriting everything. They kept the SPA running, built new features in Hotwire, and one Rails developer with AI now ships what used to take a frontend+backend duo.

    This isn't "React bad, Rails good". It's about choosing the right tool, and choosing boring technology that ships. Igor shares the hybrid migration strategy, authentication patterns, component conversions, deployment architecture, and 18 months of production data on velocity improvements, performance metrics, and honest gotchas.

    You'll leave with a decision framework and permission to pick simplicity over sophistication.
  speakers:
    - Igor Aleksandrov

- id: "braulio-martinez-tropical-on-rails-2026"
  title: "Passkey Authentication on Rails"
  raw_title: "Braulio Martinez: Passkey Authentication on Rails"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:04Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "iYek4-heOxo"
  description: |-
    Passwords are still the default authentication method, despite poor security and UX. WebAuthn and Passkeys, created by the FIDO Alliance and standardized by W3C, enable secure passwordless login using public-key cryptography and biometrics.

    This is an accessible introduction for Ruby and Rails developers of any experience level. It assumes no cryptography background and focuses on practical, production-ready adoption. You'll understand why passwords fail, how WebAuthn works (credentials, registration, authentication), the benefits and trade-offs of Passkeys, and how to add secure, phishing-resistant auth to Rails 8 and Devise-based apps using existing OSS tools.
  speakers:
    - Braulio Martinez

- id: "luiz-carvalho-tropical-on-rails-2026"
  title: "DefGPT: AI agent platform on Rails"
  raw_title: "Luiz Carvalho: DefGPT — AI Agents in Rails at the Public Defender's Office"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:20Z"
  announced_at: "2026-01-28"
  language: "Portuguese"
  video_provider: "youtube"
  video_id: "kR7vB_49-4Q"
  description: |-
    DefGPT is a multi-agent AI platform built in Ruby on Rails for the Public Defender's Office of Tocantins, in the heart of Brazil. It won two national innovation awards. It reduced 1.5 years of human work to 11 days, projecting R$ 3.8 million in returns at zero additional cost.

    Luiz shares how the team scaled the analysis of 100,000 stalled legal cases using a multi-agent architecture with asynchronous processing and local LLMs (Ollama, Llama 3 8B). Spoiler: it's actually AI workflows, not agents. With local models and zero budget, workflows beat agents on both reliability and token cost. You'll learn how the platform handles document ingestion from court systems, how the team debugged a context window issue that took weeks to find (the relevant info was on the last page of the document), and what it took to run all of this on a borrowed CPU server with no GPU.

    The bigger message: when you have a lot, optimization is a choice. When you have little, it's mandatory.
  speakers:
    - Luiz Carvalho

- id: "rodrigo-serradura-tropical-on-rails-2026"
  title: "The Monolith Strikes Back: Why AI Agents Love Rails Monoliths"
  raw_title: "Rodrigo Serradura: The Monolith Strikes Back — Why AI Agents Love Rails"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:06Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "QFJrEngm3cA"
  description: |-
    AI agents have a fundamental limitation: context. When your system is spread across multiple repositories and services, agents only see fragments — they hallucinate about integrations and break contracts they didn't know existed.

    Modular monoliths solve this. They keep the entire solution within reach of humans and agents alike. Rodrigo shows how namespaces, cohesive components, and loose coupling multiply the effectiveness of AI-assisted development. From 15 years maintaining Rails apps and currently leading AI adoption at scale, he shares patterns for agent-friendly monoliths: orthogonality, dev workflow with AI-assisted refinement, solution discovery, and refactoring as superpower (trivial in monoliths, near-impossible in microservices).

    The patterns we've championed for years — modularity, cohesion, loose coupling — are now the difference between agents that help and agents that hallucinate.
  speakers:
    - Rodrigo Serradura

- id: "adrianna-chang-tropical-on-rails-2026"
  title: "Keynote: How Shopify Brought Structured Events to Rails 8.1"
  raw_title: "Adrianna Chang: How Shopify Brought Structured Events to Rails 8.1 — Tropical on Rails 2026"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-09"
  published_at: "2026-05-28T03:00:15Z"
  announced_at: "2025-10-22 12:30 UTC"
  video_provider: "youtube"
  video_id: "sZPjI36Uczw"
  description: |-
    Shopify is one of the largest Rails apps in the world: millions of lines of Ruby, tens of thousands of tests, thousands of engineers. Last Black Friday Cyber Monday weekend, the platform handled 14.8 trillion database queries, peaked at 489 million requests per minute, and processed 11 terabytes of logs per minute. All on Rails.

    In this talk, Adrianna shares the story behind the structured Event Reporter (rails.event), the feature she helped ship in Rails 8.1. It started because Shopify was replacing Splunk with an internal logging platform that couldn't index freeform text. They needed structured logs. But from the start, the team wanted to build something useful for the whole Rails community.

    You'll learn how Shopify reframed logs as events, the API design choices the team made, and five concrete lessons from contributing a large feature to Rails open source: find the API that feels like Rails, set strong conventions, design simple APIs, avoid abstracting too early, and remember that Rails grows because the community shapes it together.
  speakers:
    - Adrianna Chang

- id: "fabio-akita-keynote-tropical-on-rails-2026"
  title: "Keynote: Minha Experiência com Agile Vibe Coding"
  raw_title: "Fabio Akita: Minha Experiência com Agile Vibe Coding"
  kind: "keynote"
  date: "2026-04-10"
  published_at: "2026-05-28T03:00:24Z"
  language: "Portuguese"
  video_provider: "youtube"
  video_id: "U3bZavG8qQY"
  description: |-
    Fabio Akita shares lessons from 37 days of full immersion in "vibe coding": building real, production-deployed projects with the current generation of LLMs and coding agents. Not weekend toy projects. Real apps, with users, deploys, and the maintenance pain that comes after.

    The numbers: 653 commits, ~144,000 lines of code, 8 projects published on GitHub, all documented in a series of post-mortems on AkitaOnRails.com. The talk covers what current agents really can and can't do, the business models that make sense (and the ones that don't), failures and recoveries (Frank Yomik), and why "one-shot prompt" is a myth — software is never truly "done".
  speakers:
    - Fabio Akita

- id: "talysson-de-oliveira-cassiano-tropical-on-rails-2026"
  title: "Privacy on Rails - pragmatically complying to data protection laws"
  raw_title: "Talysson de Oliveira Cassiano: Privacy on Rails — Pragmatic LGPD/GDPR"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-10"
  published_at: "2026-05-28T03:00:36Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "3wftwdz9NQ8"
  description: |-
    User data privacy is no longer a competitive advantage. It's a legal requirement. Regulations like GDPR and LGPD set rules that many teams still see as a barrier to speed or innovation. Talysson shows how to implement pragmatic, "on Rails" data privacy, aligning with regulations while keeping product quality, agility, and innovation intact.

    The talk covers what data protection laws actually require, privacy by design and by default, Rails tools for privacy enforcement, sensitive data and PII handling in logs and tracing, user consent with models and cookies, anonymization and pseudonymization, and APIs for access, rectification, and erasure rights. You leave with immediate actions and the conviction that Rails is privacy-friendly by default.
  speakers:
    - Talysson de Oliveira Cassiano

- id: "ignacio-chiazzo-cardarello-tropical-on-rails-2026"
  title: "Reordering items at scale: From O(n) to O(1)"
  raw_title: "Ignacio Chiazzo: Reordering Items at Scale — From O(n) to O(1)"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-10"
  published_at: "2026-05-28T03:00:18Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "SGXVSleBVlY"
  description: |-
    Integer position columns are everywhere in Rails apps: sortable lists, drag-and-drop, item ordering. They hide an O(n) cost that can wreck performance at scale.

    Ignacio covers LexoRank, a string-based positioning algorithm that turns reordering into O(1). But the bigger value is the framework: a six-step approach to performance optimization, using reordering as the case study. You'll learn to find the hidden O(n) trap, explore solutions, dive deep into LexoRank, deploy safely, prevent regressions, and apply the same six steps to any performance problem.

    Ignacio led the rollout of LexoRank end to end at Shopify, in an application handling millions of writes daily.
  speakers:
    - Ignacio Chiazzo Cardarello

