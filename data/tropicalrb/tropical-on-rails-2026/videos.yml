  description: |-
    Make your Rails apps AI-native this afternoon. Paweł shares a production-ready method for adding Model Context Protocol (MCP) to Rails apps, startup or mature.

    This talk fills the gap that previous MCP presentations missed: authorization. With OAuth 2.1 flow, an LLM can act with a registered user's context and permissions, not as an anonymous toy. Paweł covers what MCP is and its place in the Ruby ecosystem, the complete pattern for building a production-ready, OAuth-secured MCP server in Rails, lessons from running MCP with Rails in production, guidelines for writing MCP Tools and Prompts, and a live demo of an LLM chat acting as a registered user to make a purchase.

    Without authorization, AI in Rails is a toy. With secure, user-aware auth, it becomes enterprise-ready.
