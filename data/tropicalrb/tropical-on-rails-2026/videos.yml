- id: "matheus-richard-tropical-on-rails-2026"
  title: "Production Data Doesn't Have to Be Scary"
  raw_title: "Matheus Richard: Production Data Doesn't Have to Be Scary"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-10"
  published_at: "2026-05-28T03:00:13Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "c6l6Anm_Ijo"
  description: |-
    Every developer eventually has to deal with production data, and that's where things get scary. Production data is messy, large, and risky. Yet many Rails teams still treat data changes as a migration footnote, using ad-hoc scripts, one-off rake tasks, or blocking migrations that lock tables and impact users. As datasets grow, this approach becomes dangerous.

    Matheus explores why traditional migrations are a poor fit for large data changes, how unexpected data shapes inevitably appear in real systems, and how regulatory and privacy constraints (LGPD, GDPR, HIPAA) affect day-to-day decisions. He covers patterns for verifiable and repeatable data operations, decoupling data changes from deploys, and using anonymized production dumps to bring real data shape into development without exposing sensitive information.

    The talk reframes production data as a first-class concern, showing how Rails' strengths — transactions, conventions, the monolith — can be used to evolve data safely, confidently, and compliantly.
  speakers:
    - Matheus Richard

- id: "rafael-pena-azar-tropical-on-rails-2026"
  title: "Generators Are APIs: Designing Better DX in Rails"
  raw_title: "Rafael Peña-Azar: Generators Are APIs — Better DX in Rails"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-10"
  published_at: "2026-05-28T03:00:20Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
  video_id: "5kIxE7P4hxg"
  description: |-
    Rails generators can dramatically improve developer experience, onboarding, and consistency. But when poorly designed, they introduce rigidity, hidden coupling, and long-term maintenance pain.

    Rafael shows how to design Rails generators as long-lived, developer-facing APIs instead of one-off scaffolding scripts. He covers balancing convention with flexibility, structuring generators for maintainability, avoiding over-generation that becomes obsolete fast, CLI UX decisions, naming and configuration strategies, versioning considerations, and the signals that tell you when to use a generator and when not to.

    The goal: treat generators as first-class DX tools that evolve with your Rails application.
  speakers:
    - Rafael Peña-Azar

- id: "greg-molnar-tropical-on-rails-2026"
  title: "Build Secure Rails Apps: Overcoming the OWASP Top 10"
  raw_title: "Greg Molnar: Build Secure Rails Apps — Overcoming the OWASP Top 10"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-10"
  published_at: "2026-05-28T03:00:19Z"
  announced_at: "2026-01-28"
  language: "English"
  video_provider: "youtube"
