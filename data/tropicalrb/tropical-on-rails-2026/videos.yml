- id: "vladimir-dementyev-tropical-on-rails-2026"
  title: "Keynote: From One to Two — Scaling Rails Apps"
  raw_title: "Vladimir Dementyev: From One to Two — Scaling Rails Apps — Tropical on Rails 2026"
  event_name: "Tropical on Rails 2026"
  date: "2026-04-10"
  published_at: "2026-05-28T03:00:00Z"
  announced_at: "2025-10-06 12:30 UTC"
  slides_url: "https://speakerdeck.com/palkan/tropical-on-rails-from-1-to-2"
  video_provider: "youtube"
  video_id: "zY-frUkipN0"
  description: |-
    Vladimir uses the history of space exploration as a metaphor for product evolution. Point zero is the theory. Point one is Sputnik: 80 kilos of metal and a radio transmitter that proves you can reach orbit. Point two is Gagarin: same rocket, but now there's a human inside, life support, recovery plan, mission control, and backups for the backups. The rocket barely changed. Everything around it did.

    Same for Rails projects. Point one is the launch, the MVP, proof that you can deliver. Point two is keeping users alive in your product while shipping features they want. Vladimir covers what it takes to make that transition: product-market fit metrics (Evil Martians' methodology), maintainability and layered architecture, working with AI agents as "amplifiers", trusted references and curated gems, observability and platform decisions, team processes.

    The core message: mind the gap between product growth and the software's ability to support it. The induction step from one to two defines how far your project can grow.
  speakers:
    - Vladimir Dementyev
