        - name: "NIC.br"
          slug: "nic-br"
          website: "https://www.nic.br/en/"
          logo_url: "https://web.archive.org/web/20150507033928im_/http://tropicalrb.com/images/sponsor-gold-nic@2x-fb28cd34.png"
          description: |-
            The Brazilian Network Information Center (NIC.br) is a civil, not for profit entity, which implements the Brazilian Internet Steering Committee (CGI.br) decisions and projects. NIC.br activities include the coordination of domain names registration (Registro.br), handling Internet security incidents related to the Internet in Brazil (CERT.br), research and study on network and operations technologies (Ceptro.br), production of indicators on ICTs in Brazil (Cetic.br) and hosting the W3C Brazilian office.

