- id: "randy-coulman-lone-star-ruby-conf-2015"
  title: LoneStarRuby 2015 - Shall We Play A Game? by Randy Coulman
  event_name: LoneStarRuby Conf 2015
  description: "Teaching computers to play games has been a pursuit and passion for
    many programmers. Game playing has led to many advances in computing over the
    years, and the best computerized game players have gained a lot of attention from
    the general public (think Deep Blue and Watson). \nUsing the Ricochet Robots board
    game as an example, let's talk about what's involved in teaching a computer to
    play games. Along the way, we'll touch on graph search techniques, data representation,
    algorithms, heuristics, pruning, and optimization."
  raw_title: LoneStarRuby 2015 - Shall We Play A Game? by Randy Coulman
  speakers:
    - Randy Coulman
  date: "2015-08-15"
