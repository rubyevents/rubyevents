- id: "roman-samoilov-balkanruby-2026"
  title: "Rage Under the Hood: Breaking Rack and Embracing Fibers"
  kind: "talk"
  date: "2026-05-15"
  language: "en"
  video_provider: "scheduled"
  video_id: "roman-samoilov-balkanruby-2026"
  description: |-
    "Ruby is not dead" has become the ecosystem's favourite reassurance. It's also the wrong conversation. Ruby is alive — but companies are still leaving, and the reasons are concrete: blocking I/O by default, framework overhead that's become Ruby's reputation, and generic abstractions that prioritise backend-swappability.

    Rails.cache, Active Job, the Rack interface itself — these are designed to work with everything, which means they're optimised for nothing.

    This talk introduces Rage, a framework that takes the opposite approach: every layer is purpose-built for a fiber-based, single-process runtime. No generic adapters but tailored solutions for a specific architecture. Rage challenges the status quo by coupling directly with the web server and leveraging the Fiber Scheduler to achieve asynchronous I/O that feels synchronous to write. In this talk, we'll open up the framework and look at the decisions inside:

    The "Synchronous Illusion" — how Rage lets developers write linear Ruby that executes asynchronously, with no callbacks and no new syntax.
    "Promise.all" style concurrency using Ruby Fibers — and the scheduler mechanics that make it possible.
    What we learned by replacing ActiveRecord's connection pool — and how it unlocked a 2.6x throughput gain in CPU-bound workloads.
    Real-world load tests comparing Rage against standard Rails setups under sustained heavy traffic.

    This talk is for anyone who believes Ruby's best days aren't behind it — but only if we're willing to rethink the foundations.
  speakers:
    - Roman Samoilov

- id: "galia-kraicheva-balkanruby-2026"
  title: "Stop Tuning Hyperparameters. Start Looking at Your Data."
  kind: "talk"
  date: "2026-05-15"
  language: "en"
  video_provider: "scheduled"
  video_id: "galia-kraicheva-balkanruby-2026"
  description: |-
    Why do so many AI projects fail — even with fancy models and impressive metrics?

    Because we obsess over algorithms and ignore the one thing that actually matters: the data.

    In this talk, we'll challenge the "model-first" mindset that dominates modern data science. Instead of jumping straight to XGBoost, deep learning, or the latest AI trend, we'll step back and ask a simpler question: Have we actually looked at our data?

    We'll talk about how skipping proper exploratory data analysis leads to false confidence, hidden leakage, biased predictions, and systems that work great in a notebook… and fall apart in production. Through practical examples and clear principles, I'll argue that understanding your data-generating process is more valuable than any hyperparameter search strategy.

    Better models don't start with better tuning. They start with better questions.
  speakers:
    - Galia Kraicheva

- id: "giovanni-panasiti-balkanruby-2026"
  title: "Rails Engines Are the Best-Kept Secret (And You're Using Them Wrong)"
  kind: "talk"
  date: "2026-05-15"
  language: "en"
  video_provider: "scheduled"
  video_id: "giovanni-panasiti-balkanruby-2026"
  description: |-
    Rails engines are the most powerful architectural tool Rails gives you. After 5+ years building engines in production (including the 440+ star Active Storage Dashboard), I've learned that engines aren't just "gems with views." They're the missing piece between "monolith that's getting painful" and "let's rewrite everything as microservices." In this talk, I want to share the patterns that work, the mistakes that will ruin your week, and my zero-dependency philosophy that keeps engines maintainable for years. I'll also introduce ActiveCanvas a new open-source Rails engine that is a CMS/builder where marketing views can be dynamically changed by the marketing team without requiring too much html knowledge and without redeploy every time. Hot take: You don't need microservices. You don't need a team of ten. You need engines.
  speakers:
    - Giovanni Panasiti

