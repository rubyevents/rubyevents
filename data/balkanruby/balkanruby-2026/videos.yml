- id: "wojtek-wrona-balkanruby-2026"
  title: "From PostgreSQL to SQLite in Rails: Our Migration Journey, Challenges, and Lasting Trade-Offs"
  kind: "talk"
  date: "2026-05-15"
  language: "en"
  video_provider: "scheduled"
  video_id: "wojtek-wrona-balkanruby-2026"
  description: |-
    SQLite's rise in production use - boosted by recent Rails improvements - has caught many developers' attention. But beyond the buzz, what does it take to migrate a Rails app from PostgreSQL, and what trade-offs come with it?

    In this talk, I'll share our real-world migration story: the incremental process we followed, the challenges we faced, and the ongoing post-migration quirks you'll need to accept.

    Whether you're drawn to the promise of a simpler, more cost-effective setup or are cautious about potential compromises, you'll leave with clear, practical insights.
  speakers:
    - Wojtek Wrona
