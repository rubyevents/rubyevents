- id: "josef-strzibny-balkan-ruby-2024"
  title: 'Writing and marketing "Deployment from Scratch"'
  raw_title: 'Josef Strzibny – Writing and marketing "Deployment from Scratch"'
  event_name: "Balkan Ruby 2024"
  date: "2024-06-07"
  published_at: "2024-06-07"
  video_provider: "youtube"
  video_id: "11ihYaEhi1g"
  description: |-
    Josef is a longtime Rails developer, freelancer, and author of Deployment from Scratch. Previously he was a small startup CTO, senior Rails engineer, and a Linux packager at Red Hat. He now spends most of his time building a Rails starter kit Business Class while regularly watching Gordon Ramsay cooking shows.

    He quit his job and went to write a book for 6 months. 2.5 years later he realized his book was not finished and he hadn't made any sales. But in the end, he made a book that brings in sales every month. Here's a story of ideating, starting, writing, finishing, marketing, promoting, and selling his book to 1000 sales as an independent author without a publisher.
  speakers:
    - Josef Strzibny

