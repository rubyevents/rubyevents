- id: "alicia-rojas-rails-world-2026"
  title: "Layered Design, Layered Trust: How a Designer Started Shipping Production Rails"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "alicia-rojas-rails-world-2026"
  description: |-
    Her first PR added 7,158 lines, deleted 1,920, and touched 153 files of a production Rails app. It shipped a token-based design system, a 28-section component catalog, and a full visual overhaul. The designer was the primary author.

    The pattern is three layers deep, borrowing from layered Rails. A mechanical floor of Tailwind @theme tokens and @layer base defaults. A middle layer of named, discoverable partials. A natural-language contract in CLAUDE.md at the top.

    An engineer and a designer tell the story together. We show real code, real prompts, and what broke the first time. You leave with a pattern you can drop into your Rails app, and a sharper question: who on your team could be shipping if the harness were better?
  speakers:
    - Alicia Rojas

- id: "andrew-novoselac-rails-world-2026"
  title: "Ractors, Rails, and Robots: Automating the Path to Ractor-safety"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "andrew-novoselac-rails-world-2026"
  description: |-
    Ractors are production-ready in Ruby 4.0! But the road to adopting them in Rails is long and challenging… Or is it?

    In this talk, we'll show how an AI agent loop helped us make rapid progress toward Rails Ractor-safety in just a couple of weeks. We'll explain why Rails' reliance on global state makes adopting Ractors hard, and why this problem is especially suited to AI-driven prototyping. Then we'll walk through the harness and specification that enabled the agent to generate, test, and refine multiple prototypes. Of course, not everything can be automated – we'll also talk about hotspots where human intervention and design is needed to land on the right solution. We'll close with the current state of Rails Ractor-safety, what worked, what failed, and what remains.
  speakers:
    - Andrew Novoselac

- id: "daniela-velasquez-rails-world-2026"
  title: "Agents on Rails: Building AI Pipelines in plain Ruby"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "daniela-velasquez-rails-world-2026"
  description: |-
    Every application with users sits on a mountain of data. Buried within it are opportunities worth acting on, but finding them, and finding them at the right time, takes time and effort that most people can't spare.

    In this talk, I'll walk you through how at Shopify we designed a multi-stage pipeline in plain Rails, no Python, no ML platform. The pipeline runs as a sequence of ApplicationJob batches, where some jobs call agents to research, and others call independent critic agents to validate what the researcher found.

    The pipeline also learns. When a suggestion is disliked, an ActiveRecord callback triggers a job that captures insights from the merchant's reaction and feeds them back into the researcher, so the next run already knows what matters most to each user.
  speakers:
    - Daniela Velasquez

- id: "donal-mcbreen-rails-world-2026"
  title: "Active Search"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "donal-mcbreen-rails-world-2026"
  description: |-
    Active Search is a new Rails framework for application search.

    It provides a single, Active Record-style chainable interface for searching across different search engines like Elasticsearch, Meilisearch or Typesense and database full-text search in PostgreSQL, MySQL or SQLite.

    Find out how we use it at 37signals to switch search engines between SaaS and self-hosted versions of Basecamp and Fizzy.
  speakers:
    - Donal McBreen

- id: "enrique-mogollan-rails-world-2026"
  title: "I Didn't Get MCP, So I Built My Way Through It"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "enrique-mogollan-rails-world-2026"
  description: |-
    MCP is everywhere in AI tooling, but what actually is it? This talk follows one developer's honest journey: not understanding MCP, deciding to build an inspector to figure it out, and discovering something much bigger along the way.

    We'll walk through building a Ruby MCP inspector gem from scratch using Rails 8: inspecting server communication, mapping available tools, and leveraging Ruby's metaprogramming for protocol exploration. Then comes the plot twist — what if your Rails app could read available MCP servers and generate its own UI dynamically? Add a new server, get a new interface. No redeploy.

    You'll leave with a clearer mental model of MCP and a concrete example of Rails 8 as a first-class AI development platform.
  speakers:
    - Enrique Mogollán

- id: "jason-swett-rails-world-2026"
  title: "How I Built a CI Platform on Rails as a Solo Developer"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "jason-swett-rails-world-2026"
  description: |-
    In 2023, frustrated with the clunky UIs of CircleCI and GitHub actions, I decided to build my own continuous integration (CI) platform.

    Given how complex and ambitious this project was, I decided to take inspiration from 37signals and Steve-Jobs-era Apple and build the product with the absolute minimum set of features necessary, but to the highest degree of quality and usability.

    The main gist of this talk is how to get maximum productivity, business value and artistic expression out of your time when you're just a solo developer with very little time or funding. The key principles are high standards, disciplined laziness, thorough automated testing, and aggressive refactoring. Paradoxically, a focus on high quality yields much greater speed than a thoughtless focus on speed itself.
  speakers:
    - Jason Swett

- id: "jenny-shen-rails-world-2026"
  title: "The RubyGems Compact Index: What Powers Every bundle install"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "jenny-shen-rails-world-2026"
  description: |-
    Three endpoints handle millions of requests per day, yet most Rubyists have never seen them. The RubyGems.org compact index is the hidden API behind every bundle install, powering dependency resolution across the Ruby ecosystem.

    In this talk, we'll explore how Bundler uses the compact index to resolve dependencies and how RubyGems.org serves it at scale. Then we'll walk through how we evolve the format to ship improvements like publish cooldowns, smaller native gems, and security warnings to make gem installation faster, better, and more secure for your Rails application.
  speakers:
    - Jenny Shen

- id: "jeremy-smith-rails-world-2026"
  title: "Practical Hotwire: Stimulus & Turbo on the Ground"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "jeremy-smith-rails-world-2026"
  description: |-
    Curious about Stimulus and Turbo? Already using Hotwire, but seeking out solid practices? Join this guided tour through a variety of examples and techniques, with commentary on the challenges and tradeoffs. Keeping an eye out for sharp edges, we'll discover what makes HTML-over-the-wire magical.
  speakers:
    - Jeremy Smith

- id: "joel-quenneville-rails-world-2026"
  title: "Harness Engineering on Rails"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "joel-quenneville-rails-world-2026"
  description: |-
    Agents have re-shaped how AI can work with code yet we still use them like ChatGPT and wonder why they disappoint.

    The quest to one-shot our code with the perfect prompt or AGENTS.md is a trap. We get much better results by hooking into signals from RSpec, Rubocop, or even a self-review. Our agent can react to these and iterate to a good solution before requiring a human in the loop. This requires a paradigm shift on what an agent is: from chatbot to reactive system. Building on this perspective we'll explore techniques to keep our agents on the rails, prevent their ability from decaying, and extend their capabilities.

    When your reaction to mediocre code is to fix the harness rather than the mistake, agents can become valuable assistants that write code you are proud of.
  speakers:
    - Joël Quenneville

- id: "jorge-manrubia-rails-world-2026"
  title: "Lexxy: a new text editor for Action Text"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "jorge-manrubia-rails-world-2026"
  description: |-
    Action Text and Trix ship with Rails as a complete, batteries-included solution for rich text. In practice, many teams have hit its limits, especially when it comes to semantics, extensibility, and modern editing expectations.

    In this talk, we'll introduce Lexxy, a new rich text editor for Rails built on Meta's Lexical framework.

    We'll explore what makes Lexxy different: clean, semantic HTML, built-in Markdown support, extensible commands and prompts, and a foundation that makes customization straightforward.

    More importantly, Lexxy represents a shift in how we think about rich text in Rails: from a fixed editor to a pluggable, evolvable editing layer.
  speakers:
    - Jorge Manrubia

- id: "josef-strzibny-rails-world-2026"
  title: "Kamal Deep Dive"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "josef-strzibny-rails-world-2026"
  description: |-
    Learn the core concepts behind Kamal, how it's implemented and how it actually works under the hood. See how the most important parts of Kamal are designed. Understand deploying to multiple servers, using local and remote registries, or how Kamal Proxy fits in. Along the way, you'll gain a clear mental model of Kamal's architecture that should let you use Kamal to its full potential.
  speakers:
