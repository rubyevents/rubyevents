- id: "kevin-mcconnell-rails-world-2026"
  title: "Distributing Rails applications with ONCE"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "kevin-mcconnell-rails-world-2026"
  description: |-
    ONCE aims to be the easiest way to install and manage web applications. Built on the experience of shipping products like Campfire and Fizzy, ONCE also aims to make distribution easier for you as a Rails developer, by providing most of what's needed to make your applications simple to self-host.

    In this talk we'll cover what the ONCE platform offers, and how it works. And more importantly, the steps you can take to make sure your own Rails applications are ONCE-compatible.
  speakers:
    - Kevin McConnell

- id: "kinsey-durham-grace-rails-world-2026"
  title: "Agent-Proof Your Rails App: Your Codebase Is the Prompt"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "kinsey-durham-grace-rails-world-2026"
  description: |-
    When AI agents write code in your repo, your codebase becomes the context window. Messy conventions, implicit knowledge that lives in people's heads, and inconsistent patterns aren't just tech debt anymore — they're the reason the agent writes bad code.

    Working on GitHub's agent platform, I've seen firsthand what makes codebases easy or hard for agents to work in. This talk shares what we've learned about making large Rails apps legible to coding agents: teaching AI your conventions through custom instructions and agent skills, where consistency investments pay off in agent accuracy, and where to keep humans in the loop. With real before-and-after examples, you'll leave with a playbook for making your Rails app agent-friendly — which also makes it more human-friendly.
  speakers:
    - Kinsey Durham Grace

- id: "marco-roth-rails-world-2026"
  title: "Herb in Rails 8.2: Your ERB views, now HTML-aware"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "marco-roth-rails-world-2026"
  description: |-
    With teams, companies, and open source projects adopting Herb in their daily workflows, the foundation is proving itself at scale and is on track to become an opt-in view engine in Rails 8.2.

    This talk covers what Herb brings to Rails. How we made the integration possible, how we adapted and extended ActionView, and the toolchain and dev tools every Rails developer gets out of the box as a result.
  speakers:
    - Marco Roth

- id: "mike-dalessio-rails-world-2026"
  title: "Lingua Clanka: Markdown APIs for Action Text"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "mike-dalessio-rails-world-2026"
  description: |-
    Agent accessibility is now table stakes, and Markdown is the lingua clanka — the universal rich text format for both AI agents and humans.

    If you want your Rails app to be agent-accessible, your API needs to emit Action Text content as Markdown and accept Markdown updates from agents. Action Text's HTML-first design has made this tricky in the past, but new Rails features make it simple.

    This talk walks through Markdown support for Action Text: how Markdown is generated, and how parser configuration shapes what's stored when agents send Markdown. You'll also learn how Action Pack and Active Storage integrate with Action Text to provide these features as a natural extension of standard Rails APIs.
  speakers:
    - Mike Dalessio

- id: "nick-pezza-rails-world-2026"
  title: "A deep dive into Solid Cable"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "nick-pezza-rails-world-2026"
  description: |-
    When Action Cable was introduced, running Redis in production became the norm. On top of that, many apps also relied on Redis for caching and background jobs. But with the introduction of Solid Queue and Solid Cache, Redis became almost optional. Almost.

    With Rails 8, Solid Cable became part of the Solid family, making it possible to deploy many Rails apps to production without Redis.

    In this talk, we'll explore Solid Cable's internals, why it was created, and how it compares to the other Action Cable adapters. We'll look at its performance characteristics, when to use it, when not to, and how it has evolved since it was added to Rails 8. We'll also look to the future of realtime Rails apps in the age of LLM interfaces, where ordered message delivery becomes increasingly important.
  speakers:
    - Nick Pezza

- id: "rachael-wright-munn-rails-world-2026"
  title: "Custom Rails Generators in RubyEvents"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "rachael-wright-munn-rails-world-2026"
  description: |-
    At RubyEvents.org, we generate a lot of YAML. Contributors need an easy, idiomatic way to generate event files to the latest standards in an unfamiliar codebase. AI needs to generate files from unstructured data without drifting. These feel like different problems, but custom Rails generators can solve both.

    Rails generators power rails generate — a built-in tool for creating and modifying files from the command line. Custom generators feel natural for anyone familiar with Rails and allow you to extend Rails' conventions with your own.

    This will be a deep dive into how to build a custom generator — templates, mutating files, testing, and everything we learned the hard way at RubyEvents.
  speakers:
    - Rachael Wright-Munn

- id: "robby-russell-rails-world-2026"
  title: "Keynote: The Most Valuable Engineer Isn't Shipping Features"
  kind: "keynote"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "robby-russell-rails-world-2026"
  description: |-
    As AI lets teams generate more code, many Rails engineers are discovering their bottlenecks were never about typing speed. They were slow feedback loops, fragile deploys, dependency sprawl, and years of overlapping architectural patterns that never fully disappeared.

    AI agents amplify those problems. They also reward systems built around strong conventions, predictable workflows, and integrated tooling… areas where Rails continues to double down.

    Drawing from firsthand experience modernizing long-lived Rails applications and conversations across the community, this talk explores why the engineers creating the most leverage are increasingly the ones improving the environment around the code, unlocking their teammates and AI agents by making systems safer, clearer, and easier to evolve.
  speakers:
    - Robby Russell

- id: "ryan-sherlock-rails-world-2026"
  title: "Shipping is your heartbeat: Rails in the agentic era"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "ryan-sherlock-rails-world-2026"
  description: |-
    In 2013, Fin's CTO wrote that shipping is your company's heartbeat: software only starts learning when it reaches customers. In the agentic era, that heartbeat has to get stronger, but it has not been plain sailing. As agents increased the amount of code moving through Fin, our test suites, deployment pipeline, and shipping process started to strain, slow down, and cost far more than we were comfortable with.

    This talk goes inside our Rails monolith (3M+ lines of code, 100k+ tests, P50 suite time around 3 minutes, merge-to-customers in under 10 minutes) to show how we got speed and safety pulling together again. I'll cover the Ruby, Rails, CI, orchestration, observability, rollback, and automated AI review guardrails that got us to a better place than where we started.
  speakers:
    - Ryan Sherlock

- id: "tess-griffin-rails-world-2026"
  title: "Sharding Is Hard: Let's Make It Easier!"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "tess-griffin-rails-world-2026"
  description: |-
    You've stuck to a single database. It has gotten beefier and beefier servers as the scale grows. Now your RDS bill is $500k a month and half your indexes have stopped working! What do you do next?

    Database scaling is a common problem for applications reaching large scale. Vertical scaling works well to a point but gets expensive fast. In this talk we'll explore the other approach to scaling your database — horizontally with sharding. Where do you start? Which table do you shard on? How do you keep your transactions atomic when they need to cross multiple shards? I'll show you how to tackle moving your database to a horizontally distributed system in an approachable way.
  speakers:
    - Tess Griffin

- id: "vladimir-dementyev-rails-world-2026"
  title: "Durable orchestration on Rails: from continuation to workflow"
  event_name: "Rails World 2026"
  date: "2026-09-23"
  announced_at: "2026-06-22"
  video_provider: "scheduled"
  video_id: "vladimir-dementyev-rails-world-2026"
  description: |-
    Rails 8.1 shipped Active Job Continuation so long-running jobs survive restarts and resume from a checkpoint. This was a real step forward, but can only be the beginning. The workflows Rails apps orchestrate today need more than interruptibility: durable state across steps, pause/resume capabilities, and human-in-the-loop-like interactions. Building complex workflows and agentic pipelines in Rails has been simplified but still requires manual plumbing or reaching out to third-party gems or services.

    This talk explores the preexisting patterns and solutions to the durable workflow orchestration problem and introduces a small, principled extension to Active Job that connects the dot: same step DSL, same job runner, now with persistent context, scheduled steps, and first-class resumeability.
  speakers:
    - Vladimir Dementyev

