- id: "marco-roth-rubyconf-2026"
  title: "The Anatomy of an ERB Rendering Engine"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "marco-roth-rubyconf-2026"
  description: |-
    ERB is one of Ruby's oldest and most widely used technologies, yet many Ruby developers only have a vague mental model of how it actually works. In this talk, we take a deep dive into the internals of ERB rendering engines. We start by examining how ERB templates are compiled and executed today, and the design and trade-offs behind traditional engines such as `erb` and `erubi`, especially in context with rendering HTML. We then explore where this string-based approach breaks down, particularly when it comes to tooling, diagnostics, and more advanced rendering techniques in HTML+ERB templates. Finally, we look at a different approach: building an HTML-aware ERB engine on top of a syntax tree. Using `Herb::Engine` as a concrete example, we show how adding structural understanding changes what is possible, and what it unlocks next, including better tooling and the foundations for efficient, reactive rendering.
  speakers:
    - Marco Roth

- id: "michael-toppa-rubyconf-2026"
  title: "AI-assisted coding: lessons from small startups to legacy codebases"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "michael-toppa-rubyconf-2026"
  description: |-
    The pace and breadth of change with AI coding tools is overwhelming, and it seems like every day there are dozens of new developments and emerging capabilities. We'll share lessons and strategies gathered from interviews with Rails engineers working in different contexts, from large and complex legacy codebases, to small startup codebases. I've been an active member of the Ruby community for 15 years, and for 2 years I had my own Rails-based startup until I recently joined the 100-person Rails engineering team at the Planning Center. I'll share my own AI-assisted coding lessons from both contexts, as well as lessons from recent discussions with co-workers past and present. This approach helps us both identify patterns and avoid the pitfalls of assuming what works (or doesn't work) in one context is the right approach for people in other contexts. Some example of things we'll dig into: * Greenfield vs brownfield Rails development with AI, and identifying the right approaches and tools for each. * With code and document generation becoming ever cheaper and faster, human comprehension becomes the new bottleneck. Where these bottlenecks are can vary: we'll discuss how to identify and mitigate them. An example is code review: with teams opening PRs faster than ever, how does human code review keep up? * BDUF (big design up front) has made a comeback: when plans and code can be generated quickly and cheaply, do the human lessons of working in short cycles with frequent feedback still matter? We've found that they do, and we'll discuss how to harness the best of both approaches.
  speakers:
    - Michael Toppa

