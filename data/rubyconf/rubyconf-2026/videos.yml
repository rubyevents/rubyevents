- id: "joe-masilotti-rubyconf-2026"
  title: "Workshop: Build an iPhone app with Ruby and YAML"
  kind: "workshop"
  event_name: "RubyConf 2026"
  date: "2026-07-15"
  language: "en"
  track: "Breakout 2 - Charleston E-B"
  video_provider: "scheduled"
  video_id: "joe-masilotti-rubyconf-2026"
  description: |-
    Bring your Rails codebase. Leave with an iPhone app. In this hands-on workshop, you'll take an existing Ruby on Rails application and see it running as a native iOS app on your own iPhone. No iOS experience required. You won't need Xcode, an Apple Developer account, or even a Mac. We'll use the Ruby Native preview app to wrap your server-rendered Rails views in a native iOS shell. Your existing views, authentication, and business logic all carry over. You configure a few settings and point it at your app. Here's what we'll cover: - Configuring your Rails app for mobile rendering - Connecting to the Ruby Native preview app - Handling navigation, tabs, and native chrome - Tweaking your views for a great mobile experience - Understanding the path from preview to the App Store You'll hit real problems along the way, the same ones I've debugged across the 25+ Rails-powered mobile apps I've shipped, and we'll solve them together. By the end, you'll have your app running on your iPhone and a clear picture of what it takes to go from Rails app to the App Store. Prerequisites: an iPhone and your Rails codebase running locally on your laptop.
  speakers:
    - Joe Masilotti

- id: "carolyn-cole-rubyconf-2026"
  title: "Workshop: Converting from Rails to Hanami"
  kind: "workshop"
  event_name: "RubyConf 2026"
  date: "2026-07-15"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "carolyn-cole-rubyconf-2026"
  description: |-
    Hanami (hanamirb.org) is a relatively new Ruby framework that is focused on inclusivity and developer happiness. In addition to the inclusive community, Hanami's focuses on functional Ruby, which has the promise of less bugs too! It would be nice to think that we all have tons of greenfield projects where we could utilize Hanami. In reality most of us do more maintenance of existing applications than creating new applications. That is why I have been working on converting some of my existing Rails applications over to Hanami. In this workshop we will take the demo Rails Bookshop application and convert it to a Hanami application. While we do the conversion we will discuss the different component parts of Rails (Model, View, Controller) and how they map to the component parts of Hanami (Relations, Repositories, Views, Templates, Actions). I hope that you will leave the workshop feeling empowered to utilize Hanami in place of Rails!
  speakers:
    - Carolyn Cole

