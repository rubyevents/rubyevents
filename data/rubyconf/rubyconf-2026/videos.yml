- id: "keith-bennett-rubyconf-2026"
  title: "Command-Line Applications in Ruby: Design Patterns and Best Practices"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "keith-bennett-rubyconf-2026"
  description: |-
    Command-line applications are ubiquitous in modern development workflows, powering tools for cloud services, developer automation, and AI-assisted development. Ruby's expressive syntax, flexible object model, and strong testing culture make it well suited for building command-line applications whose implementations remain concise, maintainable, and easy to extend as they grow into larger systems. This talk presents practical techniques and design patterns for building high-quality command-line applications in Ruby. Topics will include: - organizing command-line application codebases for clarity, maintainability, and extensibility - producing clear help output, logs, and error messages that help users diagnose and resolve problems - achieving a high functionality-to-complexity ratio through careful interface and architecture design - designing tools that behave well in pipelines and scripts through predictable output, multiple output formats, and proper exit codes - structuring applications so the same functionality can be used as a command-line tool, library API, interactive shell (REPL), or backend server (MCP, HTTP, etc.) - using Ruby's flexible syntax to enable lightweight DSL-style interaction in REPL environments and command scripts Examples will draw from real-world Ruby tools including cov-loupe, a coverage analysis command-line application, library, and MCP server, and wifi-wand, a Wi-Fi management command-line application, library, and interactive shell. Attendees will leave with practical patterns they can apply immediately to build command-line applications that are easier to use, easier to maintain, and more powerful and flexible.
  speakers:
    - Keith Bennett

- id: "dalma-boros-rubyconf-2026"
  title: "Makeover Monday: How a Weekly Ritual Transformed Our Codebase and Culture"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "dalma-boros-rubyconf-2026"
  description: |-
    Whenever I'm asked why I like Ruby, my answer is always simple and always the same: because she's cute. That's my tongue-in-cheek nod to the community's shared sentiment that Ruby's elegance makes her a joy to work with. But beauty requires maintenance. This talk is a case study on how I turned my anxiety around mounting tech debt into Makeover Monday, a weekly refactoring ritual. I didn't set out to be a leader, I just wanted our TODOs to stop piling up. What started as a casual, weekly tech debt session transformed our codebase and our culture and became our fully remote team's most appreciated (and only) dev-only space. Attendees will leave with: - An understanding of why beauty in code is a functional requirement, not a luxury - An understanding of how collective code cleanup is a way to level up all devs in a safe, collaborative environment - A practical blueprint for starting their own refactoring rituals with the confidence to lead from wherever they are in the org chart.
  speakers:
    - Dalma Boros

