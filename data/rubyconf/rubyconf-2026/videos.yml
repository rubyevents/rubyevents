- id: "julia-egorova-rubyconf-2026"
  title: "From cores to queues: parallelizing Ruby tests the right way"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "julia-egorova-rubyconf-2026"
  description: |-
    Your test suite takes 25 minutes. But you have 8 cores. So it should take 3 minutes, right? If only it were that simple! Whether you're on Minitest or RSpec, running tests in parallel can dramatically shrink your local and CI feedback loops. That said, parallelization is no free lunch. Naive approaches introduce flaky tests, waste resources, and sometimes make things slower. In this talk, I'll walk you through the full spectrum of Ruby test parallelization – from the simplest CI-level splitting to sophisticated queue-based orchestration. We'll see what works, what breaks, and why you can't just throw more cores at the problem. - We'll start with the fundamentals: why parallelization matters and how to think about it. - Then we'll explore the most common strategies: splitting work across CI jobs, using parallel_tests to leverage multiple cores within a single machine, and Rails' built-in parallel testing for Minitest. - From there, we'll go deeper into queue-based approaches: how tools like Knapsack Pro dynamically distribute work across workers, why static splitting hits a ceiling, and the critical difference between splitting by file versus splitting by individual example (and when each makes sense). Along the way, I'll tackle the real-world headaches: shared state and flaky tests, the tension between let_it_be-style optimizations and per-example splitting, and the art of balancing workers so no single node becomes a bottleneck. We'll close with Amdahl's Law applied to your test suite (understanding the hard limits of parallelization) and what to do when more cores stop helping: profiling, factory optimization, and making your tests genuinely faster. Takeaways: The audience will leave with a clear mental model for choosing the right parallelization strategy for their projects, concrete tool recommendations for both Minitest and RSpec – and an understanding of when to stop parallelizing and start optimizing.
  speakers:
    - Julia Egorova

- id: "nery-campusano-rubyconf-2026"
  title: "Each All the Way Down: How Ruby Enumerators Power Streaming in gRPC Ruby"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "nery-campusano-rubyconf-2026"
  description: |-
    What is an Enumerator, and how can it be used for streaming data? While learning about streaming handlers in gRPC Ruby, I found that the docs mention returning an Enumerator, but why? It didn't seem clear as to why an Enumerator was needed to stream, so I started asking questions. What is an Enumerator? I'd never had the need to create one before, I'd only ever used them. Once I understood what they are and how they enable controlled external and internal iteration, I had a new question: if gRPC just needs something that responds to each, does it matter? Can I return an Array and move on? It depends. And that's what we will be exploring together in this talk. We'll cover what works, what doesn't work, and the tradeoffs of each approach. We'll look at what Enumerators have beyond each that make it a powerful primitive for gRPC Streaming: how gRPC uses them internally to handle incoming requests, how the same contract drives your responses, and why that shapes the streaming interface in ways that aren't obvious from the outside. Whether you work with gRPC or not, you'll leave the talk with a new way to think about Enumerators and when to reach for them, regardless of if values arrive over time rather than all at once. Turns out an Enumerator isn't just a tool for lazy enumeration. It's powerful enough to be the backbone of a network streaming protocol.
  speakers:
    - Nery Campusano

