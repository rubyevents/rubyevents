- id: "brandon-weaver-rubyconf-2026"
  title: "We Who Remember Magic"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "brandon-weaver-rubyconf-2026"
  description: |-
    There was a time when Ruby felt like magic. It gave an entire generation of developers wings; tools to ship fast, dream big, and start companies from anywhere. It wasn't just code; it was a movement built on empathy, simplicity, and joy. Ruby taught us that developer happiness wasn't a luxury; it was a revolution. Now, a new kind of magic is emerging: AI. It's promising, powerful, and most importantly it's perilous. As the world rushes to automate, optimize, and amplify, we in the Ruby community have a chance to pause and ask better questions—not just *can we*, but *should we*? This talk isn't a demo reel. It's a conversation about responsibility, creativity, and care. About how we bring our whole selves to this moment, with wonder and with skepticism. We'll reflect on what AI means not just for our tools, but for our teams, our values, and the future we're quietly writing together. Ruby taught us to be kind and to focus on people over technology, and that lesson is more important today than ever.
  speakers:
    - Brandon Weaver

- id: "madison-sites-rubyconf-2026"
  title: "Legacy Rails and the AI That Couldn't"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "madison-sites-rubyconf-2026"
  description: |-
    Ruby and AI are supposedly a perfect match. In less-than-ideal legacy codebases, the reality is messier. Agents stumbled on the same things I had during onboarding: unnecessary complexity, conflicting patterns, and conventions that actively fought Rails. My PR review queue grew while I made the same corrections over and over - in my editor and then again on GitHub. I hit a breaking point, unsure if this career was still for me. My coworker's advice seemed like a joke: "The antidote to too much AI is more AI." I didn't have time to become an AI expert; I would drown before I could get department consensus on strategy, so I ran a small experiment, changing only how I communicated with AI in my workflow. What started as survival evolved into a flywheel. Whether you're skeptical, curious, or drowning in AI-generated code, you'll see how small experiments compound into real leverage — and how capturing your team's knowledge where both humans and agents can find it changes everything. No special title or pristine codebase required.
  speakers:
    - Madison Sites

- id: "miles-georgi-rubyconf-2026"
  title: "Goofin' about with Ractors!"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 2 - Charleston E-B"
  video_provider: "scheduled"
  video_id: "miles-georgi-rubyconf-2026"
  description: |-
    I was bored so, as one does, I decided to goof-about with Ractors! First thing I decided to do was a Ractor versus Thread benchmark of some CPU-bound code. After writing a Ractor to multiply a ton of numbers together, I wanted an apples-to-apples comparison with Thread. So how could I do it? Well I wound up just giving each Thread a Queue to receive each number to multiply to simulate sending the numbers to the Ractor instances. So then I was thinking… "well I'm combining a Thread with a Queue. That's just an actor. Wait a minute… 'actor'... 'ractor'... whaaaaat??" One other aspect of an actor is that they should only share immutable data. Ruby does a ton of stuff to try to give that effect. So I wrote a ton of scripts to see what I could or couldn't get away with! It could be fun/interesting to share code and things I discovered while playing with it.
  speakers:
    - Miles Georgi

- id: "alexander-baygeldin-rubyconf-2026"
  title: "Fair by design: orchestrating background jobs in Ruby"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "alexander-baygeldin-rubyconf-2026"
  description: |-
    Processing background jobs can often have challenges—especially at scale. For example, multi-tenant applications often struggle with fair prioritization of background tasks: a single large client may enqueue tons of jobs, monopolize available resources, and block smaller client tasks. In fact, this was my story just recently, so in this talk, we'll learn if it's time for you to take background job prioritization seriously–and how to design your system in a way that makes it fair for everyone (regardless of their size or billing plan). First, I'll demonstrate an unfair scenario and show how to spot it in a production environment. We'll look at its root causes and define what "fairness" means in the context of background job processing. We'll then recall how background processing works in Rails (and Ruby in general), using Sidekiq, GoodJob, and SolidQueue. We'll also touch on how GVL factors into the problem, and whether using Async can help mitigate it in certain cases. I'll next explore strategies for introducing fairness while staying in the constraints imposed by our background job processors. These strategies include shuffle shards, throttling (based on leaky buckets), and interruptible iteration. We'll discuss the pros and cons of each, and see cases where they may fall short. In the last part, I'll explore an alternative approach that relies on virtual per-tenant queues and dedicated schedulers instead of the background job processors' built-in capabilities. I'll show why this approach achieves the most fairness, at what cost, when it's worth implementing, and how to do so–in almost any setup.
  speakers:
    - Alexander Baygeldin

- id: "mike-dalton-rubyconf-2026"
  title: "Welcome to Authentication Hell"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "mike-dalton-rubyconf-2026"
  description: |-
    Technology has made our lives better in many ways. But despite all of these advances we're still juggling authentication methods. Enter a password, click a push notification, enter a code. It feels never ending... But what if it actually was never ending? Introducing "Welcome to Authentication Hell", a browser-based game written in Ruby. You play a developer trying to escape Authentication Hell. At each level you must authenticate with increasingly more frustrating authentication methods. Will you reach the surface or collapse under the weight of push notifications and passkeys? Along the way, we'll learn about implementing various methods of authentication in Ruby. Passwords, passkeys, biometrics, and more.
  speakers:
    - Mike Dalton

- id: "peter-zhu-rubyconf-2026"
  title: "Building the Next-Generation Garbage Collector in Ruby"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 2 - Charleston E-B"
  video_provider: "scheduled"
  video_id: "peter-zhu-rubyconf-2026"
  description: |-
    Last year, the Modular Garbage Collector feature in Ruby was introduced. With this feature, we shipped an alternative garbage collector using the Memory Management Toolkit (MMTk) framework. At the time, however, MMTk was significantly slower than the default garbage collector in Ruby. Over the past year, the MMTk Ruby integration has been significantly improved and the performance is now on par with the default garbage collector. It now supports the Moving Immix garbage collection strategy, improved parallelism, and numerous optimizations. In this talk, we will go over the Modular Garbage Collector feature and its differences with the default garbage collector, examine the techniques used to speed up the Ruby MMTk integration, and discuss how it can be improved further in the future.
  speakers:
    - Peter Zhu

- id: "sam-ruby-rubyconf-2026"
  title: "There Is No Server"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "sam-ruby-rubyconf-2026"
  description: |-
    Rails is the fastest way to go from idea to working application. JavaScript has the broadest reach — browser, edge, mobile, desktop. Choosing one means giving up the other. Unless you don't choose. Open two browser windows pointing at a GitHub Pages URL. Create a blog article in one. Watch it appear in the other. Close the browser. Come back. The data is still there. Open developer tools. Find `app/controllers/articles_controller.rb` in Sources. Set a breakpoint. It hits. There is no server. There is no Ruby runtime. Just static files on GitHub Pages. This is a standard Rails blog tutorial — RESTful controllers, Active Record models with associations and validations, ERB views, Turbo Streams — transpiled to JavaScript and running entirely in the browser. And it gets weirder from there: an in-browser editor with hot reload, a transpiler that transpiled itself, system tests that run in 75ms without a browser, production deployments where every user gets their own SQLite database, and a future where the write pattern — not the framework — determines the architecture. You'll leave knowing which Rails patterns survive transpilation, which ones don't, and why "develop a monolith, deploy a mesh" might be the future of Rails applications.
  speakers:
    - Sam Ruby

- id: "fito-von-zastrow-rubyconf-2026"
  title: "Defying Gravity: Teaching AI to Write Better Ruby"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "fito-von-zastrow-rubyconf-2026"
  description: |-
    Code reviews got slower after we introduced AI into our Ruby on Rails monolith. AI-generated code was making the legacy problems worse, not better. Technical debt, fat controllers, tests coupled to implementation. AI reproduced all of it, faster than ever. It's as if legacy code has gravity. In this talk, you'll learn the concrete techniques we use in production: how to specify what you want, how to provide architectural guidance to agents, and how to use skills to put guardrails in place so feature work incrementally improves the codebase instead of reinforcing legacy patterns. Leave with everything you need to defy Legacy Gravity.
  speakers:
    - Fito von Zastrow

- id: "hilary-stohs-krause-rubyconf-2026"
  title: "How to Accessibility if You're Mostly Back-End"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 2 - Charleston E-B"
  video_provider: "scheduled"
  video_id: "hilary-stohs-krause-rubyconf-2026"
  description: |-
    If you work mostly on the back-end of the tech stack, it's easy to assume that your role is disengaged from accessibility concerns. After all, that's the front-end's job! However, there are multiple, specific ways back-end devs can impact accessibility - not just for users, but also for colleagues.
  speakers:
    - Hilary Stohs-Krause

- id: "edy-silva-rubyconf-2026"
  title: "Ractors in Ruby 4.0: Message Passing Without the Pain"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "edy-silva-rubyconf-2026"
  description: |-
    Concurrency in Ruby has always been a compromise. Threads are error-prone. Fibers are complex. The Global Interpreter Lock limits true parallelism. We accepted that concurrent Ruby is hard. I came from Erlang and Elixir, where concurrency is the default. The Actor Model - message passing, isolated processes, no shared state - is how you build reliable distributed systems. When Ruby introduced Ractors in 3.0, I was skeptical. The API was clunky. The limitations were severe. It felt like Ruby trying to be something it wasn't. Ruby 4.0 changed my mind. `Ractor::Port` (the mailbox concept), shareable procs and lambdas, and the removal of awkward APIs like `Ractor.yield` make Ractors ergonomic now. You can write a parallel map in 10 lines of Ruby that would have taken 50 lines of fragile thread code. You can spawn isolated workers that communicate through message passing without worrying about mutexes or race conditions. This talk is for Rubyists who are tired of concurrency being hard. I'll show you what Ruby 4.0 got right, what it still gets wrong, and the patterns I borrowed from Elixir that make Ractors useful in production.
  speakers:
    - Edy Silva

- id: "andy-andrea-rubyconf-2026"
  title: "The little schema that could (...but should it?)"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "andy-andrea-rubyconf-2026"
  description: |-
    Even in a duck-typed language like Ruby, we often work with structured data that adheres to particular schemas. For anyone that's worked in a Rails app, a schema.rb or structure.sql file is an inherent part of our apps, and many Ruby devs have worked with JSON Schema or OpenAPI in various applications. In many of those cases, though, we have a lot of duplication especially when we're dealing with CRUD. A `create` endpoint, for example, might accept incoming parameters that look very similar to what's returned by a `show` endpoint, and both will likely have a lot in common with a corresponding table's schema. This duplication is not a major problem--it can often be the best choice--but what would it look like if we tried to DRY things up a little...or a lot? If we're willing to get a little weird, how far can we possibly take a single schema? In this talk, we'll have a single schema and show how it can be applied to (or shoe-horned into): - Database management - Model generation; - Controller input validation; - Controller output validation; - Testing with RSpec; - Auto-generated documentation that stays up to date; - The front end; - CI; - Metaprogramming; - AI tooling including auto-generating tools for your AI applications to call and ways to improve the efficacy of dev tooling like BugBot and Cursor. We'll be making things DRYer than the Sahara and doing away with tons of boilerplate along the way.
  speakers:
    - Andy Andrea

- id: "gannon-mcgibbon-rubyconf-2026"
  title: "Overengineering Ruby with Native Extensions"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 2 - Charleston E-B"
  video_provider: "scheduled"
  video_id: "gannon-mcgibbon-rubyconf-2026"
  description: |-
    Native extensions are a powerful tool that allows Rubyists to reach outside the Ruby VM into machine code. In this talk, you'll learn just enough C to write your first native extension, and all the different ways you can over complicate your Ruby apps with interoperability.
  speakers:
    - Gannon McGibbon

- id: "alicia-rojas-rubyconf-2026"
  title: "Convention Over Hallucination: Harness Engineering for AI-Powered Rails"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "alicia-rojas-rubyconf-2026"
  description: |-
    Rails succeeded because it replaced thousands of micro-decisions with conventions. AI coding agents face the same problem at a different scale: they can write working code, but without structure, they produce inconsistent, insecure, non-idiomatic output that your team won't ship. The bottleneck in AI-assisted development is no longer writing code: it's verifying it. If your senior engineers spend their time reviewing AI-generated pull requests line by line, you've traded one bottleneck for another. The teams that will win are the ones that design systems to make AI output trustworthy by default. Harness engineering is that system design. Think of it this way: someone just invented a super-fertilizer that makes your plants grow seedling-to-oak-in-six-hours fast. Without a structure to make them grow the way you want, you get a jungle, not a garden. The harness is the garden architecture. And just as Rails gave Ruby structure, the harness gives structure to the AI writing your Rails code. In this talk, I'll walk through the progression from "spicy autocompletion" to agentic engineering and the production harness our consultancy built along the way, organized around four pillars: - Instruct. A layered documentation system (global standards + project-specific context) that acts as onboarding for the AI. - Constrain. Custom RuboCop cops (rubocop-harness) whose error messages are written for the AI agent, not just for humans. - Workflow. Structured commands that encode your development process as repeatable, agent-executable steps. - Verify. AI-powered end-to-end testing (agent_e2e) where a separate agent drives a real browser against your running app, executing plain-English test cases. You will leave knowing where you are on the progression, what the next shift looks like, and concrete patterns you can implement on Monday.
  speakers:
    - Alicia Rojas

- id: "kyle-doliveira-rubyconf-2026"
  title: "Fibonacci Funhouse"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "kyle-doliveira-rubyconf-2026"
  description: |-
    Are you ready to journey into the weird side of Ruby? Join us as we dive deep into the Fibonacci sequence—beyond the simple and into the spectacular. Forget the first, tenth, or even the thousandth Fibonacci number; we're setting our sights on the billionth! In this unusual talk, we'll unravel eleven ways, from simple to downright mind-bending, to compute Fibonacci numbers in Ruby. From straightforward iterations, to tail call optimization, to complex matrix operations. Discover some secret techniques and bizarre quirks of Ruby that make calculating the billionth Fibonacci number not just possible, but fast too. Whether you're a Ruby newbie or a seasoned vet, you'll leave with a toolkit full of Fibonacci hacks and a newfound appreciation for the playful power of Ruby.
  speakers:
    - "Kyle d'Oliveira"

- id: "markus-schirp-rubyconf-2026"
  title: "Pattern Parrots and the Semantic Knot: Mutation Testing in the Agentic World"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 2 - Charleston E-B"
  video_provider: "scheduled"
  video_id: "markus-schirp-rubyconf-2026"
  description: |-
    AI code generators are great amplifiers. They let developers move faster and produce more code. But amplifiers do not distinguish between signal and noise. They amplify misalignment too. Tests are the behavioral contract. A test can pass without verifying the behavior you think it verifies. This has always been a problem. At human speed it was survivable. At agentic speed it is a structural risk. Mutation testing answers a simple question: are there semantics in the code that the tests do not ask for? It systematically modifies code and checks if the tests notice. Every surviving mutation is either dead code to remove or a missing test to write. Both outcomes are wins. Both are actionable by humans and agents alike. This talk explains how mutation testing closes the open loop between AI-generated code and AI-generated tests. It demonstrates how mutant, the mutation testing engine for Ruby, fits naturally into agentic development workflows as a deterministic verification layer. Live examples show what surviving mutations look like, how to act on them, and how the feedback loop tightens both code and tests regardless of who wrote them. No prior mutation testing experience required.
  speakers:
    - Markus Schirp

- id: "alan-ridlehoover-rubyconf-2026"
  title: "Indispensable: What Human Computers Can Teach Human Programmers"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "alan-ridlehoover-rubyconf-2026"
  description: |-
    No one told them what to expect, but the machine was coming. Dozens were reassigned in NASA's transition from human to digital computing. Because the machine could calculate, generalists were expendable. But it could not formulate. So, those who embraced the change (learned to program), knew the domain (orbital mechanics), and could verify the results became indispensable. Now it's our turn as Rubyists: to embrace change, to leverage our expertise, and to verify the results. That's how we become indispensable.
  speakers:
    - Alan Ridlehoover

- id: "joe-dupuis-rubyconf-2026"
  title: "Artisanal Computing: Handcrafted Ruby Execution for the Modern Age"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "joe-dupuis-rubyconf-2026"
  description: |-
    AI is coming for our jobs! It's time to fight back! Ruby is fast. Mass produced. Impersonal. What if it wasn't? What if we could return to a simpler time, when every computation was handcrafted by a real human being? In this talk, I fire the CPU and hire real people to run Ruby instead. I built a human-powered virtual machine out of duct tape and Amazon Mechanical Turk. Every instruction lovingly performed by hand, while AWS burns a hole in my finances I'll never recover from! I lied to the program committee that you'd learn about: - What happens after Ruby parses your code - Where to start if you want to contribute to Ruby itself - How to use LLMs to learn the internals of complex projects - The economics of micro-labor - Cursed uses of Google Sheets - ...and much more! And you just might! But we all know you're here to see a Cronenberg abomination. "Why?," "Is this tax deductible?," and "Are you okay?" are some of the many questions you'll be asking yourself after this talk.
  speakers:
    - Joé Dupuis

- id: "antonio-paulino-rubyconf-2026"
  title: "Tribology on Rails: Reducing Friction and Wear in Software Systems"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-16"
  language: "en"
  track: "Breakout 2 - Charleston E-B"
  video_provider: "scheduled"
  video_id: "antonio-paulino-rubyconf-2026"
  description: |-
    Tribology is the science of friction, wear, and lubrication. Might seem worlds apart from software engineering. But there are some concepts we can use to connect the dots: systems slow down under load, interfaces degrade over time, and without proper "lubrication", can result in unexpected failures. In this talk, we'll explore how tribological principles apply to software architecture and demonstrate how Rails conventions and tools act as the perfect lubricant for building smooth, maintainable systems. From reducing friction in APIs to preventing wear in long-running applications, you'll see your codebase through a mechanical engineer's lens.
  speakers:
    - Antônio Paulino

