  video_id: "noel-rappin-rubyconf-2026"
  description: |-
    I've taught Ruby to a lot of people, and often people seeing Ruby's dynamic types ask how a Ruby developer avoids type errors and gets things done. This session is my answer to the question. Ruby rewards thinking about types with a dynamic mindset instead of a static one. In this workshop, we'll show how use Ruby's dynamism to your advantage. From runtime type checking to coercing data. From nil-avoidance to full object-oriented design, you'll come away with techniques to take full advantage of Ruby's power.
  speakers:
    - Noel Rappin

