- id: "ziggy-the-hamster-rubyconf-2026"
  title: "Weird and Wacky Machines Running Ruby"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "ziggy-the-hamster-rubyconf-2026"
  description: |-
    We all have some notion of the platforms that Ruby currently supports, but considering Ruby is now over 30 years old, have you ever thought about all of the weird and wacky places that Ruby can or has ever run? From Japanese-exclusive systems that you might not have ever heard of to long forgotten systems that were once ubiquitous, I will cover the history of the most interesting of these platforms, try to get Ruby running on them, and experimentally test the question: What operating systems support Ruby?
  speakers:
