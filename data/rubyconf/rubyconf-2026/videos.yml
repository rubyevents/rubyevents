- id: "scott-werner-rubyconf-2026"
  title: "Talking Shit About AI Agents"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "scott-werner-rubyconf-2026"
  description: |-
    Ask seven people what an "AI agent" is and you'll get nine answers. One person will change their mind twice. When we can't name something, it usually means we're looking at something genuinely new. I'll argue that what we're calling "agents" is actually a new programming paradigm hiding in plain sight. Think about what makes up an agent: an LLM, a prompt, a loop, some tools, a way to talk to it. That's a little computer that receives messages and interprets them. That's suspiciously close to what Alan Kay actually meant by "objects" and "Object Oriented Programming". Closer to what we have with Ruby, not what C++ and Java turned it into. We'll take a detour through Xerox PARC circa 1972, explore what Kay meant by message passing and late binding, and discover how LLMs accidentally achieved something he was reaching for: semantic late binding, where the meaning of a message is negotiated at the moment of receipt. Then I'll demo prompt_objects, a Ruby gem where markdown files are the program and Ruby is the environment. You'll see objects interpret messages, modify themselves, create new objects at runtime, and solve ARC-AGI intelligence puzzles on a small, cheap model all with a solver you can read in minutes.
  speakers:
    - Scott Werner

- id: "gabriel-quaresma-rubyconf-2026"
  title: "Why a 1990s Machine Learning Algorithm Destroys LLMs at Predicting House Prices"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "gabriel-quaresma-rubyconf-2026"
  description: |-
    Large Language Models have quickly become one of the most exciting tools in modern software development. With their ability to generate code, answer questions, and interact with natural language, it's easy to start thinking of them as universal problem solvers. But in reality, not every problem is best solved by an LLM. In this talk, we explore a practical example: estimating the price of a property. At first glance, it might seem like the perfect task for an LLM. However, accurate price prediction depends on structured data and statistical learning techniques and as we'll show with actual benchmark experiments, the difference is dramatic. Using a real example built in Ruby, we will train a Random Forest model that provides reliable predictions based on structured datasets, then put it head-to-head against an LLM across four dimensions: accuracy, latency, consistency, and real-world usability. We'll then show how LLMs can still play a critical role by acting as an interface that converts natural language into structured inputs creating a hybrid system that gets the best of both worlds. Rather than replacing traditional machine learning, LLMs can complement it. The goal of this talk is to show developers how to think critically about AI architecture and choose the right tool for the right problem.
  speakers:
    - Gabriel Quaresma

