- id: "cameron-dutro-rubyconf-2026"
  title: "Garnet.js: Implementing the YARV Virtual Machine"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "cameron-dutro-rubyconf-2026"
  description: |-
    At the hack day at RubyConf 2023 in San Diego, Kevin Newton and I put together an extremely basic Ruby interpreter in JavaScript. It was so fun and inspiring that I hacked on it for months afterwards, eventually getting it to run the entire Phlex test suite (and more). Ruby in the browser isn't exactly new. Opal is incredible, and recently ruby.wasm has been making a splash. So why do we need a new Ruby interpreter for the web? We don't! This talk isn't about making a better Opal, production use-cases, or other Serious Business®. It's about having fun building an interpreter for your favorite language and how much you can learn about Ruby along the way. Garnet.js is an implementation of Ruby's YARV (Yet Another Ruby VM) in TypeScript. It uses the new Prism parser and can already run the test suites for some pretty complex projects. I'd like to explain how YARV works and how contributing to Garnet helped me answer almost all of Drew Bragg's Ruby game show questions. When I started writing Ruby back in 2010, I never thought I would have the skills to write an interpreter. That stuff was just too hard for an average guy like me. A few years into my career though, I realized something: you can just do things. I might have heard it first from DHH, but it really stuck with me. If you want something to exist, you can just… do it. You can even do really really big things that seem impossible. Just take it one step at a time, and before you know it, you've made something substantial. That's how Garnet started. It seemed impossible, but then without any warning I'm sitting next to Kevin Newton hacking away at a Ruby interpreter in JavaScript. We only produced maybe 50 lines of code, but I slowly added to it over the next 2 years and Garnet is now quite capable. YARV isn't magic. It's made up of a few entirely understandable components wired together to run Ruby code. I hope to give an overview of those components, demonstrating how Ruby translates raw source code into an AST, then into YARV instructions, and eventually how it executes those instructions. My hope is that explaining YARV via TypeScript will make the concepts more accessible to a Ruby audience than C would, although there should be plenty of Ruby in the talk as well. Of course, building a Ruby interpreter has had its challenges (more to come I'm sure). Here are a few I'm hoping to share with the audience: Lambdas and methods are invoked differently than blocks and procs. How does the interpreter know when to enforce arity, etc? Ruby's argument handling is extremely complex. How do the parser and interpreter work together to handle all the various combinations? (eg. positional, splat, trailing positional, positional with default, keyword, keyword with default, keyword rest, blocks, anonymous splats and keyword splats, forwarding) Regular expression handling via Onigmo. Compiling C projects to WASM and exposing them to Ruby. My goal here is twofold: to spread the knowledge I've gained to more Rubyists, but also to hopefully inspire someone else to work on something big and ambitious.
  speakers:
    - Cameron Dutro

