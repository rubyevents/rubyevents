- id: "jeremy-evans-rubyconf-2026"
  title: "Implementing Core Set"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Main Stage - Red Rock"
  video_provider: "scheduled"
  video_id: "jeremy-events-rubyconf-2026"
  description: |-
    Historically, Ruby's Set class was in the standard library. Starting in Ruby 3.2, the Set standard library was autoloaded by default. In Ruby 4.0, Set is now implemented as one of the core classes. In this presentation, I'll go over the history of Set, why and how it was implemented as a core class, interesting implementation issues, and how it led to a decrease in memory usage for some embedded RTypedData objects (and what RTypedData objects are).
  speakers:
    - Jeremy Evans

- id: "david-gillis-rubyconf-2026"
  title: "Ready: 12x Faster Ruby CLIs Through Spectacular Overengineering"
  kind: "talk"
  event_name: "RubyConf 2026"
  date: "2026-07-14"
  language: "en"
  track: "Breakout 1 - Charleston D-C"
  video_provider: "scheduled"
  video_id: "david-gillis-rubyconf-2026"
  description: |-
    Ruby is a fantastic tool for CLIs, as long as you're ok waiting 100-1000ms for them to boot. What if you didn't have to wait? What if you could get Rust or C speeds instead? Perhaps something like... writing a shell script to intercept the CLI call, which then runs a ruby script that connects to a UNIX socket instead of your PATH's ruby, which then sends its file-descriptors through this socket to a server with your CLI already loaded, which then signals this server to fork itself a new process, which then causes the new process to swap its stdin, out, err with yours that it received from the unix socket, which then finally runs your code. And yes, you can optimize further by compiling those shell scripts into zsh wordcode via zcompile, so they autoload in microseconds and stay loaded. Yes, this is a spectacular display of overengineering. But the results do not lie. This chain of events has given me a 12x average speedup across many popular Ruby CLI tools, including kamal, colorls, ronin, ri, uplot, and more. Kamal now takes 40ms instead of 700, ronin takes 50ms instead of 1100, and I have the full benchmarks to show and demo. I've been using it every day for over a year and don't know how I ever lived without it. In this talk I'll walk through Ready from the bottom up, in four parts. First, how a single config file drives a build system that pulls source out of gem executables, rewrites their require paths, and wraps them into callable shell functions. Second, the UNIX plumbing that makes it possible — sockets that pass file descriptors between processes, something most Rubyists have never seen, but built on something they use every day: $stdout is really just IO.new(1). Third, the engine underneath: Jeremy Evans' by gem, a little-known library preloader that operates at the process level, not the framework level — which is why it generalizes to arbitrary gem executables where Spring never could. And fourth, where things get genuinely hard: running interactive tools like irb through this fork chain, where pipes buffer but PTYs don't, and adding tmux or ssh breaks every assumption again. Along the way, a nice side effect: because every invocation forks from the same pre-resolved process, bundler conflicts, gem path mismatches, and shim headaches just disappear. You'll leave understanding how Ruby processes talk to each other at the file descriptor level, and with a system you can try yourself.
  speakers:
    - David Gillis

