- id: "tom-preston-werner-rubyconf-2010"
  title: "The Road from Ruby Hacker to Entrepreneur"
  raw_title: "RubyConf 2010 - The Road from Ruby Hacker to Entrepreneur by: Tom Preston-Werner"
