- id: "ron-evans-rubyconf-2010"
  title: "How to Jam in Code"
  raw_title: "RubyConf 2010 - How to Jam in Code by: Ron Evans"
  event_name: "RubyConf 2010"
  date: "2010-11-11"
  published_at: "2015-04-02"
