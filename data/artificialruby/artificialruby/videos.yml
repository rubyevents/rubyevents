  description: |-
    Ruby has been noticeably absent from the conversation around building Generative AI-powered applications. In May of this year, we hosted an event to bring together people who were interested in changing that! Less than 30 minutes into the happy hour, people were already asking when the next one would be. So here we are inviting you to join us for our SECOND Ruby AI happy hour on 7/24.

    We see the Ruby mindset as key to unlocking a massive wave of innovation on top of these new Generative AI utilities like LLMs. The potential impact on the industry is at least the size of Rails and Sinatra.

    Looking forward to a night of reconnecting with old friends and meeting new ones, sharing thoughts about how LLMs are changing the work we do and how that affects Rubyists, and bounce your wild ideas off of like-minded peers.

    Hosted by:

    Sublayer: Sublayer is building tooling and infrastructure for AI agents with Blueprints and is building an open source AI agent framework in Ruby.

    Test Double: Test Double is a consulting agency whose experienced developers and product managers are deployed as remote additions to your team. You not only build the right thing, you build it right.

    Infield: Infield automates away the toilsome parts of keeping Rails apps up to date. If you've ever run bundle outdated or rails app:upgrade then you want to use Infield.

    FireHydrant: FireHydrant is your one-stop shop for the entire incident lifecycle from ring to retro. We empower modern engineering teams to achieve reliability at scale by streamliningthe entire alerting to incident lifecycle to be fast, efficient, and configurable.

