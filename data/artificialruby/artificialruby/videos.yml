- id: "artificial-ruby-meetup-may-2024"
  title: "Ruby x AI Happy Hour May 2024"
  date: "2024-05-22"
  video_provider: "not_recorded"
  video_id: "artificial-ruby-meetup-may-2024"
  description: |-
    Ruby has been noticeably absent from the conversation around building Generative AI-powered applications. We're changing that!

    We see the Ruby mindset as key to unlocking a massive wave of innovation on top of these new Generative AI utilities like LLMs. The potential impact on the industry is at least the size of Rails and Sinatra.

    But that all starts with community.

    So join us for a night of reconnecting with old friends and meeting new ones, sharing thoughts about how LLMs are changing the work we do and how that affects Rubyists, and bounce your wild ideas off of like-minded peers!

    We'll also be raffling off 3 copies of Obie Fernandez's new book "Patterns of Application Development Using AI" (with examples in Ruby!)

    Hosted by Sublayer and Company Ventures

    https://www.artificialruby.ai/events/may-22-2024
    https://lu.ma/cbeeanbk
