# April 2026

- id: "artificial-ruby-meetup-april-2026"
  title: "ArtificialRuby.ai Meetup April 2026"
  raw_title: "ArtificialRuby.ai NYC: April"
  date: "2026-04-22"
  video_provider: "children"
  video_id: "artificial-ruby-meetup-april-2026"
  description: |-
    "When you don't create things, you become defined by your tastes rather than ability. Your tastes only narrow & exclude people. So create." - Why the Lucky Stiff

    Artificial Ruby is a monthly gathering for people who build things: engineers, designers, founders, and anyone else who's picked up AI and started creating with it. Those creating for the first time or who are creating more than they ever thought possible.

    We started as a Ruby and AI community and that's our foundation, but our events are for anyone who shares the same ethos: ship things, stay curious, be generous with what you know. You'll find senior engineers who've been in the Ruby community for 15 years alongside designers, PMs, and founders who are building with AI for the first time. What everyone has in common is they're actually making things and they're excited about it.

    Each event: three talks, good conversation, and plenty of time to connect with people who are navigating this moment alongside you.

    Important: Please bring a valid photo ID that matches your RSVP for admission.

    https://www.artificialruby.ai/events/april-22-2026
    https://lu.ma/m1z16db0
  talks:
    - id: "jon-berger-artificialrubyai-meetup-april-2026"
      title: "The NeverEnding Vibecodes"
      event_name: "ArtificialRuby.ai Meetup April 2026"
      date: "2026-04-22"
      published_at: "2026-05-06"
      video_provider: "youtube"
      video_id: "JaTLvbD8CRM"
      description: ""
      speakers:
        - Jon Berger

    - id: "brian-hecht-artificialrubyai-meetup-april-2026"
      title: "Confessions of a New Builder"
      event_name: "ArtificialRuby.ai Meetup April 2026"
      date: "2026-04-22"
      published_at: "2026-05-06"
      video_provider: "youtube"
      video_id: "bR22Hd9vDY8"
      description: |-
        I spent 20 years as a founder and 10 as an investor and I've never written a line of code in my life. Then one day I met Claude and built an entire suite of productivity tools in a week. I'll show you what I built and why I've decided to form a company around it!
      speakers:
        - Brian Hecht

    - id: "avi-flombaum-artificialrubyai-meetup-april-2026"
      title: "Don't Read the Code: Trusting AI With Your Rails Codebase"
      event_name: "ArtificialRuby.ai Meetup April 2026"
      date: "2026-04-22"
      published_at: "2026-05-06"
      video_provider: "youtube"
      video_id: "BjMBYT4Y8tw"
      description: |-
        Learn to let go with AI so you don't even need to read your code. See an AI harness for Rails apps that writes code to fit your app, patterns, and your team. We'll generate an app that ships with workflow skills, conventions, and agent hooks that will let us one-shot the most complicated thing you can come up with and then read the code. While Claude works on that, we'll cover the AI harness and how it works.
      speakers:
        - Avi Flombaum

