- id: "brandon-weaver-southeast-ruby-2019"
  title: "Tales from the Ruby Grimoire"
  event_name: "Southeast Ruby 2019"
  date: "2019-08-02"
  video_provider: "not_recorded"
  video_id: "brandon-weaver-southeast-ruby-2019"
  description: |-
    Ruby has serious black magic, and people are quick to dismiss it as "not good code", but there are lessons to be learned and fascinating concepts to discover for those brave enough to venture down that path. The Ruby Grimoire is a collection of my most evil Ruby code, enter if you dare.
  speakers:
    - Brandon Weaver

- id: "alex-neuhausen-southeast-ruby-2019"
  title: '"Holy Front-End Frameworks Batman!" Using Rails and Vue.js to Clean Up a Complex Client-Side'
  event_name: "Southeast Ruby 2019"
  date: "2019-08-02"
  video_provider: "not_recorded"
  video_id: "alex-neuhausen-southeast-ruby-2019"
  description: |-
    I'm going to present an app architecture that takes the dynamic duo of Rails and Vue.js to its logical endpoint, pairing the agile, opinionated server-side framework that we all know and love with Vue's fast rendering, encapsulation, and easy integration into an existing server-rendered workflow.
  speakers:
    - Alex Neuhausen

- id: "richard-schneeman-southeast-ruby-2019"
  title: "The Life-Changing Magic of Tidying Active Record Allocations"
  event_name: "Southeast Ruby 2019"
  date: "2019-08-02"
  video_provider: "not_recorded"
  video_id: "richard-schneeman-southeast-ruby-2019"
  description: |-
    Your app is slow. It does not spark joy. In this talk, we will use memory profiling tools to discover performance hotspots. We will use this technique with a real-world application to identify a piece of optimizable code in Active Record that leads to a patch with substantial page speed impact.
  speakers:
    - Richard Schneeman

