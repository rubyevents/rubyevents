- id: "okura-masafumi-workshop-rubyconf-africa-2026"
  title: "Ruby for complete beginners WORKSHOP"
  kind: "workshop"
  date: "2026-08-21"
  language: "English"
  video_provider: "scheduled"
  video_id: "okura-masafumi-workshop-rubyconf-africa-2026"
  description: |-
    This is a workshop for beginners. Not only for "Ruby" beginners, but programming beginners as well. Ruby is the best language to learn modern concepts of programming and how code works. Having run more than 10 Ruby workshops in Japan, I prepare failing test cases with Minitest and let attendees write the code that makes the tests green.
