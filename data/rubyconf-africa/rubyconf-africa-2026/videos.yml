  title: "Building a Community"
  kind: "talk"
  date: "2026-08-21"
  language: "English"
  video_provider: "scheduled"
  video_id: "valeria-bosibori-rubyconf-africa-2026"
  description: |-
    Community can start small but with intention, it can grow into an ecosystem that develops people, not just gathers them.

    This talk shares my journey building Tech Sisters Kenya the wins, the challenges, and the lessons to inspire a new generation of community builders to create spaces where people don't just join, but grow and contribute.
