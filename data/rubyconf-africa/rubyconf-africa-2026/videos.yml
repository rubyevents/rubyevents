- id: "fh-ndiritu-rubyconf-africa-2026"
  title: "In the Age of abundance, are we bottlenecks?"
  kind: "talk"
  date: "2026-08-21"
  language: "English"
  video_provider: "scheduled"
  video_id: "fh-ndiritu-rubyconf-africa-2026"
  description: |-
    Over the last year I've run experiments building AI-native solutions — recommendation engines, speech synthesis, image inpainting, and agentic applications driven by nothing but user input.

    But the more I could build, the bigger the question became: if I can build anything, what should I build?

    This led to an even more fascinating shift — using AI to build AI applications. Moving faster than ever. Questioning everything. And slowly realising that the bottleneck isn't the technology.

    It has become us. Join me on stage for a curious, provocative, and hands-on exploration of the age of abundance — where imagination is the only skill that matters, speed is a moat and the only question left worth asking is: are we the new bottleneck?
  speakers:
    - FH Ndiritu

