- id: "victor-turuthi-rubyconf-africa-2026"
  title: "The Reviewable Codebase: Architecture and Performance Gates in Ruby"
  kind: "talk"
  date: "2026-08-21"
  language: "English"
  video_provider: "scheduled"
  video_id: "victor-turuthi-rubyconf-africa-2026"
  description: |-
    The bottleneck has shifted from writing code to trusting it. We'll cover:

    Deterministic gates — RuboCop, Sorbet/RBS, Brakeman, and mutation testing wired into CI so problems are caught before a human opens the PR
    Performance budgets in CI
    Isolation boundaries
    Blessed paths
  speakers:
    - Victor Turuthi

- id: "bernard-banta-rubyconf-africa-2026"
  title: "Sanarei: Offline Web Browsing with Ruby"
  kind: "talk"
  date: "2026-08-21"
  language: "English"
  video_provider: "scheduled"
  video_id: "bernard-banta-rubyconf-africa-2026"
  description: |-
    This talk introduces Sanarei, a Ruby middleware that leverages USSD to enable offline-friendly web experiences on basic mobile phones. Attendees will learn how to build web applications that function without internet access and how to extend digital services to billions of underserved users worldwide. Discover how Ruby can help drive meaningful financial and digital inclusion.
  speakers:
    - Bernard Banta

