# Day 2 - September 15th

- id: "ryunosuke-sato-sapporo-rubykaigi-2012"
  title: "The development with community"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  video_provider: "vimeo"
  video_id: "50026165"
  description: |-
    Recently, I think that the chance you hear the word "SOCIAL CODING" is increasing. Are there something good in there?? I believe that the people not only "special" but also loves software development can enjoy it. I will talk about what I found through my operating nothub (this is the product for more enjoyment GitHub). It is the relation there are between the people with the products.
  speakers:
    - Ryunosuke Sato

- id: "shugo-maeda-sapporo-rubykaigi-2012"
  title: "Purely functional programming in Ruby"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  slides_url: "https://shugo.net/tmp/functional_ruby.pdf"
  video_provider: "vimeo"
  video_id: "51563006"
  description: |-
    Ruby has some features for functional programming such as blocks; however, Ruby is a very imperative language and purely functional programming is not so common in Ruby. This talk will illustrate how you can write purely functional code in Ruby (e.g., persistent data structures, lazy evaluation).
  speakers:
    - Shugo Maeda

- id: "shota-fukumori-sapporo-rubykaigi-2012"
  title: "Guide to Social Coding"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/sorah/guide-to-social-coding"
  video_provider: "vimeo"
  video_id: "50026166"
  description: |-
    Recently, most Rubyists are using GitHub to publish their own code. Most attendees to this kaigi are probably already using GitHub. Do you know the slogan "social coding?" GitHub provides us with many features for social coding. For example, one useful feature is pull request. By using this, you can contribute easily in the same way to projects on GitHub no matter how large the project is. However, there are not many Japanese social coders currently... I will discuss "how to social coding" with my past pull requests.
  speakers:
    - Shota Fukumori

- id: "kazuki-tsujimoto-sapporo-rubykaigi-2012"
  title: "Pattern Matching in Ruby"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/k_tsj/patternmatchinginruby"
  video_provider: "vimeo"
  video_id: "51563007"
  description: |-
    Pattern matching is a very powerful feature, but Ruby does not have it. To support the feature, it is necessary to consider the pattern matching system based on the object model of Ruby. This talk will introduce an example of pattern matching in Ruby through the pattern-match library.
  speakers:
    - Kazuki Tsujimoto

