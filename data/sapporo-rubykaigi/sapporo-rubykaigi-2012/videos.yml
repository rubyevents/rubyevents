- id: "danish-khan-sapporo-rubykaigi-2012"
  title: "Ruby Community"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "English"
  slides_url: "https://speakerdeck.com/danishkhan/ruby-community-reddot-ruby-conf"
  # video_provider: "vimeo"
  # video_id: "50174801"
  video_provider: "not_published"
  video_id: "danish-khan-sapporo-rubykaigi-2012"
  description: |-
    Ruby is now 18 years old. It has become a very mature project and the developers that have been using it are a lot more mature now as well. Our community has long since crossed the chasm and we are in the early majority stage. This means that even though we have many people who are well versed in the language we are again having an influx of new people. I want to help those new people feel comfortable enough to believe they can learn and become just as mature as the oldies who are part of the community.
  speakers:
    - Danish Khan

- id: "yoko-harada-sapporo-rubykaigi-2012"
  title: "Why Don't You Go To Conferences In US?"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  # video_provider: "vimeo"
  # video_id: "51563636"
  video_provider: "not_published"
  video_id: "yoko-harada-sapporo-rubykaigi-2012"
  description: |-
    Are you an open source software (OSS) developer? Yes? Then, you should go to the conferences in the U.S. That is because the U.S. is a home of software industry. OSS project leads as well as many people like you will come around during the conferences. It is easy to talk with such people in person and get to know each other. That's a huge fun, absolutely. Still suspicious? or hesitating? Then listen to my talk. You'll start planning a visit to conferences in the U.S. Your experience there will boost the energy to code.
  speakers:
    - Yoko Harada

- id: "tatsuhiko-miyagawa-sapporo-rubykaigi-2012"
  title: "Ruby; Exported"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/miyagawa/ruby-exporter"
  # video_provider: "vimeo"
  # video_id: "50568776"
  video_provider: "not_published"
  video_id: "tatsuhiko-miyagawa-sapporo-rubykaigi-2012"
  description: |-
    Ruby is known to have been inspired by many programming languages, especially Lisp and Perl. Most notably Perl's principle "TIMTOWTDI" motto was imported to Ruby as the "Diversity matters" concept. Similarly, some concepts in successful Ruby projects such as Rails (CoC, full-stack MVC framework) and Sinatra (dead-simple DSL to write web applications) have inspired other programming language communities, but not all of them have been successful doing so. In this talk, I'll take some examples of projects where I've been shamelessly inspired by Ruby's equivalents (Rack, Unicorn and Bundler) and how it has been successfully exported to and accepted by the Perl developers community.
  speakers:
    - Tatsuhiko Miyagawa

- id: "andrew-grimm-sapporo-rubykaigi-2012"
  title: "Japanese - a programmer's language"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "English"
  video_provider: "vimeo"
  video_id: "51563635"
  description: |-
    At first glance, Japanese looks to westerners like a very strange and difficult language. However, in many ways it is more similar to English than other European languages are, and an increasing amount of its vocabulary comes from English. In addition, so far I have found Japanese to be a very logical language. While half an hour is not sufficient to teach the entirety of the Japanese language, I intend to show a glimpse of what Japanese is like, and some of its interesting idiosyncrasies. This will include "English made in Japan" (wasei-eigo), honorifics such as the "san" in "Daniel-san", and why both toilets and temples get the same "o" prefix (bikago).
  speakers:
    - Andrew Grimm

- id: "akira-matsuda-sapporo-rubykaigi-2012"
  title: "Rails3 Recipe Book Gaiden"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/a_matsuda/rails3-recipe-book-gaiden"
  # video_provider: "vimeo"
  # video_id: "50568774"
  video_provider: "not_published"
  video_id: "akira-matsuda-sapporo-rubykaigi-2012"
  description: |-
    This talk will be a purely technical Rails talk, introducing tons of esoteric and enigmatic tips, tricks, and hacks.
  speakers:
    - Akira Matsuda

- id: "koichi-sasada-sapporo-rubykaigi-2012"
  title: "Towards Ruby 2.0: Progress of VM Internals"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  slides_url: "https://www.atdot.net/~ko1/activities/SapporoRubyKaigi2012_ko1_pub.pdf"
  video_provider: "vimeo"
  video_id: "51563637"
  description: |-
    Currently, we are working on Ruby 2.0, which will be released next February. In particular, we are enjoying rewriting the virtual machine (VM) of Ruby 2.0 as a member of Matz's team in Heroku, Inc. - to make it more useful, high performance, low resource consuming and more sophisticated. In this presentation, we will talk about the progress of VM implementation including new features related to VM internals such as profiling/debugging support and progress with improving the performance of the Ruby 2.0 interpreter. We will also show plans for the release of Ruby 2.0.
  speakers:
    - Koichi Sasada

- id: "keita-urashima-sapporo-rubykaigi-2012"
  title: "Ruby on Rails: The Bad Parts"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  # video_provider: "vimeo"
  # video_id: "50568777"
  video_provider: "not_published"
  video_id: "keita-urashima-sapporo-rubykaigi-2012"
  description: |-
    Rails is getting more sophisticated as time goes by. However, there are many pitfalls out there. That is to say, Helper is useless, the layer we need doesn't exist fills between filter/partial and Engines and the misguiding concept like "Skinny Controller, Fat Model". In this talk, I will review these issues and give you some perspective in future developing of Rails applications.
  speakers:
    - Keita Urashima

- id: "narihiro-nakamura-sapporo-rubykaigi-2012"
  title: "Serious GC with Ruby"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-15"
  language: "Japanese"
  video_provider: "vimeo"
  video_id: "51563638"
  description: |-
    Why do you write GC with C? Do you want to write GC with Ruby? This talk will show how to write GC with (J)Ruby! You will be able to write serious GC, not a toy.
  speakers:
    - Narihiro Nakamura

# Day 3 - September 16th

- id: "shibata-hiroshi-sapporo-rubykaigi-2012"
  title: "Continuous Delivery in Ruby World"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/hsbt/20120916-sappororubykaigi2012"
  # video_provider: "vimeo"
  # video_id: "50723534"
  video_provider: "not_published"
  video_id: "shibata-hiroshi-sapporo-rubykaigi-2012"
  description: |-
    Continuous delivery is concept which is continuously supplying a value of software to users or customers. Comprehensive patterns of the continuous delivery, we need to choose tools and development systems which are appropriate to our development process or quality assurance system. "Continuous Delivery" by David Farley described comprehensive patterns of the continuous delivery. Some patterns and tools are required when Rubyist introduce continuous delivery. In this presentation, I will show example of applying the patterns and practical tools of continuous delivery through an actual case.
  speakers:
    - Hiroshi SHIBATA

- id: "jonathan-mukai-heidt-sapporo-rubykaigi-2012"
  title: "What We Talk About When We Talk About Code"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "English"
  # video_provider: "vimeo"
  # video_id: "51956190"
  video_provider: "not_published"
  video_id: "jonathan-mukai-heidt-sapporo-rubykaigi-2012"
  description: |-
    Code can be many things to many different people. It is automation as well as communication -- between a person and a machine, but also between two or more people. People understand code differently. Consider the difference in understanding between a total beginner and a veteran developer. Code is not only understood differently, it is valued differently. "Good code" means something completely different to a developer than it does to a product manager. Anyone who works in software for a significant period of time begins to realize that writing code is only a small portion of our day to day work and that there is a great difference between "writing good code" and "writing good software." How can we use these different perspectives to see code from a new perspective? How can thinking about code differently help us as developers?
  speakers:
    - Jonathan Mukai-Heidt

- id: "kenta-murata-sapporo-rubykaigi-2012"
  title: "Distributed RSpec"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/mrkn/distributed-rspec"
  video_provider: "vimeo"
  video_id: "50948869"
  description: |-
    I will introduce a library for distributed execution your spec files. This library has two strategies in order to distribute spec files. One divides spec files into some groups and distributes them. The other distributes every code example following the producer-consumer way. I will also describe the usage of the library in COOKPAD. COOKPAD develops large Rails applications including about 800 models. I will demonstrate the effectiveness of the library by showing the time saved by a COOKPAD CI job by using this library.
  speakers:
    - Kenta Murata

- id: "linda-liukas-and-terence-lee-sapporo-rubykaigi-2012"
  title: "The First Cut is Deepest"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "English"
  # video_provider: "vimeo"
  # video_id: "51956191"
  video_provider: "not_published"
  video_id: "linda-liukas-and-terence-lee-sapporo-rubykaigi-2012"
  description: |-
    Being a beginner in any community can be tough, but it allows you to view the world with a fresh set of eyes. You see things as they are or how they should be. When you get to be an expert, you tend start making things more complicated and lose touch with the beginner's mind. This talk will look into how we can help beginners have more magical, simple moments with Ruby but also what we can learn from them to help make a better community.
  speakers:
    - Linda Liukas
    - Terence Lee

- id: "eric-hodel-sapporo-rubykaigi-2012"
  title: "Keynote: Writing Ruby for Fun"
  kind: "keynote"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "English"
  video_provider: "vimeo"
  video_id: "50949962"
  description: |-
    Eric will talk about some ruby programs he's written for fun. Some were written for the joy of learning, some for practical reasons. Eric will cover why he wrote them, which parts were fun and which were frustrating, and what he learned from them, from network protocols to writing games.
  speakers:
    - Eric Hodel

- id: "koichiro-eto-sapporo-rubykaigi-2012"
  title: "User Oriented Service Design"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  video_provider: "vimeo"
  video_id: "50949961"
  description: |-
    We proposed "user oriented service design" as a service design method by users. For example, it is difficult to design services for a wide variety of Web sites on the Internet. Because you have to write code to handle each Web site. But if the users can write codes to handle each Web site and collect the codes, we can fix the problem. In this presentation, I introduce AutoPagerize as an application and Wedata as the storage. Wedata is used by approximately 1,370,000 users (July 2011). Also the applications that uses Wedata are increased.
  speakers:
    - Koichiro Eto

- id: "kei-shiratsuchi-sapporo-rubykaigi-2012"
  title: "How a small team built an e-commerce service with Ruby on Rails and Spree"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/kei_s/ruby-on-rails-and-spree"
  # video_provider: "vimeo"
  # video_id: "51956189"
  video_provider: "not_published"
  video_id: "kei-shiratsuchi-sapporo-rubykaigi-2012"
  description: |-
    I will talk about how we built and operate an e-commerce service, starting from no experience with e-commerce. We chose Ruby on Rails and Spree, and launched in about three months. I will show tricks and know-how with coding Spree, for the first time in Japan (as far as I know). I will also talk about how our small team developed and operate a rapid start-up service.
  speakers:
    - Kei Shiratsuchi

- id: "tatsuo-sakurai-sapporo-rubykaigi-2012"
  title: "The Way of Fun Development"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  # video_provider: "vimeo"
  # video_id: "51024768"
  video_provider: "not_published"
  video_id: "tatsuo-sakurai-sapporo-rubykaigi-2012"
  description: |-
    When I started my career as a programmer, I was not happy. There were too many hard things. Then I changed my job, and found Ruby. After that, I have been working with agile programming practices such as pair programming and enjoying Ruby communities. Ruby has changed my life thoroughly; I AM VERY HAPPY. These days, Ruby is widely used, and I think there are some people who are working as a Ruby programmer already but not confident as a Rubyist, not a member of the Ruby community though having an interest in it. I just want to talk to these people about 'How to enter Ruby communities' and 'How to enjoy Ruby'.
  speakers:
    - Tatsuo Sakurai

- id: "kakutani-shintaro-sapporo-rubykaigi-2012"
  title: "DCI and the application builds our mental models"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/kakutani/dci-sprk2012"
  # video_provider: "vimeo"
  # video_id: "51957143"
  video_provider: "not_published"
  video_id: "kakutani-shintaro-sapporo-rubykaigi-2012"
  description: |-
    DCI (Data, Context and Interaction) is a "paradigm" in object-oriented application design. DCI is getting popular with object-oriented proponent Rubyists these days. In this talk, we'll discuss: Why object-oriented proponent Rubyists mention DCI? What DCI is, and how DCI is complementary to the MVC framework of Ruby on Rails. (So far) how to avoid 'Too fat to be a model' and/or 'Fat Controller' in Rails App using DCI. After this talk you'll be at the starting point to improve the design of your application to be more clear and concise.
  speakers:
    - Kakutani Shintaro

- id: "mitsutaka-mimura-sapporo-rubykaigi-2012"
  title: "Surviving Projects After the GitHub Revolution: An Ordinary Programmer's Guide"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/takkanm/survivingprojectsafterthegithubrevolution"
  # video_provider: "vimeo"
  # video_id: "51100570"
  video_provider: "not_published"
  video_id: "mitsutaka-mimura-sapporo-rubykaigi-2012"
  description: |-
    I'm Rubyist working for Eiwa System Management, Inc. There are a lot of edge Rubyist and object-oriented proponents in our company. From last year, GitHub was introduced into the company, until then, the code which shared only in the project became easy to see for various people, and it was in a situation that it was easy to get various feedback. In the future, I believe that a Social Coding environment like GitHub will be wide spread and helpful for work as well. When a social coding environment comes to your workplace, how should an ordinary programmer feel and act? We will talk about it with actual cases.
  speakers:
    - Mitsutaka Mimura

- id: "nick-sutterer-sapporo-rubykaigi-2012"
  title: "Off the Tracks - Challenging the Rails Mindset"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "English"
  # video_provider: "vimeo"
  # video_id: "51957144"
  video_provider: "not_published"
  video_id: "nick-sutterer-sapporo-rubykaigi-2012"
  description: |-
    Rails - a word that stirs programmer's blood. It brought us testing, easy web app building, database abstraction and hundreds of extension gems. Why not take it to another level and discover how Rails turns into a real OOP framework? By exploring chosen gems let's discuss what MVC really is and how it boosts your AJAX user interface, how to apply patterns like DCI, dependency injection and POROs to your database layer and how to expose your Rails system through a real RESTful API.
  speakers:
    - Nick Sutterer

- id: "yutaka-hara-sapporo-rubykaigi-2012"
  title: "DIY programming - Code for yourself"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://route477.net/files/sprk2012/"
  # video_provider: "vimeo"
  # video_id: "51100568"
  video_provider: "not_published"
  video_id: "yutaka-hara-sapporo-rubykaigi-2012"
  description: |-
    There are people who love making furniture by themselves. It is not so popular to make software as DIY, but more people should be enjoying DIY programming in the future since it is becoming more and more easy to learn programming. We programmers are allowed to enjoy this progressive kind of life-style in advance. In this talk I will introduce various techniques useful for making software for ourselves, in addition to software I wrote in Ruby for myself such as music player, household account app or tools for games.
  speakers:
    - Yutaka HARA

- id: "kenji-okimoto-sapporo-rubykaigi-2012"
  title: "How to fix bugs"
