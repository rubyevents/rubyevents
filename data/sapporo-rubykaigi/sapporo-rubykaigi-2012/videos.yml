- id: "david-calavera-sapporo-rubykaigi-2012"
  title: "Scaling in the unknown, how GitHub develops, ships and supports GitHub Enterprise"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-14"
  language: "English"
  video_provider: "vimeo"
  video_id: "50026162"
  description: |-
    Everybody talks about scaling up, but, what happens when you have to scale down? or even, what happens when you don't control where your product is being deployed? In this session we'll talk about how we build GitHub enterprise, keeping every feature that you can find in github.com, and how we ship it ready to deploy on your infrastructure.
  speakers:
    - David Calavera

- id: "yuichiro-masui-sapporo-rubykaigi-2012"
  title: "Ruby + iOS = Super awesome!"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-14"
  language: "Japanese"
  slides_url: "https://www.scribd.com/document/105622019/MobiRuby-introduction"
  # video_provider: "vimeo"
  # video_id: "51481485"
  video_provider: "not_published"
  video_id: "yuichiro-masui-sapporo-rubykaigi-2012"
  description: |-
    Are you fed up with Objective-C? Now, you can build iOS apps with mruby. MobiRuby aims to replace Objective-C/C/Java on mobile platforms with Ruby, just like you can use Lua or Mono to build apps on those platforms. In this presentation, I will talk about how to create iOS app using MobiRuby and MobiRuby internals.
  speakers:
    - Yuichiro Masui

- id: "josh-lane-sapporo-rubykaigi-2012"
  title: "Release Early and Release Often: Reducing deployment friction"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-14"
  language: "English"
  video_provider: "vimeo"
  video_id: "50026163"
  description: |-
    At Engine Yard, we release the main EY Cloud code base at least once a day, many times more often than that. Yet we still have a fairly rigorous testing and release process. We have simply automated and connected as much of the process as possible. In this talk I will discuss how we do our deployments and how it ties in with our continuous integration service, and how we automated and tied it all together.
  speakers:
    - Josh Lane

