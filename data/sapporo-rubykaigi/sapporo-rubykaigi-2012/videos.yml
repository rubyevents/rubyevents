- id: "kyosuke-morohashi-sapporo-rubykaigi-2012"
  title: "Let your test drive your development"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/moro/let-your-test-drive-your-development"
  video_provider: "vimeo"
  video_id: "51957855"
  description: |-
    I'll talk about "thought" during writing developer tests by RSpec, Cucumber, etc. as I would like audiences to let their tests help their software development. Some may think that tests are interrupters of software development although TDD has now become an essential part of Ruby development. Newbies often worry about 'What to test?' or 'How many tests should I write?' and that stays their hand. I think tests are good drivers of development. So I'll give an answer to the above based on my experience.
  speakers:
    - Kyosuke MOROHASHI

- id: "dane-harrigan-sapporo-rubykaigi-2012"
  title: "Finding True Love in Legacy Software"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "English"
  # video_provider: "vimeo"
  # video_id: "51480894"
  video_provider: "not_published"
  video_id: "dane-harrigan-sapporo-rubykaigi-2012"
  description: |-
    Every line of code has a story. Every block of code has a lesson. The Heroku API is the oldest and largest codebase on the platform. This is my story of being introduced to the code and why I've fallen for it. In this presentation I'll go through code that, at face value, may seem strange or wrong, but offers much more when you place yourself in the shoes of the developer at that time. Legacy software may come with code you'd rather not see or touch, but it also comes with solutions to problems you don't have to relive and a history of why certain decisions were made. I'll talk about how and why inheriting legacy code can be a great experience.
  speakers:
    - Dane Harrigan

- id: "kensuke-nagae-sapporo-rubykaigi-2012"
  title: "Inside 30days Album - Fighting against legacy Rails"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/kyanny/inside-30days-album-fighting-against-legacy-rails-number-sprk2012"
  video_provider: "vimeo"
  video_id: "51957858"
  description: |-
    30days Album, known as an online photo sharing service, was launched at April 2008. This is a legacy Rails application for two reasons. Firstly, it depends on a very old version of Rails. Secondly, there is not enough of an automated test suite. That is the destiny of historical application. In my presentation, I will introduce various topics including the knowledge of development/operation of legacy Rails applications, the hardship of legacy, the difficulty of adding tests against existing applications, and the attitude of fighting with legacy Rails application.
  speakers:
    - Kensuke Nagae

- id: "kouhei-sutou-sapporo-rubykaigi-2012"
  title: "How to make clear code"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "Japanese"
  # video_provider: "vimeo"
  # video_id: "51480247"
  video_provider: "not_published"
  video_id: "kouhei-sutou-sapporo-rubykaigi-2012"
  description: |-
    I like coding. I say more. I like coding clear code. I hope that we can code clear code because coding clear code is very fun. I'll talk about how I code clear code.
  speakers:
    - Kouhei Sutou

- id: "michal-taszycki-sapporo-rubykaigi-2012"
  title: "Programming Workout"
  event_name: "Sapporo RubyKaigi 2012"
  date: "2012-09-16"
  language: "English"
  slides_url: "https://speakerdeck.com/mehowte/we-can-code-better-sapporo-ruby-kaigi-2012"
  video_provider: "vimeo"
  video_id: "51957854"
  description: |-
    Our tools are becoming ever more efficient... Command line tools are becoming obsolete... Programmers today don't need to touch-type... Can you feel it? Can you feel that this is TRUE? Then stop being UNPROFESSIONAL and think again! In this talk, I'm going to convince you that learning seemingly obsolete skills can have huge impact on your productivity. I will show you how these skills and other seemingly unimportant factors can impact your career. I will help you find ways to improve these skills in order to become a better programmer. I will also show you tools that can facilitate this process. In other words, I will show you how programmers WORK OUT.
  speakers:
    - Michal Taszycki
