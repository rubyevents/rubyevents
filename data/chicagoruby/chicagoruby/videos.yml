  video_provider: "scheduled"
  video_id: "chicagoruby-chicagoruby-paypal-braintree"
  description: |-
    Our Host: Paypal/Braintree - For over 25 years, PayPal has revolutionized global commerce with innovative experiences that make shopping, selling, and sending money simple, personalized, and secure. We empower consumers and businesses in nearly 200 markets to thrive in the global economy. **Speakers:** ⁭ **Joel Hawksley (remote) -** Beyond Senior: Consider the staff path! You’re at senior, but you’re hungry for more. What’s next? In this talk, we’ll attempt to define the staff role and help you decide if it’s a good fit for your career. **About Joel:** _Joel is a staff software engineer at GitHub, working on the health of the GitHub.com Rails monolith._ ⁭ **Tyler Ewing (in person) -** Your Business Workflows Are Invisible But They Shouldn't Be Every Rails app has critical business processes hiding in plain sight: scattered across background jobs, boolean columns, and callback chains that no one can fully trace. In this talk, we will live-refactor a realistic onboarding workflow from tangled, implicit logic into an explicit, readable pipeline, showing how treating workflows as first-class objects transforms your ability to debug, observe, and reason about what your app is actually doing. **About Tyler:** With over a decade of experience in Ruby, Tyler Ewing runs his own shop that created and maintains Ductwork: a Ruby workflow framework. He lives on the north side of Chicago.

    https://www.meetup.com/chicagoruby/events/313433468/
