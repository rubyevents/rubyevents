    https://www.meetup.com/nyc-rb/events/299222897
  talks:
    - id: "scott-werner-nyc-rb-march-2024"
      title: "Going Postel"
      event_name: "NYC.rb March 2024"
      date: "2024-03-13"
      video_provider: "not_recorded"
      video_id: "scott-werner-nyc-rb-march-2024"
      description: |-
        Postel's Law states that we should be liberal in what we accept and conservative in what we send. When working with code generated from LLMs, embracing this principle is even more important. Explore the ways that Ruby's flexibility makes this possible, why Ruby is a sleeping giant in the future of LLM-generated code, and the key to unlocking generative AI's true power for software development.
      speakers:
        - Scott Werner

