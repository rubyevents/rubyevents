- id: "brian-casel-brightonruby-2026"
  title: "Your experience is your (AI) advantage"
  kind: "talk"
  date: "2026-06-25"
  language: "en"
  video_provider: "scheduled"
  video_id: "brian-casel-brightonruby-2026"
  description: |-
    Everyone's seen AI spin up a fresh app from scratch. But what about your well-established codebase, with years of decisions, conventions, and real users? Brian Casel argues that experienced developers have the biggest advantage in the AI era, and shows why the best teams are blurring the lines between developer, designer, and product manager—and what that means for us as builders.
