- id: "scott-chacon-rubyconf-uruguay-2011"
  title: "A Tale of Three Trees"
  raw_title: "A Tale of Three Trees"
  speakers:
    - Scott Chacon
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    Git is the version control system most of us use every day. However, there are some strangenesses to it. Raise your hand if you really understand the 'reset' command. This talk will de-mystify the 'reset' command so that you are not only comfortable using it, but can do new and interesting things with it and in doing so will arrive at a better understanding of the entire Git system. We will explore the Three Trees of Git (HEAD, index, work tree) and all the cool and mind-bending fun you can have with them.
  video_provider: "not_published"
  video_id: "scott-chacon-rubyconf-uruguay-2011"
  language: "english"

