  video_id: "jano-gonzalez-rubyconf-uruguay-2011"
  language: "spanish"

- id: "nick-sutterer-rubyconf-uruguay-2011"
  title: "CRUD Is Not REST - Hypermedia For Y'All!"
  raw_title: "CRUD Is Not REST - Hypermedia For Y'All!"
  speakers:
    - Nick Sutterer
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    REST is an architectural style for distributed systems. However, many implementations forget about the distributed part of REST and simply map CRUD operations to HTTP verbs in a monolithic application. We're gonna go further and learn why hypermedia is the crucial part of REST architectures.
  video_provider: "not_published"
  video_id: "nick-sutterer-rubyconf-uruguay-2011"
  language: "english"

- id: "sean-cribbs-rubyconf-uruguay-2011"
  title: "Resources, For Real This Time (with Webmachine)"
  raw_title: "Resources, For Real This Time (with Webmachine)"
  speakers:
    - Sean Cribbs
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    What if, instead of forcing HTTP into our MVC-shaped applications, we shaped our applications like HTTP? This is the world of Webmachine, a toolkit for building HTTP applications and a port of the Erlang toolkit of the same name.
  video_provider: "not_published"
  video_id: "sean-cribbs-rubyconf-uruguay-2011"
  language: "english"

- id: "konstantin-haase-rubyconf-uruguay-2011"
  title: "Real Time Rack"
  raw_title: "Real Time Rack"
  speakers:
    - Konstantin Haase
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    At least since node.js everyone knows that real time HTTP responses are the next big thing. This talk will demonstrate the underlying technologies and how to use Server-Sent Events, WebSockets and akin with Rack today.
  video_provider: "not_published"
  video_id: "konstantin-haase-rubyconf-uruguay-2011"
  language: "english"

- id: "pedro-belo-rubyconf-uruguay-2011"
  title: "What every programmer should know about distributed systems"
  raw_title: "What every programmer should know about distributed systems - lessons learned at Heroku"
  speakers:
    - Pedro Belo
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    It's time to talk about distributed systems: what are they, why you should be writing one, and what to look for while doing so. We'll cover the basics, understand some of the technology behind it - like REST, MQ with AMQP, ZeroMQ, etc.
  video_provider: "not_published"
  video_id: "pedro-belo-rubyconf-uruguay-2011"
  language: "english"

- id: "blake-mizerany-rubyconf-uruguay-2011"
  title: "On Distributed Failures"
  raw_title: "On Distributed Failures"
  speakers:
    - Blake Mizerany
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    In unreliable networks, with unreliable processors (also known as "The Cloud") one must know all the ways their thing can fail; and just as importantly, how to recover. I'll go over the common failure conditions in distributed systems, and then introduce you to Doozer.
  video_provider: "not_published"
  video_id: "blake-mizerany-rubyconf-uruguay-2011"
  language: "english"

- id: "ben-orenstein-rubyconf-uruguay-2011"
  title: "Faster than your IDE: vim for rubyists"
  raw_title: "Faster than your IDE: vim for rubyists"
  speakers:
    - Ben Orenstein
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    Many new rubyists are surprised to hear that vim is the most widely-used editor in our community. In this talk, beginning vimmers will learn how (and why) to leave their IDEs behind, and advanced vim-users will discover new tricks to increase their speed even further.
  video_provider: "not_published"
  video_id: "ben-orenstein-rubyconf-uruguay-2011"
  language: "english"

- id: "aaron-patterson-rubyconf-uruguay-2011"
  title: "Who makes the best asado?"
  raw_title: "Who makes the best asado?"
  speakers:
    - Aaron Patterson
  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    Starting a holy war is easy, understanding Rails internals is not. In this talk we'll take a look at some of the code that makes Rails tick. Highlights will include ActiveRecord, connection pooling, resource management, and how these impact the request and response life cycle.
  video_provider: "not_published"
  video_id: "aaron-patterson-rubyconf-uruguay-2011"
  language: "english"

