  event_name: "RubyConf Uruguay 2011"
  date: "2011-11-11"
  published_at: "2011-11-11"
  description: |-
    Esta charla mostrará como usar JRuby, la implementación de Ruby para la JVM, en entornos enterprise con el objetivo de mejorar los tiempos de desarrollo, la calidad y la simplicidad de las aplicaciones.
