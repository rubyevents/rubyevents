- id: "lrug-march-2023"
  title: "LRUG March 2023"
  event_name: "LRUG March 2023"
  date: "2023-03-13"
  announced_at: "2023-02-18 10:13:00 +0000"
  video_provider: "children"
  video_id: "lrug-march-2023"
  description: |-
    https://lrug.org/meetings/2023/march/
  talks:
    - id: "ayush-newatia-lrug-march-2023"
      title: "Native apps are dead, long live native apps: Using Turbo Native to make hybrid apps that don’t suck."
      event_name: "LRUG March 2023"
      date: "2023-03-13"
      announced_at: "2023-02-18 10:13:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/march/ayush-newatia-native-apps-are-dead-long-live-native-apps-lrug-mar-2023.mp4"
      description: |-
        You’ve heard it hundreds of times: Hybrid apps suck. That may have
        been true in the past, but things have changed significantly in the last decade.
        With tools like Turbo Native working in conjunction with Ruby on Rails, it’s
        possible to mix web technologies with native APIs to build slick hybrid mobile
        apps. We’ll take a look at why the hybrid approach gets such a bad rap, why
        that reputation is undeserved, and how we can build hybrid apps that don’t
        suck.
      speakers:
        - Ayush Newatia

    - id: "frederick-cheung-lrug-march-2023"
      title: "End to End typing for web applications"
      event_name: "LRUG March 2023"
      date: "2023-03-13"
      announced_at: "2023-02-18 10:13:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/march/frederick-cheung-end-to-end-typing-for-web-applications-lrug-mar-2023.mp4"
      description: |-
        Ever had a bug because the frontend made incorrect assumptions about the shape
        of response data from the backend? Or maybe you trod nervously during a refactor?
        Or perhaps you broke an app by changing the backend data in a way you didn’t
        think would matter?

        Learn how avoid this type of mistake, enabling you to keep moving fast, by
        having a single source of truth for your data types, checked both on the frontend
        and the backend.
      speakers:
        - Frederick Cheung

- id: "lrug-april-2023"
  title: "LRUG April 2023"
  event_name: "LRUG April 2023"
  date: "2023-04-17"
  announced_at: "2023-03-23 00:00:00 +0000"
  video_provider: "children"
  video_id: "lrug-april-2023"
  description: |-
    https://lrug.org/meetings/2023/april/
  talks:
    - id: "alex-chan-lrug-april-2023"
      title: "Making a working upwards assignment operator"
      event_name: "LRUG April 2023"
      date: "2023-04-17"
      announced_at: "2023-03-23 00:00:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/april/alex-making-a-working-upwards-assignment-operator-lrug-apr-2023.mp4"
      description: |-
        Ruby has leftward assignment. It has rightward assignment. But what about upward assignment?

        In this talk, we’ll misuse Ruby’s internals to build an arrow operator that lets us assign
        upwards. We’ll see some powerful Ruby metaprogramming features that allow us to bend Ruby
        to our will – and we’ll talk about why it’s good to write code that’s just plain daft.
      speakers:
        - Alex Chan
      additional_resources:
        - name: "Write-Up"
          type: "write-up"
          title: "Upward assignment in Ruby"
          url: "https://alexwlchan.net/2023/upward-assignment/"

    - id: "stan-lo-lrug-april-2023"
      title: "Build a mini Ruby debugger in under 300 lines"
      event_name: "LRUG April 2023"
      date: "2023-04-17"
      announced_at: "2023-03-23 00:00:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/april/stan-lo-build-a-mini-ruby-debugger-in-under-300-lines-lrug-apr-2023.mp4"
      description: |-
        As developers, we know that the best way to learn is by doing. Many of us have
        built mini-rails, mini-sinatra, and even mini-rubies. But have you ever built
        your own debugger?

        In this talk, I'll show you how to create a mini Ruby debugger that's both
        powerful and fun to use. You'll learn how to:
        - Run your program with debugger with a simple command
        - Set breakpoints and through debugger commands
        - Step through your code to find bugs

        And best of all, you'll do it all in under 300 lines of code!
      speakers:
        - Stan Lo

