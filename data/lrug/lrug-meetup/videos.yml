  title: "LRUG February 2024"
  event_name: "LRUG February 2024"
  date: "2024-02-12"
  announced_at: "2024-01-14 22:51:00 +0000"
  video_provider: "children"
  video_id: "lrug-february-2024"
  description: |-
    https://lrug.org/meetings/2024/february/
  talks:
    - id: "jay-caines-gooby-lrug-february-2024"
      title: "Data pagination for jekyll-paginate-v2"
      event_name: "LRUG February 2024"
      date: "2024-02-12"
