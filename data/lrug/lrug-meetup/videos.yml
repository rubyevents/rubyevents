- id: "lrug-september-2023"
  title: "LRUG September 2023"
  event_name: "LRUG September 2023"
  date: "2023-09-11"
  announced_at: "2023-08-17 09:10:00 +0000"
  video_provider: "children"
  video_id: "lrug-september-2023"
  description: |-
    https://lrug.org/meetings/2023/september/
  talks:
    - id: "ju-liu-lrug-september-2023"
      title: "The Functional Alternative"
      event_name: "LRUG September 2023"
      date: "2023-09-11"
      announced_at: "2023-08-17 09:10:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/september/ju-liu-the-functional-alternative-lrug-sep-2023.mp4"
      description: |-
        We'll start with a simple Ruby Kata and solve it together, live, with
        imperative programming.

        We'll then fix the many, many, many things we got wrong. Then we'll solve
        the problem again using patterns from functional programming. You'll leave
        this talk with a clear and concrete example of why functional programming
        matters, why immutable code matters, and why it can help you writing
        bug-free code.

        The next time you find yourself writing imperative code, you might
        consider... the functional alternative.
      speakers:
        - Ju Liu

    - id: "paul-battley-lrug-september-2023"
      title: "Back in my day..."
      event_name: "LRUG September 2023"
      date: "2023-09-11"
      announced_at: "2023-08-17 09:10:00 +0000"
      video_provider: "not_published"
      video_id: "lrug-2023-09-11-back-in-my-day"
      description: |-
        I've been working with Ruby since the early 2000s. Ruby has changed a lot in that time,
        but we don't always remember how much. Let's rewrite a short program so that it runs in
        a twenty-year-old version of Ruby and see how much syntax and performance has changed for
        the better in twenty years
      speakers:
        - Paul Battley
      additional_resources:
