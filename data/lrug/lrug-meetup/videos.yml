      speakers:
        - André Barbosa

    - id: "shen-sat-lrug-september-2022"
      title: "Fixing flaky tests, using RSpec's `--seed` option"
      event_name: "LRUG September 2022"
      date: "2022-09-12"
      announced_at: "2022-08-18 20:30:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/september/shen-sat-fixing-flaky-tests-using-rspecs-seed-option-lrug-sep-2022.mp4"
      description: |-
        Fixing a flaky test in the build pipeline of your application often
        requires first replicating the failing test locally. I'm going to show you
        how I used RSpec's `--seed` to help me do this for a flaky test I was
        recently grappling with, and how it led led me to a fix ✨
      speakers:
        - Shen Sat

- id: "lrug-october-2022"
  title: "LRUG October 2022"
  event_name: "LRUG October 2022"
  date: "2022-10-10"
  announced_at: "2022-09-18 08:25:00 +0100"
  video_provider: "children"
  video_id: "lrug-october-2022"
  description: |-
    https://lrug.org/meetings/2022/october/
  talks:
    - id: "paul-battley-lrug-october-2022"
      title: "How to be completely ignorant"
      event_name: "LRUG October 2022"
      date: "2022-10-10"
      announced_at: "2022-09-18 08:25:00 +0100"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/october/paul-battley-how-to-be-completely-ignorant-lrug-oct-2022.mp4"
      description: |-
        How much does a bit of code need to know to do its job? I'll show how I
        transformed a bit of complicated, untested, flaky, and poorly understood code
        into something pleasant to deal with and easy to test by applying the
        principle of making it know as little as possible.
      speakers:
        - Paul Battley

    - id: "murray-steele-lrug-october-2022"
      title: "The long road to ruby 3 vs. the short road to ruby 3.1"
      event_name: "LRUG October 2022"
      date: "2022-10-10"
      announced_at: "2022-09-18 08:25:00 +0100"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/october/murray-steele-the-long-road-to-ruby-3-0-vs-the-short-road-to-ruby-3-1-lrug-oct-2022.mp4"
      description: |-
        I'll share how the team at [Cleo](https://www.meetcleo.com/)
        meticulously planned and delivered the upgrade to ruby 3.0 on our rails
        app so smoothly that we became drunk on our own competence and totally
        messed up our upgrade to ruby 3.1 the following week.  A rare talk
        where you will learn some best _and_ worst practices.
      speakers:
        - Murray Steele
      additional_resources:
        - name: "Transcript"
          type: "transcript"
          title: "Talks ∋ The long road to ruby 3.0 vs. the short road to ruby 3.1"
          url: "http://h-lame.com/talks/the-long-road-to-ruby-3-0-vs-the-short-road-to-ruby-3-1/"

- id: "lrug-november-2022"
  title: "LRUG November 2022"
  event_name: "LRUG November 2022"
  date: "2022-11-14"
  announced_at: "2022-10-20 18:00:00 +0000"
  video_provider: "children"
  video_id: "lrug-november-2022"
  description: |-
    https://lrug.org/meetings/2022/november/
  talks:
    - id: "benji-lewis-lrug-november-2022"
      title: "Data Indexing with RGB (Ruby, Graphs and Bitmaps)"
      event_name: "LRUG November 2022"
      date: "2022-11-14"
      announced_at: "2022-10-20 18:00:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/november/benji-lewis-data-indexing-with-rgb-ruby-graphs-and-bitmaps-lrug-nov-2022.mp4"
      description: |-
        In this talk, we will go on a journey through Zappi’s data history and how
        we are using Ruby, a graph database, and a bitmap store to build a unique
        data engine. A journey that starts with the problem of a disconnected data
        set and serialised data frames, and ends with the solution of an in-memory
        index.

        We will explore how we used RedisGraph to model the relationships in our
        data, connecting semantically equal nodes. Then delve into how a query
        layer was used to index a bitmap store and, in turn, led to us being able
        to interrogate our entire dataset orders of magnitude faster than before.
      speakers:
        - Benji Lewis

    - id: "stan-lo-lrug-november-2022"
      title: "`ruby/debug` - The best investment for your productivity"
      event_name: "LRUG November 2022"
      date: "2022-11-14"
      announced_at: "2022-10-20 18:00:00 +0000"
      slides_url: "https://github.com/st0012/slides/blob/main/2022-11-14-lrug/Ruby%20debugger%20-%20The%20best%20investment%20for%20your%20productivity%20-%20LRUG.pdf"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/november/stan-lo-ruby-debug-the-best-investment-for-your-productivity-lrug-nov-2022.mp4"
      description: |-
        In this talk, I will demonstrate 3 powerful debugging techniques using Ruby's new debugger
        [`ruby/debug`](https://github.com/ruby/debug):

        * Step-debugging
        * Frame navigation
        * Breakpoint commands

        By using them together, we can reduce unnecessary context switching and make our debugging
        sessions more efficient. You will also learn more about `ruby/debug` while we walk through
        these techniques with its commands and console.

        And finally, I will show you how to level up our productivity even further by automating
        debugging steps using `ruby/debug`'s scriptable breakpoints.
      speakers:
        - Stan Lo

    - id: "christian-bruckmayer-lrug-november-2022"
      title: "Keeping developers happy with a fast CI"
      event_name: "LRUG November 2022"
      date: "2022-11-14"
      announced_at: "2022-10-20 18:00:00 +0000"
      slides_url: "https://bruckmayer.net/ruby-conf-2021"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/november/christian-bruckmayer-keeping-developers-happy-with-a-fast-ci-lrug-nov-2022.mp4"
      description: |-
        When talking about performance, most developers think application speed,
        faster algorithms or better data structures. But what about your test
        suite? CI time is developer waiting time!

        At Shopify we have more than 170,000 Ruby tests and we add 30,000 more
        annually. The sheer amount of tests and their growth requires some
        aggressive methods. We will illustrate some of our techniques including
        monitoring, test selection, timeouts and the 80/20 rule. If you have
        experience in writing tests and want to learn tricks on how to speed up
        your test suite, this talk is for you!
      speakers:
        - Christian Bruckmayer

- id: "lrug-january-2023"
  title: "LRUG January 2023"
  event_name: "LRUG January 2023"
  date: "2023-01-09"
  announced_at: "2022-12-13 21:26:00 +0000"
  video_provider: "children"
  video_id: "lrug-january-2023"
  description: |-
    https://lrug.org/meetings/2023/january/
  talks:
    - id: "matt-valentine-house-lrug-january-2023"
      title: "Heaping on the Complexity"
      event_name: "LRUG January 2023"
      date: "2023-01-09"
      announced_at: "2022-12-13 21:26:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/january/matt-valentine-house-heaping-on-the-complexity-lrug-jan-2023.mp4"
      description: |-
        Join me on a journey through Ruby's Garbage Collector!

        In this talk I'll teach you some of the details about how the Ruby
        interpreter manages memory. I'll introduce a project my team and I are
        working on that aims to make Ruby faster by improving its memory
        efficiency, and then we'll talk about how our implementation broke
        Garbage Collection.

        After that we'll go on a journey together, through some weeds, and
        taking a few bad turns until we finally emerge with a few PR's that
        not only Fix GC, but make our project better too.
      speakers:
        - Matt Valentine-House

    - id: "daniel-magliola-lrug-january-2023"
      title: 'What does "high priority" mean? The secret to happy queues'
      event_name: "LRUG January 2023"
      date: "2023-01-09"
      announced_at: "2022-12-13 21:26:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/january/daniel-magliola-what-does-high-priority-mean-the-secret-to-happy-queues-lrug-jan-2023.mp4"
      description: |-
        Like most web applications, you run important jobs in the background. And
        today, some of your urgent jobs are running late. Again. No matter how many
        changes you make to how you enqueue and run your jobs, the problem keeps
        happening. The good news is you're not alone. Most teams struggle with this
        problem, try more or less the same solutions, and have roughly the same
        result. In the end, it all boils down to one thing: keeping latency low. In
        this talk I will present a latency-focused approach to managing your queues
        reliably, keeping your jobs flowing and your users happy.
      speakers:
        - Daniel Magliola

    - id: "fritz-meissner-lrug-january-2023"
      title: "Solargraph-rails in 2022"
      event_name: "LRUG January 2023"
      date: "2023-01-09"
      announced_at: "2022-12-13 21:26:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/january/fritz-meissner-solargraph-rails-in-2022-lrug-jan-2023.mp4"
      description: |-
        From chewing-gum-and-regex to 35,000 lines of code and YAML! Come hear
        about the past year of work on the solargraph-rails gem. You'll see new
        features, mostly from merging with the solargraph-ARC gem, and hear about
        the lessons learned along the way: more code means more to maintain and
        understand, but there's a surprising amount that can be done just by
        putting one foot in front of the other.
      speakers:
        - Fritz Meissner

- id: "lrug-february-2023"
  title: "LRUG February 2023"
  event_name: "LRUG February 2023"
  date: "2023-02-13"
  announced_at: "2023-01-18 10:13:00 +0000"
  video_provider: "children"
  video_id: "lrug-february-2023"
  description: |-
    https://lrug.org/meetings/2023/february/
  talks:
    - id: "tom-stuart-lrug-february-2023"
      title: "A Supposedly Fun Thing I’ll Never Stream Again: live coding a Ruby project"
      event_name: "LRUG February 2023"
      date: "2023-02-13"
      announced_at: "2023-01-18 10:13:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/february/tom-stuart-a-supposedly-fun-thing-ill-never-stream-again-live-coding-a-ruby-project-lrug-feb-2023.mp4"
      description: |-
        Last September I began regularly livestreaming my work on a side project to
        build a WebAssembly interpreter in Ruby. In this talk I’ll tell you how it’s
        going and what I’ve learned so far.
      speakers:
        - Tom Stuart

    - id: "matt-bee-lrug-february-2023"
      title: "To mentor or to mentee - that is the question"
      event_name: "LRUG February 2023"
      date: "2023-02-13"
      announced_at: "2023-01-18 10:13:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/february/matt-bee-to-mentor-or-to-mentee-that-is-the-question-lrug-feb-2023.mp4"
      description: |-
        I started out 2022 looking for a mentor to help me on my ruby career
        adventure. After reflection (and some interesting insights) I realised that
        perhaps that was the wrong way round, and I would get more from being the
        mentor - here I'll share a journey, lessons learned and why maybe you
        should mentor someone too.
      speakers:
        - Matt Bee

    - id: "frank-kair-lrug-february-2023"
      title: "Data Structures in 3 Paradigms: Ruby Spotlight"
      event_name: "LRUG February 2023"
      date: "2023-02-13"
      announced_at: "2023-01-18 10:13:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/february/frank-kair-data-structures-in-3-paradigms-ruby-spotlight-lrug-feb-2023.mp4"
      description: |-
        Using a simple data structure as a starting point, we discuss three
        different programming paradigms (imperative, object oriented and
        functional), not only in terms of implementation, but also as a broader
        framework for learning and having a richer mental model for problem solving.
      speakers:
        - Frank Kair

    - id: "chris-zetter-lrug-february-2023"
      title: "Using the 'mob' tool for productive pairing"
      event_name: "LRUG February 2023"
      date: "2023-02-13"
      announced_at: "2023-01-18 10:13:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/february/chris-zetter-using-the-mob-tool-for-productive-pairing-lrug-feb-2023.mp4"
      description: |-
        My team started using the opinionated 'mob' tool for our
        remote mob and pair programming sessions. I'll explain what the tool does
        and how I've found it helps us to maintain momentum while pairing.
      speakers:
        - Chris Zetter

    - id: "matt-valentine-house-lrug-february-2023"
