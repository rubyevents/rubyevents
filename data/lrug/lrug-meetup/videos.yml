        and are working with some of the biggest players in the pet space. Come
        and listen to how a simple idea has now turned into a well known brand.
      speakers:
        - Rikke Rosenlund

- id: "lrug-november-2023"
  title: "LRUG November 2023"
  event_name: "LRUG November 2023"
  date: "2023-11-13"
  announced_at: "2023-10-18 23:33:00 +0000"
  video_provider: "children"
  video_id: "lrug-november-2023"
  description: |-
    https://lrug.org/meetings/2023/november/
  talks:
    - id: "naomi-christie-lrug-november-2023"
      title: "Outside Technology: Building bridges between engineers and everyone else"
      event_name: "LRUG November 2023"
      date: "2023-11-13"
      announced_at: "2023-10-18 23:33:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/november/naomi-christie-outside-technology-building-bridges-between-engineers-and-everyone-else.mp4"
      description: |-
        Naomi will take you on a journey from her previous career outside
        technology to her current career as a software engineer highlighting some
        of the (many) things she had to learn along the way, providing insight into
        why misunderstandings are common between engineers and their stakeholders
        and offering some ideas on how we can bridge that gap.
      speakers:
        - Naomi Christie

    - id: "melinda-seckington-lrug-november-2023"
      title: "The Art of Talk Design"
      event_name: "LRUG November 2023"
      date: "2023-11-13"
      announced_at: "2023-10-18 23:33:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2023/november/melinda-seckington-the-art-of-talk-design.mp4"
      description: |-
        Everywhere you look, stories surround us, and everyone has something that’s worth sharing
        with others. As speakers, we need to understand how to structure our talks so they can have
        the best effect on the audiences we are trying to reach. How do you discover the right angle
        and the right story for a talk? How do you frame your story?

        Within tech we know how to approach building a new product: we research our user base, we
        figure out what and for who we’re trying to create something for and we make sure we
        constantly iterate on what we’ve come up with. So why aren’t we taking the same approach
        for our talks?

        This talk will examine how to get in the right mindset of examining your talk ideas, and will
        introduce a framework of how to design and iterate on your talk. It will focus on several
        exercises and questions to help you create the best talk for the story you’re trying to tell.
      speakers:
        - Melinda Seckington

- id: "lrug-december-2023"
  title: "LRUG December 2023"
  event_name: "LRUG December 2023"
  date: "2023-12-11"
  announced_at: "2023-11-09 12:00:00 +0000"
  video_provider: "children"
  video_id: "lrug-december-2023"
  description: |-
    https://lrug.org/meetings/2023/december/
  talks:
    - id: "christian-bruckmayer-lrug-december-2023"
      title: "Test Smarter, Not Harder - Crafting a Test Selection Framework from Scratch"
      event_name: "LRUG December 2023"
      date: "2023-12-11"
      announced_at: "2023-11-09 12:00:00 +0000"
      video_provider: "not_published"
      video_id: "lrug-2023-12-11-test-smarter-not-harder-crafting-a-test-selection-framework-from-scratch"
      description: |-
        [Christian Bruckmayer](https://twitter.com/bruckmayer) says:

        > The simplest way of running tests is to run all of them, regardless of what changes you
        > are testing. However, depending on the size of your test suite, this will either get slow
        > or expensive. At Shopify we have almost 300,000 Rails tests and we add 50,000 more
        > annually. The sheer amount of tests and their growth makes it impossible to run all tests,
        > all the time! Hence we implemented a framework to only run tests relevant to your code
        > changes.
        >
        > We will build a test selection framework from scratch in this workshop. We will begin by
        > exploring the fundamentals of such a framework: code analysis. After that we will dive into
        > minitest reporters, how they work and how we can use them to generate a test map. Finally
        > we will use the generated test map to only run tests relevant to your code changes.
        > Attendees will walk away with a solid understanding of what test selection is, how it works
        > and how to implement it.

        This is a workshop, so bring your laptop!
      speakers:
        - Christian Bruckmayer

- id: "lrug-january-2024"
  title: "LRUG January 2024"
  event_name: "LRUG January 2024"
  date: "2024-01-08"
  announced_at: "2023-12-18 12:00:00 +0000"
  video_provider: "children"
  video_id: "lrug-january-2024"
  description: |-
    https://lrug.org/meetings/2024/january/
  talks:
    - id: "kevin-sedgley-lrug-january-2024"
      title: "Sky Computing"
      event_name: "LRUG January 2024"
      date: "2024-01-08"
      announced_at: "2023-12-18 12:00:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2024/january/kevin-sedgley-sky-computing-lrug-jan-2024.mp4"
      description: |-
        What comes after cloud computing? Cloud computing is convenient,
        ubiquitous and relatively cheap. But it also locks developers into proprietary
        solutions that make migrating to another provider or bringing your solutions
        back in-house difficult and expensive. If AWS, Google Cloud Computing, Azure
        and all the others are clouds, then we also need a sky. Researchers at Berkeley
        and other institutions have proposed sky computing: an interoperability layer
        that removes technological lock-in and enables multi cloud application development.
      speakers:
        - Kevin Sedgley

    - id: "joel-biffin-lrug-january-2024"
      title: "Leveraging Localised Gems (LLGems): Re-using Code the Ruby Way, Safely"
      event_name: "LRUG January 2024"
      date: "2024-01-08"
      announced_at: "2023-12-18 12:00:00 +0000"
      slides_url: "https://github.com/joelbiffin/talks/blob/main/llgems/slides.pdf"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2024/january/joel-biffin-leveraging-localised-gems-llgems-re-using-code-the-ruby-way-safely-lrug-jan-2024.mp4"
      description: |-
        The talk takes a look under the hood of our Rails monolith, our Rails
        Engines, and how we share code between them. It's a bit like a kitchen
        experiment – blending the best of both worlds to enhance the Separation of
        Concerns, while still keeping our favorite code recipes within reach. I'll
        share our adventure of moving some Kafka infrastructure code from the main
        Rails app into a local gem (with zero downtime!). Think of it as giving the
        code a new home where it can be shared across our Rails Engines. We've also
        managed to preserve our unique, in-house testing infrastructure in the
        process which is a serious Brucie bonus!
      speakers:
        - Joel Biffin

