    - id: "joel-chippindale-lrug-april-2020"
      title: "How to take control of code quality"
      event_name: "LRUG April 2020"
      date: "2020-04-06"
      announced_at: "2020-03-24 19:27:00 +0100"
      slides_url: "https://blog.mocoso.co.uk/assets/take-control-of-code-quality/take-control-of-code-quality--lrug-apr-2020.pdf"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2020/april/joel-chippindale-how-to-take-control-of-your-code-quality-lrug-apr-2020.mp4"
      description: |-
        We all know how valuable it is to keep the quality of your code high. Working on a high
        quality codebase is more enjoyable and enables us to deliver value much more effectively for
        our users and yet, time and again I hear engineers saying, “I am not allowed to spend
        sufficient time on code quality”.

        This talk clarifies the value of maintaining a high quality codebase, gives you guidance on
        how to talk about this to help you get the support of your colleagues and managers for
        spending time on this and also outlines some key practices that will help you achieve this.
      speakers:
        - Joel Chippindale
      additional_resources:
        - name: "Transcript"
          type: "transcript"
          title: "How to take control of code quality"
          url: "https://blog.mocoso.co.uk/talks/2020/02/27/take-control-of-code-quality/"

    - id: "rob-mckinnon-lrug-april-2020"
      title: "Music Experiments in Sonic Pi"
      event_name: "LRUG April 2020"
      date: "2020-04-06"
      announced_at: "2020-03-24 19:27:00 +0100"
      video_provider: "not_published"
      video_id: "lrug-2020-04-06-music-experiments-in-sonic-pi"
      description: |-
        Let's celebrate Sonic Pi's v3.2 release, scheduled for 28 Feb!
        Sonic Pi's an open source Ruby code-based music creation and performance tool.

        Rob's presenting a few experiments in Sonic Pi, covering oddities such as:

        * negative melody
        * Jianpu (numbered musical notation)
        * just intonation
        * microtonal music - 19 EDO (Equal Division of the Octave)
        * interfacing with MIDI controllers over USB and bluetooth BLE.

        Also Rob will walk us through a memory management improvement PR to Sonic Pi - that may have
        made it into the release.
      speakers:
        - Rob McKinnon

- id: "lrug-may-2020"
  title: "LRUG May 2020"
  event_name: "LRUG May 2020"
  date: "2020-05-11"
  announced_at: "2020-04-25 20:22:00 +0100"
  video_provider: "children"
  video_id: "lrug-may-2020"
  description: |-
    https://lrug.org/meetings/2020/may/
  talks:
    - id: "peter-bell-lrug-may-2020"
      title: "Comparing the speed and elegance of different computer languages using a Hamiltonian curve algorithm as the comparator"
      event_name: "LRUG May 2020"
      date: "2020-05-11"
      announced_at: "2020-04-25 20:22:00 +0100"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2020/may/peter-bell-comparing-the-speed-and-elegance-of-different-computer-languages-lrug-may-2020.mp4"
      description: |-
        My company (Trapeze) specialises in public transport including schedule
        optimisation. Finding Hamiltonian curves is a sub-problem to the
        travelling salesman problem and of the general problem of optimising
        pickup and drop-offs in demand responsive public transport. This talk
        will compare implementing a Hamiltonian curve finder in a number of
        different languages. The talk looks both at the speed of the language
        and the elegance. For Ruby, I compare a couple of different
        implementations. Other languages that are compared are Elixir, Go,
        Javascript, Java, C++, C# and Python.

        The source code is in a public Github repository details of which I will
        provide as part of my talk
      speakers:
        - Peter Bell

    - id: "sam-joseph-lrug-may-2020"
      title: "Debugging Ruby HTTP Library Surprises"
      event_name: "LRUG May 2020"
      date: "2020-05-11"
      announced_at: "2020-04-25 20:22:00 +0100"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2020/may/sam-joseph-debugging-ruby-http-library-surprises-lrug-may-2020.mp4"
      description: |-
        Some folks prefer 'puts' to debugging with something like
        pry-byebug, but I'm a huge fan of debuggers, particularly stepping
        through my own code and the code of the many libraries we all rely on.
        In combination with `bundle open` to insert breakpoints into the code of
        gems being used in your stack, debugging can expose really tricky
        dependency bugs, as I aim to demonstrate with one that I found in the
        way different ruby HTTP libraries can interact.
      speakers:
        - Sam Joseph

