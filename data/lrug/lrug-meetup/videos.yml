      description: |-
        JSON and custom parsers let you do neat things like: complex pricing, map data to 3D models, auto generate images…
      speakers:
        - Winston Ferguson

- id: "lrug-may-2022"
  title: "LRUG May 2022"
  event_name: "LRUG May 2022"
  date: "2022-05-09"
  announced_at: "2022-04-22 20:10:00 +0000"
  video_provider: "children"
  video_id: "lrug-may-2022"
  description: |-
    https://lrug.org/meetings/2022/may/
  talks:
    - id: "duncan-brown-lrug-may-2022"
      title: "Mining a gem: how to safely discover, extract and share useful code from your Rails app"
      event_name: "LRUG May 2022"
      date: "2022-05-09"
      announced_at: "2022-04-22 20:10:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/may/duncan-brown-mining-a-gem-how-to-safely-discover-extract-and-share-useful-code-from-your-rails-app-lrug-may-2022.mp4"
      description: |-
        We recently extracted a [gem for talking to Google
        BigQuery](https://github.com/DFE-Digital/dfe-analytics) from 5 different Rails applications
        at the Department for Education I'll talk through the process of pulling the code out, how to
        test gems that work with Rails, figuring out how to deal with divergence among existing
        implementations of the same functionality, and how we're driving adoption of internal open
        source at DfE.
      speakers:
        - Duncan Brown

    - id: "leena-gupte-rosa-fox-lrug-may-2022"
      title: "[GOV.UK][]’s response to COVID-19"
      event_name: "LRUG May 2022"
      date: "2022-05-09"
      announced_at: "2022-04-22 20:10:00 +0000"
      video_provider: "not_published"
      video_id: "lrug-2022-05-09-gov-uks-response-to-covid-19"
      description: |-
        Leena and Rosa have been Senior Developers/Tech Leads on the [GOV.UK][]
        Coronavirus team. The team’s work began in March 2020 when a service
        they built over a weekend had nearly 50,000 registrations on the day it
        launched. Two years later, after building lots more services (using
        Ruby… of course) and serving millions of users, the [GOV.UK][]
        Coronavirus team finally disbanded.

        Rosa and Leena will take LRUG through a timeline of [GOV.UK][]’s
        response to the pandemic. We will discuss what we delivered, our
        successes, failures and how the team supported each other to cope. We
        will share how Ruby/Rails and tools such as the [GOV.UK][] Design System
        enabled us to build and deploy critical services at pace.
      speakers:
        - Leena Gupte
        - Rosa Fox

- id: "lrug-june-2022"
  title: "LRUG June 2022"
  event_name: "LRUG June 2022"
  date: "2022-06-13"
  announced_at: "2022-05-15 13:00:00 +0000"
  video_provider: "children"
  video_id: "lrug-june-2022"
  description: |-
    https://lrug.org/meetings/2022/june/
  talks:
    - id: "daniel-magliola-lrug-june-2022"
      title: "Get your PRs merged, rebasing like a Pro"
      event_name: "LRUG June 2022"
      date: "2022-06-13"
      announced_at: "2022-05-15 13:00:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/june/daniel-magliola-get-your-prs-merged-rebasing-like-a-pro-lrug-jun-2022.mp4"
      description: |-
        You have a complex PR to submit. You've tried to keep it small, but sadly
        you need to make many different changes all at once. Getting there took a
        lot of effort and your branch has more than 30 commits with fixes and
        reverting of dead ends.

        You know reviewing this will be a nightmare for your colleagues, and more
        importantly, it will be almost impossible for someone in the future to
        understand what happened if they ever look at the history.

        In this talk we will look at how Git branches work, and how to manicure
        them using Rebase to build a commit history your colleagues will love you
        for.
      speakers:
        - Daniel Magliola

    - id: "alfredo-motta-lrug-june-2022"
      title: "The messy middle – 5 Software Engineering lessons from a 5 years startup journey"
      event_name: "LRUG June 2022"
      date: "2022-06-13"
      announced_at: "2022-05-15 13:00:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/june/alfredo-motta-the-messy-middle-5-software-engineering-lessons-from-a-5-years-startup-journey-lrug-jun-2022.mp4"
      description: |-
        These are some of the lessons that I have learned over my 5 years at a
        Fintech startup that went from 0 to 100k customers and grew the team from 4
        to 50 people. I will present some of the software architecture tradeoffs I
        have been presented with and I am still puzzled about today.
      speakers:
        - Alfredo Motta

- id: "lrug-july-2022"
  title: "LRUG July 2022"
  event_name: "LRUG July 2022"
  date: "2022-07-11"
  announced_at: "2022-07-04 13:00:00 +0000"
  video_provider: "children"
  video_id: "lrug-july-2022"
  description: |-
    https://lrug.org/meetings/2022/july/
  talks:
    - id: "andre-barbosa-lrug-july-2022"
      title: "Building a Mortgage Lender at Generation Home"
      event_name: "LRUG July 2022"
      date: "2022-07-11"
      announced_at: "2022-07-04 13:00:00 +0000"
      video_provider: "not_published"
      video_id: "lrug-2022-07-11-building-a-mortgage-lender-at-generation-home"
      description: |-
        It’s not often that you hear about a startup doings things differently in the mortgages
        world. And there’s some good reasons for it, the cost of entry is super high!

        It’s not just funding and regulations either. You also need to back it up with the right
        technology and tools to manage a highly complex business where mistakes can be very costly.
        On top of that, startups need to move fast to out-innovate the incumbents with only a
        fraction of the resources.

        At Generation Home Ruby has been a catalyst to help us deliver a product we’re proud of in
        a short time-scale. We’ll talk about some of the challenges we faced early on, how Ruby,
        Rails and the whole ecosystem helped us deliver and what still lays ahead of us.
      speakers:
        - André Barbosa

- id: "lrug-august-2022"
  title: "LRUG August 2022"
  event_name: "LRUG August 2022"
  date: "2022-08-08"
  announced_at: "2022-08-02 13:00:00 +0000"
  video_provider: "children"
  video_id: "lrug-august-2022"
  description: |-
    https://lrug.org/meetings/2022/august/
  talks:
    - id: "javier-honduvilla-coto-lrug-august-2022"
      title: "Low overhead Ruby profiling and tracing with rbperf"
      event_name: "LRUG August 2022"
      date: "2022-08-08"
      announced_at: "2022-08-02 13:00:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/august/javier-honduvilla-coto-low-overhead-ruby-profiling-and-tracing-with-rbperf-lrug-aug-2022.mp4"
      description: |-
        Understanding our applications' performance can be tricky. Some of the readily available
        performance tools introduce a big overhead which makes them not suitable for use in
        production environments, where in many cases, it's the best place to troubleshoot performance
        issues.

        [rbperf](https://github.com/javierhonduco/rbperf/) is a low-overhead on-CPU profiler and
        tracer that is suitable for usage in production environments. It doesn't require the
        application under investigation to be restarted or disturbed in any way.

        We will discuss some of the tradeoffs in its design, its architecture, the features that make
        it unique, as well as its limitations compared to other tools. We will also take a look at
        how the Ruby stack is laid out in memory and the role BPF plays in rbperf.
      speakers:
        - Javier Honduvilla Coto

- id: "lrug-september-2022"
