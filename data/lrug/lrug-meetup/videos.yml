      video_id: "https://assets.lrug.org/videos/2022/march/eleanor-mchugh-the-browser-environment-a-system-programmer-perspective-lrug-mar-2022.mp4"
      description: |-
        A quirky introduction to writing realtime web systems with Sinatra as
        the backend. The highlight will be WebSockets but there'll also be
        coverage of DOM manipulation, AJAX/fetch, and timer events.
      speakers:
        - Eleanor McHugh

- id: "lrug-april-2022"
  title: "LRUG April 2022"
  event_name: "LRUG April 2022"
  date: "2022-04-11"
  announced_at: "2022-04-04 21:30:00 +0000"
  video_provider: "children"
  video_id: "lrug-april-2022"
  description: |-
    https://lrug.org/meetings/2022/april/
  talks:
    - id: "panos-matsinopoulos-lrug-april-2022"
      title: "Using React in a Ruby Project to Dynamically Generate PDF Documents"
      event_name: "LRUG April 2022"
      date: "2022-04-11"
      announced_at: "2022-04-04 21:30:00 +0000"
      video_provider: "mp4"
      video_id: "https://assets.lrug.org/videos/2022/april/panos-matsinopoulos-using-react-in-a-ruby-project-to-dynamically-generate-pdf-documents-lrug-apr-2022.mp4"
      description: |-
        In the Ruby world, we traditionally address the PDF generation problem using gems like
        [Prawn](https://github.com/prawnpdf/prawn) and [PDFKit](https://github.com/pdfkit/pdfkit)
        or libraries like [whtmltopdf](https://wkhtmltopdf.org/).

        Recently, in one of our Ruby on Rails projects in which we wanted to generate PDF documents
        for invoices, we decided to use another programming language and technology: React and AWS
        Lambda.

        In this talk, we will be covering how we did it, what were
        the challenges and what pros and cons over the incumbent tools for Ruby.
      speakers:
        - Panos Matsinopoulos

