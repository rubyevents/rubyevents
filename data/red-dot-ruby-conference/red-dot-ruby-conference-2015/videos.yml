- id: "sam-saffron-red-dot-ruby-conference-2015"
  title: "Keynote: Off the Rails by Sam Saffron"
  raw_title: "RedDotRuby 2015 - Keynote: Off the Rails by Sam Saffron"
  event_name: "Red Dot Ruby Conference 2015"
  date: "2015-06-05"
  published_at: "2015-06-10"
