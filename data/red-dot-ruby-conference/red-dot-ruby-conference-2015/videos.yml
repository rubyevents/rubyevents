- id: "laurent-sansonetti-red-dot-ruby-conference-2015"
  title: "RubyMotion: Cross-Platform Mobile Development the Right Way"
  raw_title: "RedDotRuby 2015 - RubyMotion: Cross-Platform Mobile Development the Right Way by Laurent Sansonetti"
  event_name: "Red Dot Ruby Conference 2015"
