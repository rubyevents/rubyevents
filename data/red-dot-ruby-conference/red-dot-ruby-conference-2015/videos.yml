- id: "sofia-tania-red-dot-ruby-conference-2015"
  title: "Collaborating with Contracts"
  raw_title: "RedDotRuby 2015 - Collaborating with Contracts by Sofia Tania"
  event_name: "Red Dot Ruby Conference 2015"
