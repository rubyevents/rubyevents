- id: "jesse-toth-red-dot-ruby-conference-2015"
  title: "Tackling Large Ruby Refactorings with Confidence (and Science!)"
  raw_title: "RedDotRuby 2015 - Tackling Large Ruby Refactorings with Confidence (and Science!) by Jesse Toth"
  event_name: "Red Dot Ruby Conference 2015"
