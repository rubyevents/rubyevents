- id: "nelson-pascoal-rubyfuza-2014"
  title: "RubyMotion - iOS and OSX Development from a Ruby Developer's Perspective"
  raw_title: "Rubymotion - iOS and OSX development from a Ruby developer's perspective - Nelson Pascoal"
  speakers:
    - "Nelson Pascoal"
  event_name: "Rubyfuza 2014"
  date: "2014-02-08"
  published_at: "2015-01-11"
  description: |-
    Rubymotion provides a unique opportunity for those developers looking for an alternative to Objective-C. Start building native applications for the Apple eco-system! This sounds great from a high-level perspective, but there are some caveats that you have to be aware of.

