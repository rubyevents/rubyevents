  description: |-
    Great tools are key to great development and an awesome console and interactive debugger are up there on the list of tools EVERY developer should have access to. In particular, Pry and the Jazz Hands bundle that includes a few goodies with Pry (mostly, other Pry plugins) bring a very useful console for code exploration and a debugger that you can enter during any code execution, whether the app is running daemonised or not. It's not hard to use Pry but I'm astonished by how many developers deprive themselves of this absolute must-have tool.
