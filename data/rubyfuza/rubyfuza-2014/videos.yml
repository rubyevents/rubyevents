- id: "andre-arko-rubyfuza-2014"
  title: "Extreme Makeover: Rubygems Edition"
  raw_title: "Extreme Makeover: Rubygems Edition - Andre Arko"
  speakers:
    - "André Arko"
  event_name: "Rubyfuza 2014"
  date: "2014-02-08"
  published_at: "2015-01-11"
  description: |-
    Rubygems.org provides every Rubyist with an amazing service: all the libraries in the Ruby world. As amazing as that is, installing gems can be a time-consuming and even error-prone process. In this talk, you'll learn about the recent dramatic changes in Rubygems and Bundler to improve speed and reliability by rewriting the Rubygems client/server architecture. I'll show how the new system caches more information, makes fewer requests, and takes less time to install gems. Finally, I'll cover how the changes allow worldwide mirrors of rubygems.org, improving things for Rubyists around the globe.
