- id: "terrence-lee-rubyfuza-2013"
  title: "`bundle install` Y U SO SLOW: Server Edition"
  raw_title: "`bundle install` Y U SO SLOW: Server Edition - Terence Lee"
  event_name: "Rubyfuza 2013"
  date: "2013-02-08"
  published_at: "2013-04-09"
  video_provider: "youtube"
  video_id: "m_-lruDQy0Y"
  description: |-
    If you've ever done anything in ruby, you've probably used rubygems and rubygems.org to search or install your favorite gem. On October 17, 2012, rubygems.org went down. A Dependency API was built to be used by Bundler 1.1+ to speed up `bundle install`. Unfortunately, it was a bit too popular and the service caused too much load on the current infrastructure. In order to get rubygems.org back up the API had to be disabled.

    Members in the community stepped up and built a compatible Dependency API service called the Bundler API. Working with the rubygems.org team, we were able to bring the API up for everyone within a week. In this talk, I will cover the process we went through of extracting the API out into a separate Sinatra app that now runs on Heroku.
  speakers:
    - Terence Lee

- id: "ryan-lemmer-rubyfuza-2013"
  title: "Side-Effects Are Not Your Friend"
  raw_title: "Side-effects are not your friend - Ryan Lemmer"
  event_name: "Rubyfuza 2013"
  date: "2013-02-08"
  published_at: "2013-04-10"
  video_provider: "youtube"
  video_id: "GaSwjqU28-U"
  description: |-
    Functional Programming is more than a set of language features. It's a style of thinking, a way of doing things.

    Ruby gives us access to some aspects of the Functional style through lambdas, blocks, procs, and array iterators.

    But the most profound way in which Functional thinking can change your Ruby day comes down to a core issue of Functional Programming: "side-effects". Ruby places no restriction on leaving side-effects - it comes down to the choice (and then discipline) of the Rubyist to refrain from doing so.

    Side-effect-free code is more easily testable, and more predictable than side-effect-ridden code.

    In this talk I'll show you some of the many ways in which side-effects cause you pain and suffering, and techniques and strategies of leaving less of them in your wake.
  speakers:
    - Ryan Lemmer

- id: "kenneth-kalmer-rubyfuza-2013"
  title: "Reusing Your Frontend JS on the Server with The Ruby Racer and/or Ruby Rhino"
  raw_title: "Reusing your frontend JS on the server with The Ruby Racer and/or Ruby Rhino - Kenneth Kalmer"
  event_name: "Rubyfuza 2013"
  date: "2013-02-08"
  published_at: "2013-04-15"
  video_provider: "youtube"
  video_id: "pDgtVhN8Ecw"
  description: |-
    Writing modern web applications requires a ton of JS, and somewhere in that JS lies some application logic (we're not just talking DOM manipulations here). If you require that same logic on the server-side for say, generating reports, what do you do? I'll show you how ValuationUP.com pushes the single responsibility principle to the max by "embedding" V8 into our report generation code so the same JS that powers our Backbone.js frontend powers our PDF's generated by Prawn.

    Thin wrappers, no duplication, practical IoC, ultimate SRP.
  speakers:
    - Kenneth Kalmer

- id: "aslam-khan-rubyfuza-2013"
  title: "Not Quite Object Oriented"
  raw_title: "Not Quite Object Oriented - Aslam Khan"
  event_name: "Rubyfuza 2013"
  date: "2013-02-08"
  published_at: "2013-04-14"
  video_provider: "youtube"
  video_id: "eiivpAwo40E"
  description: |-
    Ruby is a language, just a tool for a developer to build software. To use this tool effectively, the programmer must be familiar with object orientated programming. Object orientation is a paradigm, not a tool. It is a very specific world view based on underlying theories.

    Nowadays, many Ruby developers also use other tools like JavaScript and CoffeeScript. These languages are not from the same world as Ruby. They are from another paradigm - functional programming. Functional programming is a different world view, based on different underlying theories.

    In this talk, I will take you on a whirlwind tour of functional programming concepts. You will see lots of code snippets in lots of different languages. My objective is simple - a tour guide view that will point out places of interest that you can explore at your leisure. In the end, I hope we will make smaller messes.
  speakers:
    - Aslam Khan
