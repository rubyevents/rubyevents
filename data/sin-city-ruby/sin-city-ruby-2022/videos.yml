- id: "sin-city-ruby-2022-andrea-fomera"
  title: "Upgrading Rails doesn't have to be scary"
  raw_title: "Talk by Andrea Fomera"
  date: "2022-03-24"
  slides_url: "https://docs.google.com/presentation/d/15SHgg1uFONuqPHFQ5LdtdEoRqOFYRspAW0tnQShfFK4/edit?usp=sharing"
  video_provider: "not_recorded"
  video_id: "sin-city-ruby-2022-andrea-fomera"
  description: |-
    Ever felt overwhelmed when figuring out how to upgrade a Rails app? Unsure where you should begin? We’ll talk about how upgrading should be treated as a feature, and how you can get buy-in from management for upgrading Rails.
  speakers:
    - Andrea Fomera

