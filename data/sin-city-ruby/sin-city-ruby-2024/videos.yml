## Day 2 - Friday, March 22nd

- id: "sin-city-ruby-2024-ernesto-tagwerker"
  title: "Stuck in the Tar Pit"
  raw_title: "Sin City Ruby 2024 - Talk by Ernesto Tagwerker"
  date: "2024-03-22"
  slides_url: "https://speakerdeck.com/etagwerker/stuck-in-the-tar-pit-at-sin-city-ruby-24"
  video_provider: "not_recorded"
  video_id: "sin-city-ruby-2024-ernesto-tagwerker"
  description: |-
    Nobody wants to inherit a project that reeks but here we are: Stuck in the tar pit. How did we get here? In this talk you will learn how to use a few, great Ruby gems that will guide you out of that sticky tar you are in.
  speakers:
    - Ernesto Tagwerker

- id: "sin-city-ruby-2024-tom-rossi"
  title: "Are you my mother?"
  raw_title: "Sin City Ruby 2024 - Talk by Tom Rossi"
  date: "2024-03-22"
  video_provider: "not_recorded"
  video_id: "sin-city-ruby-2024-tom-rossi"
  description: |-
    This session explores the "Rails family trees," examining how classes in Rails share behaviors and attributes through inheritance, modules, single table inheritance, and delegated types. It provides practical guidance on determining the best approach for your application while highlighting common pitfalls to avoid.
  speakers:
    - Tom Rossi

- id: "sin-city-ruby-2024-vladimir-dementyev"
  title: "Seven deadly Rails anti-patterns"
  raw_title: "Sin City Ruby 2024 - Talk by Vladimir Dementyev"
  date: "2024-03-22"
  slides_url: "https://speakerdeck.com/palkan/sin-city-ruby-2024-seven-deadly-rails-anti-patterns"
  video_provider: "not_recorded"
  video_id: "sin-city-ruby-2024-vladimir-dementyev"
  description: |-
    Developing web applications with Ruby on Rails is known to be hellishly productive. What’s the price of this deal? Let’s talk about design patterns leveraged by the framework responsible for increased productivity and at the same time often acclaimed for being anti-patterns.
  speakers:
    - Vladimir Dementyev

