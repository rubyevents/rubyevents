- id: "core-team-qa-bridgetownconf-2022"
  title: "Core Team Q & A on Open Source"
  raw_title: "Core Team Q & A on Open Source"
  event_name: "BridgetownConf 2022"
  date: "2022-11-07"
  video_provider: "mp4"
  video_id: "https://vz-33332009-cdc.b-cdn.net/fbe14e93-48e7-4c88-a92c-ffad40813edc/play_720p.mp4"
  description: |-
    How does an open source project begin? How do you contribute to an open source project? How do you overcome imposter syndrome? What does it mean to be part of Bridgetown's "core team"? These questions and more will be answered in this panel.
  speakers:
    - Jared White
    - Ayush Newatia
    - Adrian Valenzuela

