- id: "jared-white-bridgetownconf-2022-database"
  title: "Database-Driven Apps with Bridgetown, Roda, Hotwire Turbo, and Lifeform"
  raw_title: "Database-Driven Apps with Bridgetown, Roda, Hotwire Turbo, and Lifeform"
  event_name: "BridgetownConf 2022"
  date: "2022-11-07"
  slides_url: "https://btconf2022-crud.onrender.com"
  video_provider: "mp4"
  video_id: "https://vz-33332009-cdc.b-cdn.net/0ecf3086-f24f-40c7-967e-62be6b8c6b9d/play_720p.mp4"
  description: |-
    In this talk, you'll see a demonstration of how to pull Active Record into a Bridgetown site to handle database access through domain models, how to write dynamic endpoints using Roda, how to provide advanced user interactivity using Turbo, and how to render forms declaratively using objects powered by the new gem Lifeform.
  speakers:
    - Jared White
  additional_resources:
