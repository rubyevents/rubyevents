- id: "jared-white-bridgetownconf-2022-keynote"
  title: "Keynote: What's New in Bridgetown 1.2, the Plugin Ecosystem, and Content Publishing"
  raw_title: "Keynote: What's New in Bridgetown 1.2, the Plugin Ecosystem, and Content Publishing"
  kind: "keynote"
  event_name: "BridgetownConf 2022"
  date: "2022-11-07"
  slides_url: "https://btconf2022-keynote.onrender.com"
  video_provider: "mp4"
  video_id: "https://vz-33332009-cdc.b-cdn.net/48c73987-2a70-4374-828e-19803bffaa3c/play_720p.mp4"
  description: |-
    With three major releases of Bridgetown rounding out 2022, it's been a busy year! In the opening keynote of BridgetownConf, you'll learn what's new in the latest version of Bridgetown, including the all-new initialization and configuration system which will enable a new class of plugin. You'll also learn about upcoming milestones in the plugin ecosystem and how Bridgetown can power your online publishing hub.
  speakers:
    - Jared White

- id: "andrew-mason-bridgetownconf-2022"
  title: "Learn Enough Bridgetown to be Dangerous"
  raw_title: "Learn Enough Bridgetown to be Dangerous"
  event_name: "BridgetownConf 2022"
  date: "2022-11-07"
  video_provider: "mp4"
  video_id: "https://vz-33332009-cdc.b-cdn.net/ffc16707-5e4d-4e47-917a-20860b3ca7b8/play_720p.mp4"
  description: |-
    Bridgetown is the future of building static and progressive websites with Ruby, and the future is now! We will look at the current landscape of static site generators and how the industry is evolving as Server Side Rendering and Dynamic Rendering become more popular. We will also look at other Ruby based static site generators to see what the other options are and why you should choose Bridgetown.
  speakers:
    - Andrew Mason

- id: "ayush-newatia-bridgetownconf-2022"
  title: "Content Modeling & API Integrations for the Win"
  raw_title: "Content Modeling & API Integrations for the Win"
  event_name: "BridgetownConf 2022"
  date: "2022-11-07"
  video_provider: "mp4"
  video_id: "https://vz-33332009-cdc.b-cdn.net/3afa6b90-288f-47c4-ad1e-b5a1a4aee363/play_720p.mp4"
  description: |-
    Bridgetown shines as a static site generator, but it's so much more than that. In this talk we'll discuss the content engine which underpins Bridgetown, how to customise it, and add a sprinkle of dynamic interaction.
  speakers:
    - Ayush Newatia
  additional_resources:
