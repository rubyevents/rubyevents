- id: "sf-bay-area-ruby-meetup-april-2026"
  title: "SF Bay Area Ruby Meetup - April 2026"
  raw_title: "SF Ruby Meetup April 2026 @ Intercom"
  event_name: "SF Bay Area Ruby Meetup - April 2026"
  date: "2026-04-14"
  published_at: "2026-05-01"
  video_provider: "youtube"
  video_id: "xep8UoK5cyA"
  description: |-
    Hey, Bay Area builders and tinkerers,

    In April we're hosted by friends from Intercom and our core topic is Intercom's Claude Code plugin system - Brian Scanlan will talk about it. Of course, with Intercom being a major Rails shop, we can all learn from this experience in the most practical sense!

    We're making extra time for networking. To make the most of it, join SF Ruby Slack and drop a quick intro in #introductions before the event.

    Ruby is the quiet force behind the Bay Area's most successful tech organizations and startups from GitHub, Shopify and Stripe to Figma, Chime, and bolt.new.

    We are gathering every month to learn, share, inspire each other, and it feels great because of MINASWAN.

    Our meetups explore building and scaling Ruby and Rails applications. We go deep into technical topics and don't shy away from new ideas and weird experiments! We always have an open mic for everyone's announcements or questions!

    Catch you on the flip side! A massive shoutout to Intercom for hosting and sponsoring the event.

    Brought to you by Evil Martians.

    https://luma.com/5stwf377
