- id: "sf-bay-area-ruby-meetup-september-2024"
  title: "SF Bay Area Ruby Meetup - September 2024"
  raw_title: "SF Bay Area Ruby Meetup #6 at GitHub on September 3"
  event_name: "SF Bay Area Ruby Meetup - September 2024"
  date: "2024-09-03"
  published_at: "2024-09-04"
  video_provider: "youtube"
  video_id: "aqvGdPF5Qro"
  description: |-
    Hey, Bay Area builders and tinkerers!

    For our September edition, we are back to where it started, the GitHub HQ 🎉. Join us to learn what's new and exciting in the world of Ruby, while making new and reconnecting with old friends!

    ​Agenda:

    ​​5 PM: Doors open, food, socializing
    ​5.30: Intro and talks
    – Cameron Dutro (GitHub) will speak about Web Components at GitHub
    – Takashi Kokubun (Shopify) will tell us about YJIT and why we should start using it!
    ​6.20: Break
    ​6.40: Open mic 🎤 (prepare your announcements!)
    ​7: Talks continue
    – Brad Gessler announcing Terminalwire: Ship a CLI for your web app. No API required.
    – Kamil Nicieja (Plane, a YC startup) with "Exploring the Flavors of Ruby on Rails Architectures in the Wild"
    – Konstantin Gredeskoul (Academia.edu) "Concurrency paradigms in Ruby 3.3: Fibers and Ractors"
    ​8: Community socializing
    ​8.50: Doors close
    ​Speak at one of the future meetups! Submit a talk proposal here:

    ​https://forms.gle/C9HQzaT5jvwA5xwc7
