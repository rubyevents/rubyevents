  video_id: "izKer1w6nWc"
  description: |-
    Hey, Bay Area builders and tinkerers!

    In February Sentry is hosting the SF Ruby meetup.

    Whether you're weaving magic with Ruby or Rails in your day job, crafting the next big thing in your garage, or simply intrigued by the promise of productivity and sheer joy Ruby and Rails could sprinkle on your 2026 projects, this is where you want to be.

    Learn from the talks, share opinions and make new friends!

    Agenda:

    5.30 Intro
    5.34 Neil Manvar (Sentry): Introducing Sentry Seer
    5.40 Sohil Kshirsagar (Tusk): Why Coding Agents Need a Harness, Not Just Guardrails
    6.03 Mike Dalton (Calendar Vision): How to Turn Images into Calendar Events
    6.34 André Arko (gem.coop): A Community-Owned Gem Hosting Service
    6.36 Ziggy the Hamster: Announcing "What Cursed Platforms Does Ruby Run On?" at RubyConf 2026
    6.38 Miles Georgi: Ractors Are Just Actors with an R - Benchmarking Ractors vs Threads
    6.40 Rhiannon Payne: Marketing Services for Ruby Startups
    6.41 Daniel Farina (Ubicloud): Ubicloud is Hiring
    6.42 Jake Moffatt: Building an Ambient OS on the Open Home Dev Kit
    6.43 Justin Bowen: Ragents - A Ractor-Based Agent Gem (RubyKaigi 2026 Preview)
    6.44 Cameron Dutro (Cisco Meraki): garnet-js - YARV in TypeScript
    6.48 Irina Nazarova (Evil Martians): Solaris - Vibe-Coding an Internal Rails App
    6.53 Vladimir Dementyev (Evil Martians) answering: Does Architecture Still Matter When AI Writes the Code?
    7.33 Brandon Weaver (One Medical) hosting a Q&A about Ruby Central

    Brought to you by Evil Martians.

    https://lu.ma/3mf4bhdl
