- id: "upstate-ruby-meetup-may-2024"
  title: "Upstate Ruby May 2024 - Tech Topics: Hotwire"
  event_name: "Upstate Ruby May 2024 - Tech Topics: Hotwire"
  date: "2024-05-30"
  video_provider: "children"
  video_id: "upstate-ruby-meetup-may-2024"
  description: |-
    Time for another informal get-together to discuss a topic and share a meal. The topic is Hotwire. It's been creating a lot of new buzz for the Rails framework and is part of push back to server-side rendering (along with friends like htmlx and Phoenix LiveView).

    Are you using Hotwire in your applications? When do you reach for Turbo Drive vs Frames vs Streams vs Stimulus? Has anyone made use of the new Strada for mobile apps or the new Morph functionality? Let's share and learn from each others experiences in this new exciting tech.

    Like with the last Tech Topic, the plan is to due this over a meal together. Everyone pays their own way. Since it's still spring time let's take advantage of the nice weather and meet at Gather.

    Hope to see you there.

    https://www.meetup.com/upstate-ruby/events/301117587
