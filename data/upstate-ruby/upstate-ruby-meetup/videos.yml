    - id: "jeremy-smith-upstate-ruby-january-2024"
      title: "Calm Rails Upgrades"
      event_name: "Upstate Ruby January 2024"
      date: "2024-01-25"
      video_provider: "not_recorded"
      video_id: "jeremy-smith-upstate-ruby-january-2024"
      description: |-
        Upgrading a Rails app can be daunting and stressful, but it doesn’t have to be. Jeremy Smith, who has been building (and upgrading) Rails apps for 15 years, will be sharing the perspective and process he’s developed over that time for upgrading Rails.

        This talk will assume you’ve worked in a Rails codebase, but it should be valuable whether you’re new to upgrades or a seasoned pro. The goal is for you to come away with an approach that will make your next Rails upgrade calm and oddly satisfying.
      speakers:
        - Jeremy Smith

