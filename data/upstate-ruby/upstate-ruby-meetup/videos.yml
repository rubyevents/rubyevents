  video_provider: "children"
  video_id: "upstate-ruby-meetup-march-2024"
  description: |-
    Going to try something new this month. Instead of a prepared talk by a community member let's get together for a meal and discuss a topic so we can learn from each other.

    For the first attempt on this concept, the place is Velo Fellow and the topic is Flaky Tests. What is your experience with them and how do you wrangle them? If useful, hopefully we can continue this social "Tech Topics" dinner concept on a monthly basis (different places, different topics).

    Each participant will pay their own way with regard to food. We will discuss the topic but also just have some good general socializing. Everyone is welcome, not just Rubyist. Strategies can be shared across languages so we can all learn from each other.

