- id: "colin-loretz-railsconf-2022"
  title: '"Build vs Buy" on Rails'
  raw_title: 'RailsConf 2022 - "Build vs Buy" on Rails by Colin Loretz'
  event_name: "RailsConf 2022"
  date: "2022-05-17"
  published_at: "2023-01-16"
