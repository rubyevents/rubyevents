- id: "claudio-baccigalupo-railsconf-2022"
  title: "Unboxing Rails 7: What's new in the latest major version"
  raw_title: "RailsConf 2022 - Unboxing Rails 7What's new in the latest major version by Claudio Baccigalupo"
