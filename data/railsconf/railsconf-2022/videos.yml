- id: "stephen-prater-railsconf-2022"
  title: "O(1), O(n) and O(#$*&!)"
  raw_title: "RailsConf 2022 - O(1), O(n) and O(#$*&!) by Stephen Prater"
  event_name: "RailsConf 2022"
