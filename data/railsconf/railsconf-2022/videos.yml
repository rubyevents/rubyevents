- id: "chuck-lauer-vose-railsconf-2022"
  title: "Don't page me! How we limit pager noise at New Relic"
  raw_title: "RailsConf 2022 - Don't page me! How we limit pager noise at New Relic by Chuck Lauer Vose"
  event_name: "RailsConf 2022"
  date: "2022-05-17"
  published_at: "2023-01-16"
  video_provider: "youtube"
  video_id: "uxWqX1KZAH8"
  description: |-
    New Relic's largest monolith handles 200k req/min and communicates with more than 40 external services and 11 mysql databases; this should result in constant downtime. Being mindful and alerting on the right things has been critical for us.

    This talk will cover a successful process for identifying trustworthy data, refining alert conditions, and what kinds of checks to page on.
  speakers:
    - Chuck Lauer Vose

- id: "nathan-griffith-railsconf-2022"
  title: "RAILS_ENV=demo"
  raw_title: "RailsConf 2022 - RAILS_ENV=demo by Nathan Griffith"
  kind: "talk"
  event_name: "RailsConf 2022"
  date: "2022-05-17"
  published_at: "2023-01-16"
  video_provider: "youtube"
  video_id: "N_2idFNGlkk"
  description: |-
    Today’s the day. You’ve prepared your pitch, deployed a special copy of your app, and confirmed—in a trial run—that your walkthrough is ready for a live audience. But, now, when you attempt to log in, something breaks. Flustered, you debug, apologize, and debug some more, before finally calling it quits. Next time, you’ll bring a prerecorded screencast... 😮‍💨

    What could’ve been done to make the app more reliably "demoable"? Join us, as we use "stateful fakes" and "personas" to produce a testable, maintainable, and failure-resistant "demo" deployment, with production-like uptime guarantees!
  speakers:
    - Nathan Griffith

- id: "jamie-gaskins-railsconf-2022"
  title: "If You Know Heroku, You Can Use Kubernetes"
