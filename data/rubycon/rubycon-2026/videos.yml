- id: "marco-roth-rubycon-2026"
  title: "HTML-Aware ERB: The Path to Reactive Rendering"
  kind: "talk"
  date: "2026-05-08"
  published_at: "2026-06-13T06:07:00Z"
  announced_at: "2025-11-13 17:51 UTC"
  language: "English"
  slides_url: "https://speakerdeck.com/marcoroth/html-aware-erb-the-path-to-reactive-rendering-at-rubycon-2026-rimini-italy"
  video_provider: "youtube"
  video_id: "Lc5MGy9ahs8"
  description: |-
    ERB templates in Ruby are traditionally rendered by engines that treat templates as string generators, which makes it difficult to reason about HTML structure, state changes, or incremental updates. These limitations become especially visible in modern HTML-over-the-wire workflows.

    In this talk, we explore what it would take to build a reactive ERB rendering engine. We begin by revisiting how existing ERB engines compile templates into Ruby code and look at how recent advances in HTML-aware parsing and tooling make new approaches possible.

    Using Herb::Engine as a concrete example, we examine how structural understanding enables state-aware rendering, diff-based updates, and a more responsive development experience, including instant updates without full page reloads and rich in-browser developer tools. Such as template outlines, partial and ERB structure views, jump-to-source navigation, and many other innovations.
  speakers:
    - Marco Roth

- id: "yara-debian-rubycon-2026"
  title: "From Plato to Production: A Philosophical History of Code"
  kind: "talk"
  date: "2026-05-08"
  published_at: "2026-06-13T06:07:02Z"
  language: "English"
  slides_url: "https://speakerdeck.com/yaradeb123/from-plato-to-production"
  video_provider: "youtube"
  video_id: "zOclGvC2mtM"
  description: |-
    Every time you sit down to write code, you are unknowingly re-enacting a conversation that has been happening for 2,500 years. About what knowledge is. Where it comes from. And what we owe to the people who come after us.

    From Plato to production is not a journey from philosophy to reality. It's the realization that production was always philosophical.
  speakers:
    - Yara Debian

