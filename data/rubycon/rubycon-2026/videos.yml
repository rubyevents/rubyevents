- id: "michele-franzin-rubycon-2026"
  title: "Semantic Image Search in Ruby: Postgres, Redis, or LLM?"
  kind: "talk"
  date: "2026-05-08"
  published_at: "2026-06-13T06:06:58Z"
  language: "English"
  slides_url: "https://speakerdeck.com/fuzziness/semantic-image-search-in-ruby-postgres-redis-or-llm-a-co2-conscious-comparison"
  video_provider: "youtube"
  video_id: "bO1RYr09p5U"
  description: |-
    Postgres, Redis, or LLM? Ask any engineer, and you already know the answer: it depends.

    On what, exactly? Usually, there are four things: speed, cost, complexity, and quality. This talk adds a fifth column to that table and shows how to fill it in.

    Three real Ruby implementations of semantic image search are run on the same dataset and machine, and compared on grams of CO₂e per query alongside the usual four axes.

    The deck includes the measurement method, the formula, the Ruby snippets, and the numbers — but no recommendation. Just one column you probably didn't have before.
  speakers:
    - Michele Franzin

