- id: "stephen-mckeon-blastoffrails-2026"
  title: "Why We're Still Training Rails Developers in an Age of AI"
  raw_title: "Blastoff Rails 2026 - Why We're Still Training Rails Developers in an Age of AI by Stephen McKeon"
  event_name: "Blastoff Rails 2026"
  date: "2026-06-11"
  published_at: "2026-06-27T15:00:01Z"
  video_provider: "youtube"
  video_id: "t_jcoEE-zcc"
  description: |-
    With the rapid rise of AI-assisted development tools, there's growing uncertainty about the future of junior developers—particularly those learning frameworks like Rails. Stephen shares lessons from teaching the Power Code Academy, an internal program at Power Home Remodeling that trains employees with little to no technical background into full-stack Rails developers. Rather than focusing on AI as a solution, this talk examines why sustained investment in human growth still matters—for businesses building Rails applications, for developers learning the framework, and for the long-term health of the Rails community.
  speakers:
    - Stephen McKeon

