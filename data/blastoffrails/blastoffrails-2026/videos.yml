- id: "nikky-southerland-blastoffrails-2026"
  title: "Spaceships, Radiation Therapy, and Power Users"
  raw_title: "Blastoff Rails 2026 - Spaceships, Radiation Therapy, and Power Users by Nikky Southerland"
  event_name: "Blastoff Rails 2026"
  date: "2026-06-12"
  published_at: "2026-06-28T15:00:17Z"
  video_provider: "youtube"
  video_id: "9Q4J35dbYbM"
  description: |-
    We build software that our users interact with daily, and it's only natural that over time they become really, really good at navigating the interfaces we've designed. This is great! Except their skill makes them more prone to introducing unintended behavior to the system. We'll zoom in on a couple of notable interface designs from history: Apollo's guidance computer and the Therac-25 radiation therapy machine. We'll explore how to proactively keep power users in mind to increase efficiency and reduce frustration.
  speakers:
    - Nikky Southerland

- id: "avi-flombaum-blastoffrails-2026"
  title: "Don't Read the Code: Trusting AI With Your Rails Codebase"
  raw_title: "Blastoff Rails 2026 - Don't Read the Code: Trusting AI With Your Rails Codebased by Avi Flombaum"
  event_name: "Blastoff Rails 2026"
  date: "2026-06-12"
  published_at: "2026-06-28T15:00:34Z"
  video_provider: "youtube"
  video_id: "jBfWoCeiiXY"
  description: |-
    Learn to let go with AI so you don't even need to read your code. See an AI harness for Rails apps that writes code to fit your app, patterns, and your team. We'll generate an app that ships with workflow skills, conventions, and agent hooks that will let us one-shot the most complicated thing you can come up with and then read the code. While Claude works on that, we'll cover the AI harness and how it works. You'll see how to create an eval system that proves it. When it doesn't? You'll see how to compound the learnings back into the app.
  speakers:
    - Avi Flombaum

