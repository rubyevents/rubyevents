default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500

  workers:
    - queues: [default, low, solid_queue_recurring]
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

    - queues: thumbnails
      threads: 1
      processes: 1
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

staging:
  <<: *default

production:
  <<: *default
